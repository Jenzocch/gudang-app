<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4C9A3F"/>
      <stop offset="1" stop-color="#1E6B2E"/>
    </linearGradient>
    <linearGradient id="oGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F49B2B"/>
      <stop offset="1" stop-color="#E97C17"/>
    </linearGradient>
    <linearGradient id="gDiagGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5AA84A"/>
      <stop offset="1" stop-color="#1E6B2E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="#F7F3E8"/>
  <!-- 3 kotak bertumpuk (stok/rak gudang) -->
  <rect x="104" y="260" width="140" height="140" rx="20" fill="url(#gGrad)"/>
  <rect x="268" y="260" width="140" height="140" rx="20" fill="url(#oGrad)"/>
  <rect x="186" y="96" width="140" height="140" rx="20" fill="url(#gDiagGrad)"/>
  <line x1="256" y1="260" x2="256" y2="400" stroke="#F7F3E8" stroke-width="16"/>
  <!-- 文字 -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="64">
    <tspan fill="#2E7D32">Gudang</tspan><tspan fill="#EF8A1F">-1</tspan>
  </text>
</svg>
