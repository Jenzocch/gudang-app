var _sbReady=false,_sbErr=false,_sbCbs=[];
function initSupabase(ok,fail){

function lpk(k){
  if(k==='⌫')STAFF_PIN_ENT=STAFF_PIN_ENT.slice(0,-1);
  else if(STAFF_PIN_ENT.length<4)STAFF_PIN_ENT+=k;
  document.querySelectorAll('#ls-dots .pin-dot').forEach(function(d,i){d.className='pin-dot'+(i<STAFF_PIN_ENT.length?' f':'');});
  if(STAFF_PIN_ENT.length===4){
    var pid=document.getElementById('ls-sel').value;
    var isNew=pid==='__new__';
    var correct=isNew?GUEST_PIN:(function(){var p=DATA.people.find(function(p){return p.id==pid;});return p&&p.pin?p.pin:'1234';})();
    if(STAFF_PIN_ENT===correct){
      if(isNew){
        var nm=(document.getElementById('ls-newname').value||'').trim();
        if(!nm){
          var err=document.getElementById('ls-err');if(err)err.textContent=LANG==='zh'?'請先填寫名字':'Isi nama dulu';
          STAFF_PIN_ENT='';
          document.querySelectorAll('#ls-dots .pin-dot').forEach(function(d){d.className='pin-dot';});
          return;
        }
        CURRENT_USER={id:null,name:nm,initials:nm.substr(0,2).toUpperCase(),isGuest:true};
      }else{
        CURRENT_USER=DATA.people.find(function(p){return p.id==pid;});
      }
      var btn=document.getElementById('hdr-user-btn');
      if(btn){btn.textContent='▶ '+CURRENT_USER.name+(CURRENT_USER.isGuest?' 👤':'');btn.style.display='inline';}
      document.getElementById('tabs').style.display='flex';
      document.getElementById('mc').innerHTML='<div class="loading"><div class="spin"></div><p style="margin-top:.8rem;font-size:.88rem">'+(LANG==='zh'?'載入中...':'Memuat...')+'</p></div>';
      initSupabase(function(){loadAll();},function(e){document.getElementById('mc').innerHTML='<div class="ab ab-d" style="margin:1rem">⚠ '+e.message+'</div>';});
    }else{
      var err=document.getElementById('ls-err');if(err)err.textContent=t('wrongPin');
      STAFF_PIN_ENT='';
      setTimeout(function(){
        var e=document.getElementById('ls-err');if(e)e.textContent='';
        document.querySelectorAll('#ls-dots .pin-dot').forEach(function(d){d.className='pin-dot';});
      },900);
    }
  }
}

function setDot(s){var d=document.getElementById('cdot');d.className='conn-dot'+(s==='ok'?' ok':s==='err'?' err':'');}

async function loadAll(afterCb){
  setDot('');
  var tOut=new Promise(function(_,rej){setTimeout(function(){rej(new Error(LANG==='zh'?'連線逾時 (15s)，請重試':'Koneksi timeout (15s), coba lagi'));},15000);});
  try{
    var results=await Promise.race([
      Promise.all([
        sb.from('items').select('*').order('name'),
        sb.from('people').select('*').order('name'),
        sb.from('requests').select('*').order('created_at',{ascending:false}),
        sb.from('transactions').select('*').order('created_at',{ascending:false}).limit(100)
      ]),
      tOut
    ]);
    var i=results[0],p=results[1],r=results[2],tx=results[3];
    if(i.error)throw i.error;
    DATA.items=i.data||[];DATA.people=p.data||[];DATA.requests=r.data||[];
    DATA.transactions=tx.data||[];
    setDot('ok');
    renderAll();setTimeout(checkLowStock,600);
    if(afterCb)afterCb();
  }catch(e){
    setDot('err');
    document.getElementById('mc').innerHTML=
      '<div style="padding:1.5rem;text-align:center">'+
      '<div class="ab ab-d" style="margin-bottom:1rem">⚠ '+e.message+'</div>'+
      '<button class="btn btn-p" onclick="initSupabase(function(){loadAll();},function(e2){toast(\'⚠ \'+e2.message);})">'+(LANG==='zh'?'🔄 重試':'🔄 Coba Lagi')+'</button>'+
      '</div>';
  }
}

  '<div style="padding:.6rem .9rem;font-weight:700;font-size:.85rem;background:var(--light);border-bottom:1px solid var(--border)">📦 '+(LANG==='zh'?'庫存狀態（依緊急程度）':'Status Stok (Urgensi)')+'</div>';

  document.querySelectorAll('.pin-dot').forEach(function(d,i){d.className='pin-dot'+(i<PIN_ENT.length?' f':'')});
  if(PIN_ENT.length===ADMIN_PIN.length){
    if(PIN_ENT===ADMIN_PIN){IS_ADMIN=true;renderAdminFull();}

async function savePin(id){
  var pin=String(document.getElementById('sp-pin').value||'').trim();
  if(!/^\d{4}$/.test(pin)){toast('⚠ 請輸入4位數字');return;}
  try{var {error}=await sb.from('people').update({pin:pin}).eq('id',id);if(error)throw error;toast(t('saveOk'));closeModal();await loadAll();}
  catch(e){toast('⚠ '+e.message);}
}

// MODALS
function showModal(title,body){
  closeModal();
  var ov=document.createElement('div');
  ov.className='modal-ov open';ov.id='m-ov';
  ov.innerHTML='<div class="modal"><div class="modal-title">'+title+'<button class="mcl" onclick="closeModal()">✕</button></div>'+body+'</div>';
  document.body.appendChild(ov);
  ov.addEventListener('click',function(e){if(e.target===ov)closeModal();});
}
function closeModal(){var o=document.getElementById('m-ov');if(o)o.remove();}

function itemFormHTML(item){
  return '<div class="ig"><label>'+t('iName')+' *</label><input id="fn" type="text" value="'+(item?esc(item.name):'')+'"></div>'+
    '<div class="fr">'+
      '<div class="ig"><label>'+t('initQ')+'</label><input id="fq" type="number" value="'+(item?item.qty:0)+'" min="0"></div>'+
      '<div class="ig"><label>'+t('unit')+'</label><input id="fu" type="text" value="'+(item?esc(item.unit):'pcs')+'"></div>'+
    '</div>'+
    '<div class="ig"><label>'+t('minQ')+'</label><input id="fm" type="number" value="'+(item?item.critical_qty:10)+'" min="0"></div>'+
    '<div class="ig"><label>'+(LANG==='zh'?'商品照片':'Foto Barang')+'</label>'+
      '<div style="display:flex;gap:.5rem;margin-bottom:.4rem">'+
        '<button type="button" class="btn btn-s" style="flex:1;font-size:.82rem" onclick="document.getElementById(\'f-cam\').click()">📷 '+(LANG==='zh'?'拍照':'Kamera')+'</button>'+
        '<button type="button" class="btn btn-s" style="flex:1;font-size:.82rem" onclick="document.getElementById(\'f-fi\').click()">🖼️ '+(LANG==='zh'?'相簿':'Album')+'</button>'+
      '</div>'+
      '<input type="file" id="f-cam" accept="image/*" capture="environment" style="display:none" onchange="onPhoto(event)">'+
      '<input type="file" id="f-fi" accept="image/*" style="display:none" onchange="onPhoto(event)">'+
      '<div id="fph">'+(item&&item.image_url?'<img class="prev" src="'+esc(item.image_url)+'">':'')+'</div>'+
    '</div>'+
    '<div class="ig"><label>'+t('supUrl')+'</label><input id="fsu" type="url" placeholder="https://..." value="'+(item&&item.supplier_url?esc(item.supplier_url):'')+'"></div>'+
    '<button class="btn btn-p btn-full" onclick="saveItem()">'+t('save')+'</button>';
}
function showAddItem(){EDIT_ITEM=null;F_PHOTO='';showModal('➕ '+t('addItem'),itemFormHTML(null));}
function showEdit(id){EDIT_ITEM=DATA.items.find(function(i){return i.id===id});F_PHOTO='';showModal('✏️ '+t('editItem'),itemFormHTML(EDIT_ITEM));}
function onPhoto(e){
  var f=e.target.files[0];if(!f)return;
  compressImg(f,function(d){
    F_PHOTO=d;
    var p=document.getElementById('fph');if(p)p.innerHTML='<img class="prev" src="'+d+'">';
  });
}
async function saveItem(){
  var name=(document.getElementById('fn').value||'').trim();
  if(!name){toast('⚠ '+t('iName'));return;}
  var qty=parseInt(document.getElementById('fq').value)||0;
  var unit=(document.getElementById('fu').value||'pcs').trim();
  var min=parseInt(document.getElementById('fm').value)||10;
  var surl=(document.getElementById('fsu').value||'').trim();
  var img=F_PHOTO||(EDIT_ITEM&&EDIT_ITEM.image_url)||null;
  F_PHOTO='';
  var d={name:name,qty:qty,unit:unit,critical_qty:min,supplier_url:surl||null,image_url:img};
  try{
    if(EDIT_ITEM){var {error}=await sb.from('items').update(d).eq('id',EDIT_ITEM.id);if(error)throw error;}
    else{var {error}=await sb.from('items').insert(d);if(error)throw error;}
    toast(t('saveOk'));closeModal();await loadAll();
  }catch(e){toast('⚠ '+e.message);}
}
async function delItem(id){
  var item=DATA.items.find(function(i){return i.id===id;});
  if(!item)return;
  if(!confirm(LANG==='zh'?'確定刪除「'+item.name+'」?':'Hapus "'+item.name+'"?'))return;
  try{var {error}=await sb.from('items').delete().eq('id',id);if(error)throw error;toast(t('delOk'));await loadAll();}
  catch(e){toast('⚠ '+e.message);}
}
function printQR(id){
  var item=DATA.items.find(function(i){return i.id===id;});
  if(!item)return;
  var qData=encodeURIComponent('gudang:'+item.id+':'+item.name);
  var qUrl='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+qData;
  var w=window.open('','_blank','width=400,height=500');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+item.name+'</title>'+
    '<style>body{font-family:sans-serif;margin:0;padding:20px;text-align:center}'+
    '.label{border:2px solid #333;border-radius:8px;padding:16px;display:inline-block;min-width:240px}'+
    'h2{margin:0 0 12px;font-size:1.1rem}'+
    'img{display:block;margin:0 auto 12px}'+
    '.info{font-size:.85rem;color:#555;margin-top:8px}'+
    '.url{font-size:.75rem;color:#0D9488;word-break:break-all;margin-top:6px}'+
    '@media print{body{margin:0}button{display:none}}'+
    '</style></head><body>'+
    '<div class="label">'+
    '<h2>'+item.name+'</h2>'+
    '<img src="'+qUrl+'" width="200" height="200">'+
    '<div class="info">庫存: '+item.qty+' '+item.unit+' · min: '+item.critical_qty+'</div>'+
    (item.supplier_url?'<div class="url">🔗 '+item.supplier_url+'</div>':'')+
    '</div>'+
    '<br><button onclick="window.print()" style="margin-top:12px;padding:8px 20px;background:#0D9488;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.9rem">🖨️ '+(LANG==='zh'?'列印':'Cetak')+'</button>'+
    '</body></html>');
  w.document.close();
}
async function addPerson(){
  var name=(document.getElementById('npn').value||'').trim();
  if(!name){toast('⚠ '+t('pName'));return;}
  var ini=name.split(' ').map(function(w){return w[0]||''}).join('').toUpperCase().substr(0,2);
  try{var {error}=await sb.from('people').insert({name:name,initials:ini,pin:'1234'});if(error)throw error;toast('✓ '+name+' (PIN:1234)');document.getElementById('npn').value='';await loadAll();}
  catch(e){toast('⚠ '+e.message);}
}
async function delPerson(id){
  var person=DATA.people.find(function(p){return p.id===id;});
  if(!person)return;
  if(!confirm(LANG==='zh'?'確定刪除員工「'+person.name+'」?':'Hapus karyawan "'+person.name+'"?'))return;
  try{var {error}=await sb.from('people').delete().eq('id',id);if(error)throw error;toast(t('delOk'));await loadAll();}
  catch(e){toast('⚠ '+e.message);}
}
function logoutAdmin(){IS_ADMIN=false;renderAdmin();}

// ACTIONS
async function doAmbil(){
  if(!sIA||!sPA){toast(t('selBoth'));return;}
  var q=parseInt(document.getElementById('a-q').value)||1;
  if(q>sIA.qty){showLow(sIA,q);return;}
  var btn=event.target;btn.disabled=true;btn.textContent='...';
  try{
    await sb.from('items').update({qty:sIA.qty-q}).eq('id',sIA.id);
    await sb.from('transactions').insert({type:'ambil',item_id:sIA.id,item_name:sIA.name,person_id:sPA.id,person_name:sPA.name,qty:q});
    toast(t('takeOk'));await loadAll();goTab('home',document.querySelector('.tb'));
  }catch(e){toast('⚠ '+e.message);}
  btn.disabled=false;btn.textContent=t('doTake');
}
async function doMasuk(){
  if(!sIM||!sPM){toast(t('selBoth'));return;}
  var q=parseInt(document.getElementById('m-q').value)||1;
  var btn=event.target;btn.disabled=true;btn.textContent='...';
  try{
    await sb.from('items').update({qty:sIM.qty+q}).eq('id',sIM.id);
    await sb.from('transactions').insert({type:'masuk',item_id:sIM.id,item_name:sIM.name,person_id:sPM.id,person_name:sPM.name,qty:q});
    toast(t('rcvOk'));await loadAll();goTab('home',document.querySelector('.tb'));
  }catch(e){toast('⚠ '+e.message);}
  btn.disabled=false;btn.textContent=t('doRcv');
}
function onReqNameSel(){
  var sel=document.getElementById('rn-sel');
  var inp=document.getElementById('rn');
  if(sel.value==='__new__'){inp.style.display='block';inp.focus();}
  else{inp.style.display='none';inp.value=sel.value;}
}
function onReqItemSel(){
  var sel=document.getElementById('ri-sel');
  var ta=document.getElementById('ri');
  if(sel.value==='__new__'){ta.style.display='block';ta.focus();}
  else{ta.style.display='none';ta.value=sel.value;}
}
var REQ_PHOTO='';
function onReqPhoto(e){
  var f=e.target.files[0];if(!f)return;
  compressImg(f,function(d){
    REQ_PHOTO=d;
    var p=document.getElementById('req-photo-prev');
    if(p)p.innerHTML='<img class="prev" src="'+d+'">';
  });
}
async function doReq(){
  var selN=document.getElementById('rn-sel');
  var nm=(selN.value&&selN.value!=='__new__'?selN.value:(document.getElementById('rn').value||'')).trim();
  var selI2=document.getElementById('ri-sel');
  var it=(selI2.value&&selI2.value!=='__new__'?selI2.value:(document.getElementById('ri').value||'')).trim();
  if(!nm||!it){toast(t('fillAll'));return;}
  var no=(document.getElementById('rno').value||'').trim();
  if(REQ_PHOTO) no=(no?no+'\n':'')+'[附圖]';
  try{
    await sb.from('requests').insert({person_name:nm,items_requested:it,note:no+(REQ_PHOTO?'\n'+REQ_PHOTO:''),status:'pending'});
    toast(t('reqOk'));
    document.getElementById('rn-sel').value='';document.getElementById('rn').value='';document.getElementById('rn').style.display='none';
    document.getElementById('ri-sel').value='';document.getElementById('ri').value='';document.getElementById('ri').style.display='none';
    document.getElementById('rno').value='';
    document.getElementById('req-photo-prev').innerHTML='';REQ_PHOTO='';
    await loadAll();
  }catch(e){toast('⚠ '+e.message);}
}
async function updReq(id,status){
  try{await sb.from('requests').update({status:status}).eq('id',id);toast('✓');await loadAll();}
  catch(e){toast('⚠ '+e.message);}
}

// LOW STOCK
function checkLowStock(){
  var zero=DATA.items.filter(function(i){return i.qty===0&&i.critical_qty>0});
  if(zero.length)showLow(zero[0],1);
}
function showLow(item,need){
  LOW_ITEM=item;
  document.getElementById('low-title').textContent=t('lowTitle');
  document.getElementById('low-body').innerHTML=
    '<strong>'+esc(item.name)+'</strong><br>'+
    t('lowMsg',{q:item.qty,u:item.unit,n:need})+
    (item.supplier_url?'<br><a href="'+esc(item.supplier_url)+'" target="_blank" style="color:var(--p);font-size:.82rem">'+esc(item.supplier_url)+'</a>':'');
  var lb=document.getElementById('low-link-btn');
  lb.style.display=item.supplier_url?'':'none';
  document.getElementById('low-ov').classList.add('open');
}
function closeLow(){document.getElementById('low-ov').classList.remove('open');}
function openLowLink(){if(LOW_ITEM&&LOW_ITEM.supplier_url)window.open(LOW_ITEM.supplier_url,'_blank');}

// UI
function selI(el,id,mode){
  var gid=mode==='a'?'ai':'mi';
  document.querySelectorAll('#'+gid+' .ic').forEach(function(c){c.classList.remove('sel')});
  el.classList.add('sel');
  var item=DATA.items.find(function(i){return i.id==id});
  if(mode==='a'){sIA=item;updSumA();}else{sIM=item;updSumM();}
}
function selP(el,id,mode){
  var gid=mode==='a'?'ap':'mp';
  document.querySelectorAll('#'+gid+' .pc').forEach(function(c){c.classList.remove('sel')});
  el.classList.add('sel');
  var p=DATA.people.find(function(p){return p.id==id});
  if(mode==='a'){sPA=p;updSumA();}else{sPM=p;updSumM();}
}
function updSumA(){if(!sIA||!sPA)return;document.getElementById('a-sum').style.display='block';document.getElementById('a-in').textContent=sIA.name;document.getElementById('a-pn').textContent=sPA.name;}
function updSumM(){if(!sIM||!sPM)return;document.getElementById('m-sum').style.display='block';document.getElementById('m-in').textContent=sIM.name;document.getElementById('m-pn').textContent=sPM.name;}
function cQ(m,d){var e=document.getElementById(m+'-q');e.value=Math.max(1,(parseInt(e.value)||1)+d);}
function goTab(id,el){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('active')});
  var s=document.getElementById(id);if(s)s.classList.add('active');
  document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('active')});
  if(el)el.classList.add('active');
}
function swTab(el,id){
  var nav=el.closest('.tab-nav'),par=nav.parentElement;
  nav.querySelectorAll('.tsw').forEach(function(b){b.classList.remove('act')});
  el.classList.add('act');
  par.querySelectorAll('.tc').forEach(function(t){t.classList.remove('active')});
  document.getElementById(id).classList.add('active');
}
function swATab(el,id){
  document.getElementById('atnav').querySelectorAll('.tsw').forEach(function(b){b.classList.remove('act')});
  if(el)el.classList.add('act');
  document.querySelectorAll('#admin .tc').forEach(function(t){t.classList.remove('active')});
  var e=document.getElementById(id);if(e)e.classList.add('active');
}
function compressImg(file,cb){
  var rd=new FileReader();
  rd.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var MAX=800,r=Math.min(MAX/img.width,MAX/img.height,1);
      var cv=document.createElement('canvas');
      cv.width=Math.round(img.width*r);cv.height=Math.round(img.height*r);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      cb(cv.toDataURL('image/jpeg',0.72));
    };
    img.src=e.target.result;
  };
  rd.readAsDataURL(file);
}
function showImg(url,name){
  var ov=document.createElement('div');
  ov.className='img-ov';
  ov.onclick=function(){ov.remove();};
  ov.innerHTML='<div style="text-align:center;max-width:100%">'+
    '<img src="'+esc(url)+'" style="max-width:100%;max-height:75vh;border-radius:10px;object-fit:contain;box-shadow:0 8px 30px rgba(0,0,0,.5)">'+
    '<div style="color:#fff;font-weight:600;margin-top:.7rem;font-size:.95rem">'+esc(name)+'</div>'+
    '<div style="color:#aaa;font-size:.75rem;margin-top:.2rem">'+(LANG==='zh'?'點任意處關閉':'Tap untuk tutup')+'</div>'+
  '</div>';
  document.body.appendChild(ov);
}
function fmtDate(s){if(!s)return'';var d=new Date(s);return d.toLocaleDateString(LANG==='zh'?'zh-TW':'id-ID',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
function fmtC(n){if(!n)return'-';return(LANG==='zh'?'NT$':'Rp ')+Math.round(n).toLocaleString();}
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},2800);}
</script>
