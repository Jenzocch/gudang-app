<style>
:root{--p:#4F46E5;--s:#4338CA;--ok:#059669;--warn:#D97706;--danger:#DC2626;--light:#F8FAFC;--dark:#101828;--border:#E4E7EC;--border-input:#D0D5DD;--ink2:#475467;--muted:#667085;--sh-sm:0 1px 2px rgba(16,24,40,.05);--sh-md:0 1px 3px rgba(16,24,40,.07),0 1px 2px rgba(16,24,40,.04);--sh-lg:0 8px 24px rgba(16,24,40,.10)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#EEF1F4;color:var(--dark);font-size:16px}
body{display:flex;flex-direction:column}
#app{flex:1;display:flex;flex-direction:column;overflow:hidden;max-width:560px;margin:0 auto;width:100%;background:#F6F8FA;box-shadow:0 0 32px rgba(16,24,40,.10)}
.hdr{background:linear-gradient(135deg,#312E81,#3730A3);color:#fff;padding:.68rem 1rem;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.5rem;position:sticky;top:0;z-index:60}
.hdr-wh{justify-self:center;display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.32);color:#fff;padding:.34rem .9rem;border-radius:999px;font-weight:800;font-size:.92rem;cursor:pointer;white-space:nowrap;font-family:inherit;transition:.15s;letter-spacing:.01em}
.hdr-wh:hover{background:rgba(255,255,255,.25)}
.hdr-wh .cx{opacity:.7;font-size:.68rem}
.wh-pop{display:none;position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);z-index:70;background:var(--card,#fff);border:1px solid var(--border);border-radius:14px;box-shadow:var(--sh-lg);padding:.35rem;min-width:190px}
.wh-pop.open{display:block}
.wh-pop-hd{font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:.35rem .6rem .25rem}
.wh-pop button{display:flex;width:100%;align-items:center;gap:.5rem;padding:.55rem .65rem;border:none;background:none;border-radius:9px;cursor:pointer;font-weight:700;font-size:.9rem;color:var(--dark);font-family:inherit;text-align:left}
.wh-pop button:hover{background:var(--light)}
.wh-pop button.act{color:var(--p);background:#EEF2FF}
.wh-pop-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
/* 購物車浮動列：手機在底部分頁列上方；桌面在右下角 */
#cart-bar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(66px + env(safe-area-inset-bottom));width:calc(100% - 1.2rem);max-width:540px;z-index:90;display:none;align-items:center;gap:.55rem;background:var(--dark);color:#fff;padding:.5rem .7rem;border-radius:14px;box-shadow:0 6px 22px rgba(0,0,0,.3)}
#cart-bar .cb-info{flex:1;font-weight:800;font-size:.9rem;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#cart-bar button{border:none;border-radius:9px;padding:.5rem .8rem;font-size:.85rem;font-weight:800;cursor:pointer}

.hdr-title{display:flex;align-items:center;gap:.55rem;min-width:0;line-height:1.2}
.hdr-logo-mark{flex-shrink:0;width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);display:grid;place-items:center;overflow:hidden}
.hdr-logo-mark img{width:100%;height:100%;object-fit:cover;display:block}
.hdr-logo-txt{min-width:0}
.hdr-title-main{font-size:1rem;font-weight:800;letter-spacing:.01em;white-space:nowrap}
.hdr-title-sub{font-size:.65rem;opacity:.78;font-weight:400;margin-top:.05rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-right{display:flex;align-items:center;gap:.6rem;justify-self:end}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--ink2);flex-shrink:0}
.conn-dot.ok{background:#34D399}.conn-dot.err{background:#F87171}
.content{flex:1;overflow-y:auto;padding-bottom:58px;-webkit-overflow-scrolling:touch}
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -1px 8px rgba(16,24,40,.05)}
.tb{flex:1;min-width:44px;padding:.5rem .1rem .45rem;border:none;background:none;cursor:pointer;font-size:.78rem;font-weight:700;color:var(--muted);transition:.2s;display:flex;flex-direction:column;align-items:center;gap:.1rem;position:relative;font-family:inherit;border-radius:12px;margin:3px 2px}
.tb-icon{font-size:1.25rem;transition:transform .2s}
.tb-arw{font-weight:900;font-size:1.3rem;line-height:1.15}
/* 出=紅、入=綠：顏色+方向雙重編碼，取代兩個長很像的 emoji */
.tb.tb-out:not(.active){color:#C93B3B}
.tb.tb-in:not(.active){color:#0E8A62}
.tb.active{color:#fff;background:var(--p)}
.tb.active .tb-icon{transform:translateY(-1px)}
/* 任務大按鈕（首頁）：跟底部分頁同色同圖示，看一次學會兩處 */
.task-btn{display:flex;align-items:center;gap:.7rem;width:100%;border:none;border-radius:14px;padding:.85rem .95rem;margin-bottom:.5rem;font-weight:800;font-size:1rem;text-align:left;color:#fff;cursor:pointer;font-family:inherit;box-shadow:var(--sh-md)}
.task-btn small{display:block;font-weight:500;font-size:.74rem;opacity:.9;margin-top:.1rem}
.task-btn .tk-ic{font-size:1.45rem;flex-shrink:0;font-weight:900;line-height:1}
.task-red{background:#C93B3B}.task-green{background:#0E8A62}.task-blue{background:#3B5BC9}

.more-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;padding:.9rem .7rem}
.more-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:1rem .8rem;text-align:center;cursor:pointer;box-shadow:var(--sh-sm);font-family:inherit;transition:.15s}

.more-card .mi{font-size:1.7rem;display:block;margin-bottom:.3rem}
.more-card .mt{font-weight:800;font-size:.95rem;color:var(--dark);display:block}
.more-card .md{font-size:.75rem;color:var(--muted);margin-top:.15rem;display:block}
/* 切分頁不再對整個大區塊跑 fadeIn 動畫（大清單時是卡頓主因）；off-screen 區塊用 content-visibility 省下版面計算 */
.sec{display:none;contain:layout style}.sec.active{display:block}

  .ship-name{font-size:1.02rem}
  .ship-tag{font-size:.86rem}
}
.sc{background:#fff;padding:1.1rem;border-radius:16px;text-align:center;border:1px solid var(--border);box-shadow:var(--sh-sm)}
.sc-val{font-size:2.1rem;font-weight:800;color:var(--p);line-height:1.2;letter-spacing:-.02em}
.ig{margin:.6rem 0}
.ig label{display:block;margin-bottom:.35rem;font-weight:600;font-size:.85rem;color:var(--ink2)}
input,textarea,select{width:100%;padding:.68rem .75rem;border:1px solid var(--border-input);border-radius:10px;font-size:.95rem;font-family:inherit;background:#fff;color:var(--dark);transition:border-color .15s,box-shadow .15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(79,70,229,.14)}
textarea{resize:vertical;min-height:75px}
.fr{display:flex;gap:.6rem}.fr .ig{flex:1}
.btn{padding:.7rem 1.1rem;border:none;border-radius:10px;font-size:.92rem;font-weight:700;letter-spacing:.01em;cursor:pointer;transition:background .15s,transform .1s,box-shadow .15s;display:inline-flex;align-items:center;justify-content:center;gap:.35rem}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--p);color:#fff;box-shadow:0 1px 2px rgba(79,70,229,.30)}.btn-p:hover{background:var(--s)}
.btn-s{background:#fff;color:var(--ink2);border:1px solid var(--border-input)}.btn-s:hover{background:var(--light);border-color:#B9C0CA}
.btn-d{background:var(--danger);color:#fff;box-shadow:0 1px 2px rgba(220,38,38,.25)}.btn-ok{background:var(--ok);color:#fff;box-shadow:0 1px 2px rgba(5,150,105,.25)}
.btn-warn{background:var(--warn);color:#fff}
.btn-full{width:100%;margin-top:.7rem}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.qc{display:flex;gap:.4rem;align-items:center;background:var(--light);border-radius:10px;padding:.35rem;border:1px solid var(--border)}
.qb{width:40px;height:40px;flex-shrink:0;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-size:1.15rem;font-weight:700;box-shadow:var(--sh-sm);display:flex;align-items:center;justify-content:center}
.qi{flex:1;text-align:center;font-size:1.1rem;font-weight:700;border:none;background:transparent}
.sr{display:flex;justify-content:space-between;align-items:center;padding:.7rem 0;border-bottom:1px solid var(--border)}
.sr:last-child{border:none}
.sl{color:var(--ink2);font-size:.9rem}
.sv{font-weight:600;font-size:.95rem}
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:rgba(16,24,40,.92);backdrop-filter:blur(8px);color:#fff;padding:.75rem 1.4rem;border-radius:18px;z-index:500;white-space:normal;max-width:88vw;width:max-content;text-align:center;line-height:1.45;font-size:.9rem;font-weight:500;box-shadow:var(--sh-lg);animation:toastIn .3s cubic-bezier(.23,1,.32,1)}
.toast-err{background:rgba(153,27,27,.95)}
.toast-ok{background:rgba(6,95,70,.95)}
.toast.out{animation:toastOut .18s cubic-bezier(.23,1,.32,1) forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(16px)}}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center}
.modal-ov.open{display:flex}
.modal-ov.closing{transition:background .18s cubic-bezier(.23,1,.32,1);background:rgba(0,0,0,0)}
.modal-ov.closing .modal{transition:transform .18s cubic-bezier(.23,1,.32,1);transform:translateY(100%)}
.modal{background:#fff;border-radius:22px 22px 0 0;padding:1.4rem;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;animation:mIn .25s cubic-bezier(.23,1,.32,1);box-shadow:var(--sh-lg)}
@keyframes mIn{from{transform:translateY(100%)}to{transform:none}}
@media (prefers-reduced-motion: reduce){
  .toast,.modal{animation:none}
  .toast.out{animation:none;transition:opacity .15s ease;opacity:0}
  .modal-ov.closing,.modal-ov.closing .modal{transition:opacity .15s ease;transform:none}
  .modal-ov.closing{opacity:0}
}
.modal-title{font-size:1.05rem;font-weight:700;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
.mcl{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);min-width:44px;min-height:44px;display:grid;place-items:center;border-radius:8px}.mcl:active{background:var(--light)}
.tab-nav{display:flex;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:0;z-index:10;overflow-x:auto}
.tsw{flex:1;min-width:max-content;padding:.7rem .6rem;border:none;background:none;cursor:pointer;font-weight:600;color:var(--muted);font-size:.86rem;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:.15s}
.tsw.act{color:var(--p);border-bottom-color:var(--p)}
.tc{display:none}.tc.active{display:block}
.ic{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:.6rem;text-align:center;cursor:pointer;transition:.2s;position:relative;overflow:hidden;box-shadow:var(--sh-sm)}
.ic:hover{transform:translateY(-1px);box-shadow:var(--sh-md)}
.ic.sel{border-color:var(--p);background:#EEF2FF;box-shadow:0 0 0 3px rgba(79,70,229,.12)}
.ic.low{border-color:var(--danger)}
.ic-name{font-weight:600;font-size:.9rem;line-height:1.3;color:var(--dark);margin-bottom:.15rem;word-break:break-word}
.ic-qty{font-size:.82rem;color:var(--ink2)}
.ic-qty.low{color:var(--danger);font-weight:600}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(75px,1fr));gap:.6rem;padding:.7rem}
.pc{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:.6rem;text-align:center;cursor:pointer;transition:.2s;box-shadow:var(--sh-sm)}
.pc:hover{transform:translateY(-1px);box-shadow:var(--sh-md)}
.pc.sel{border-color:var(--p);background:#EEF2FF;box-shadow:0 0 0 3px rgba(79,70,229,.12)}
.av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;margin:0 auto .35rem}
.pn{font-weight:600;font-size:.82rem;word-break:break-word}
.ab{padding:.75rem .9rem;border-radius:12px;margin:.5rem .7rem;font-size:.9rem}
.ab-d{background:#FEF2F2;border-left:4px solid var(--danger);color:#991B1B}
.ab-w{background:#FFFBEB;border-left:4px solid var(--warn);color:#92400E}
.ri{background:#fff;padding:.9rem;margin:.45rem .7rem;border-radius:14px;border:1px solid var(--border);box-shadow:var(--sh-sm)}
.rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.rp{font-weight:700;font-size:.93rem}
.badge{padding:.2rem .6rem;border-radius:20px;font-size:.74rem;font-weight:700}
.b-p{background:#FEF3C7;color:#92400E}.b-a{background:#DCFCE7;color:#15803D}.b-r{background:#FEE2E2;color:#991B1B}
.rd{font-size:.78rem;color:var(--muted);margin-bottom:.35rem}
.rc{color:var(--ink2);font-size:.9rem;line-height:1.55;margin-bottom:.5rem}
.ra{display:flex;gap:.4rem}.ra .btn{flex:1;padding:.5rem;font-size:.82rem}
.tx{background:#fff;padding:.85rem;margin:.4rem .7rem;border-radius:12px;border:1px solid var(--border);border-left:4px solid var(--p);display:flex;justify-content:space-between;align-items:center;box-shadow:var(--sh-sm)}
.tx.out{border-left-color:var(--danger)}

.txl .txd{font-size:.8rem;color:var(--ink2);margin-top:.15rem}
.txr{text-align:right}
.tdel{background:none;border:none;cursor:pointer;color:var(--danger);font-size:.95rem;min-width:38px;min-height:38px;padding:.35rem .45rem;border-radius:8px}
.tdel:hover{background:#FEF2F2}
.tedit{background:none;border:none;cursor:pointer;color:var(--p);font-size:.95rem;min-width:38px;min-height:38px;padding:.35rem .45rem;border-radius:8px}
.tedit:hover{background:#EEF2FF}
.txq{font-weight:700;font-size:1rem}
.txq.out{color:var(--danger)}.txq.in{color:var(--ok)}
.txt{font-size:.75rem;color:var(--muted);margin-top:.15rem}
.st{font-size:1rem;font-weight:700;padding:.75rem .8rem .3rem;color:var(--dark)}
.ai-list{display:flex;flex-direction:column;gap:.4rem;margin:.4rem .7rem}

.ai-cat-tg{display:inline-flex;align-items:center;gap:.3rem;font-size:.78rem;font-weight:800;color:#fff;background:var(--p);border-radius:16px;padding:.3rem .75rem;flex-shrink:0}

.ai-name{font-weight:600;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.ai-link{color:var(--p);font-size:.75rem}

.spin{display:inline-block;width:30px;height:30px;border:3px solid var(--light);border-top:3px solid var(--p);border-radius:50%;animation:spin 1s linear infinite}

.pk{padding:.9rem;border:1.5px solid var(--border);background:#fff;border-radius:10px;cursor:pointer;font-size:1.25rem;font-weight:600;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.pk:hover{background:var(--light)}
.pk:active{transform:scale(.95)}
.low-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;padding:1rem}

.low-box{background:#fff;border-radius:20px;padding:2rem;width:100%;max-width:420px;border-top:8px solid var(--danger);box-shadow:0 20px 60px rgba(0,0,0,.4)}
.low-title{color:var(--danger);font-weight:800;font-size:1.3rem;margin-bottom:1rem;line-height:1.3}
.amb-row{display:flex;align-items:center;justify-content:space-between;padding:.55rem .9rem;border-bottom:1px solid #F3F4F6;gap:.6rem}
.amb-row.amb-empty{opacity:.35}
.amb-info{display:flex;align-items:center;gap:.55rem;flex:1;min-width:0}
.amb-th{width:60px;height:60px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:zoom-in}
.amb-th-ph{width:60px;height:60px;border-radius:8px;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0}
.img-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem;cursor:zoom-out}
.amb-name{font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.amb-stk{font-size:.82rem;color:var(--ink2);margin-top:.1rem}
.amb-stk.low{color:var(--danger);font-weight:600}
.login-wrap{display:flex;flex-direction:column;align-items:center;padding:2.5rem 1.5rem;text-align:center}
.login-person-btn{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:1.2rem 1rem;display:flex;justify-content:center;align-items:center;cursor:pointer;transition:.2s;text-align:center;font-family:inherit;width:100%;min-height:56px}
.login-person-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.login-people-wrap{width:100%;max-width:320px;margin-bottom:1rem}
#ls-people-select{width:100%;padding:.85rem 1rem;font-size:1.05rem;font-weight:700;border:1.5px solid var(--border);border-radius:12px;background:#fff;color:var(--dark)}

/* 手機是個人裝置、每人只登入一次，用下拉選單省空間；平板/桌面在倉庫現場共用給多人，

<script>
// Service Worker 注册和更新检测
if('serviceWorker' in navigator){
  // 更新協定：新版先 waiting → 提示使用者 → 使用者按「Perbarui」→ 送 SKIP_WAITING → 接管後
  // 只 reload 一次。首次安裝與自發更新都不會重載，避免作業中被打斷。
  var swReloading=false;
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    // 只有使用者剛剛接受過更新才重載；首次安裝（controller 從無到有）不重載。
    if(!swReloading)return;
    swReloading=false;
    window.location.reload();
  });
  navigator.serviceWorker.register('/sw.js').then(function(reg){
    function promptUpdate(sw){
      // 只有「已經有舊版在控制中」才提示——首次安裝不打擾。
      if(!sw||!navigator.serviceWorker.controller)return;
      showToast('🔄 Ada versi baru','Perbarui',function(){
        swReloading=true;
        sw.postMessage({type:'SKIP_WAITING'});
      });
    }
    if(reg.waiting)promptUpdate(reg.waiting); // 開頁時就已有等待中的新版
    reg.addEventListener('updatefound',function(){
      var newSW=reg.installing;
      if(!newSW)return;
      newSW.addEventListener('statechange',function(){
        if(newSW.state==='installed')promptUpdate(newSW); // 安裝完成、進入 waiting 時提示
      });
    });
    setInterval(function(){reg.update();},60000);
  }).catch(function(e){console.warn('SW 註冊失敗:',e);});
}

var ADMIN_PIN_LEN = 6; // 只是 UI 顯示位數，非機密
// 呼叫後端驗證 admin PIN，回傳 Promise<boolean>
// 回傳角色字串 'super' / 'office'，失敗回 false。
// 舊版 verify-admin 只回 {ok:true} 沒有 role → 當成 super（向後兼容）
function verifyAdminPin(pin){
  return new Promise(function(resolve){
    initSupabase(function(){
      sb.functions.invoke('verify-admin',{body:{pin:String(pin||'')}})
        .then(function(r){var d=r&&r.data;resolve(d&&d.ok?(d.role||'super'):false);})
        .catch(function(){resolve(false);});
    },function(){resolve(false);});

var APIN_BUF='',APIN_CB=null,APIN_CANCEL=null;
function showAdminPinPad(cb,onCancel){
  APIN_BUF='';APIN_CB=cb;APIN_CANCEL=onCancel||null;
  var dots='';for(var i=0;i<6;i++)dots+='<div class="pin-dot"></div>';
  var keys=['1','2','3','4','5','6','7','8','9','⌫','0','✕'];
  showModal('🔐 PIN Admin',
    '<div style="text-align:center;padding:.3rem 0 .6rem">'+
    '<div class="pin-dots" id="apin-dots">'+dots+'</div>'+
    '<div id="apin-err" style="color:var(--danger);font-size:.85rem;font-weight:700;min-height:1.3em;margin:.2rem 0"></div>'+
    '<div class="pin-pad" id="apin-pad">'+keys.map(function(k){
      return '<button class="pk" onclick="apinKey(\''+k+'\')">'+k+'</button>';
    }).join('')+'</div></div>');
  // ✕（右上角/背景點擊）視為取消
  var mcl=document.querySelector('#m-ov .mcl');
  if(mcl)mcl.onclick=function(){apinAbort();};
  var ov=document.getElementById('m-ov');
  if(ov)ov.addEventListener('click',function(e){if(e.target===ov)apinAbort();});
}
function apinAbort(){var c=APIN_CANCEL;APIN_CB=null;APIN_CANCEL=null;closeModal();if(c)c();}
function apinDots(){
  var ds=document.querySelectorAll('#apin-dots .pin-dot');
  ds.forEach(function(d,i){d.className='pin-dot'+(i<APIN_BUF.length?' f':'');});
}
function apinKey(k){
  if(k==='✕'){apinAbort();return;}
  if(k==='⌫'){APIN_BUF=APIN_BUF.slice(0,-1);apinDots();return;}
  if(APIN_BUF.length>=6)return;
  APIN_BUF+=k;apinDots();
  if(APIN_BUF.length===6&&APIN_CB){
    var pad=document.getElementById('apin-pad');
    if(pad){pad.style.pointerEvents='none';pad.style.opacity='.5';}
    var err=document.getElementById('apin-err');if(err)err.textContent='⏳ Memeriksa...';
    APIN_CB(APIN_BUF);
  }
}
function apinFail(msg){
  APIN_BUF='';apinDots();
  var pad=document.getElementById('apin-pad');
  if(pad){pad.style.pointerEvents='';pad.style.opacity='';}
  var err=document.getElementById('apin-err');if(err)err.textContent=msg||t('wrongPin');
}

var ADMIN_PIN_MEM='';
// people 的新增/更新/刪除全部改走後端 manage-people（service_role + admin PIN 授權），
// 前端不再直接寫 people，避免任何人用公開 anon key 把自己設成 admin。
async function managePeople(action,opts){
  if(!ADMIN_PIN_MEM){
    // 用 PIN 盤要求輸入（重新整理後記憶體 PIN 會消失時才會走到這）
    var p=await new Promise(function(res,rej){
      showAdminPinPad(function(pin){closeModal();res(pin);},function(){rej(new Error('Dibatalkan'));});
    });
    ADMIN_PIN_MEM=String(p);
  }
  var body=Object.assign({admin_pin:ADMIN_PIN_MEM,action:action},opts||{});
  var r=await sb.functions.invoke('manage-people',{body:body});
  if(r.error)throw new Error(r.error.message||'Gagal');
  if(!r.data||!r.data.ok){
    var msg=(r.data&&r.data.error)||'Gagal';
    if(msg==='unauthorized'){ADMIN_PIN_MEM='';throw new Error('PIN Admin salah, coba lagi');}
    throw new Error(msg);
  }
  return r.data;
}

// Performance indexes: built once per data load to avoid O(n²) lookups during render
var IDX={variantsById:{},itemsById:{},itemsByIdWh:{},batchesByItem:{},sortedByRatio:[]};
function buildIndexes(){
  IDX.variantsById={};
  IDX.itemsById={};
  IDX.itemsByIdWh={};
  IDX.batchesByItem={};
  var k,b,arr,id;
  // Index by variant_id (不用item_id，因為同item可能多倉庫)
  // itemsById 用 item.id 當 key：在「Semua Gudang」畫面 DATA.items 混著全部倉庫的
  // variant，同一個 item_id 在不同倉庫各有一筆，後載入的會靜靜蓋掉先載入的——qty/
  // critical_qty/warehouse_id 這些「每倉庫各自不同」的欄位就可能回傳錯的倉庫。
  // itemsByIdWh 用「warehouse_id|item_id」當 key 保留每倉庫各自一份，itemById() 帶
  // 倉庫 id 時優先查這份，查不到才退回 itemsById（單一倉庫畫面下兩者本來就一致）。
  for(k=0;k<DATA.items.length;k++){
    IDX.variantsById[DATA.items[k].variant_id]=DATA.items[k];
    IDX.itemsById[DATA.items[k].id]=DATA.items[k];
    IDX.itemsByIdWh[(DATA.items[k].warehouse_id||'')+'|'+DATA.items[k].id]=DATA.items[k];
  }
  for(k=0;k<DATA.batches.length;k++){
    b=DATA.batches[k];
    b._expT=b.expiry_date?new Date(b.expiry_date).getTime():Infinity;
    b._creT=b.created_at?new Date(b.created_at).getTime():0;
    if(b.qty_remaining>0){
      arr=IDX.batchesByItem[b.item_id]||(IDX.batchesByItem[b.item_id]=[]);
      arr.push(b);
    }
  }
  for(id in IDX.batchesByItem){
    IDX.batchesByItem[id].sort(function(a,b){
      if(a.expiry_date&&b.expiry_date)return a._expT-b._expT;
      if(a.expiry_date)return -1;if(b.expiry_date)return 1;
      return a._creT-b._creT;
    });
  }
  // 快取排序結果：按 qty/critical_qty 比例排序（库存紧迫度）
  IDX.sortedByRatio=DATA.items.slice().sort(function(a,b){
    var ra=a.critical_qty>0?a.qty/a.critical_qty:99;
    var rb=b.critical_qty>0?b.qty/b.critical_qty:99;
    return ra-rb;
  });
}
function itemById(id,warehouseId){
  // 用 buildIndexes 建好的 item_id 索引 O(1) 查找（取代原本 O(n) 線性掃描）。
  // warehouseId 有給時優先查 itemsByIdWh（Semua Gudang 混合多倉庫時才不會撈到別倉的 qty）。
  if(warehouseId&&IDX.itemsByIdWh&&IDX.itemsByIdWh[warehouseId+'|'+id])return IDX.itemsByIdWh[warehouseId+'|'+id];
  if(IDX.itemsById&&IDX.itemsById[id])return IDX.itemsById[id];
  return null;
}

function pWhPerm(p,w,kind){
  var wp=p&&p.perms&&w?p.perms[w]:null;
  if(wp&&typeof wp[kind]==='boolean')return wp[kind];
  if(!p)return false;
  if(kind==='ambil')return p.can_ambil!==false;
  if(kind==='opname')return !!p.is_admin; // 盤點預設只有 admin，其他人要另外開
  if(kind==='produksi'||kind==='kirim')return !!p.is_admin; // 生產/出貨預設只有 admin，其他人要另外開
  if(p.can_masuk===true)return true;
  if(p.can_masuk===false)return false;
  return !!p.is_admin;
}

function startQrDetect(){
  if('BarcodeDetector' in window){
    try{
      var bd=new BarcodeDetector({formats:['qr_code']});
      var vid=document.getElementById('qr-vid');
      QR_DETECT_INT=setInterval(function(){
        if(!vid||!document.getElementById('qr-vid'))return;
        bd.detect(vid).then(function(codes){
          if(codes.length){stopQrCamera();closeModal();onQrScan(codes[0].rawValue);}
        }).catch(function(){});
      },300);
      return;
    }catch(e){}
  }
  loadScript('https://cdn.jsdelivr.net/npm/jsqr@1/dist/jsQR.js',function(){
    var vid=document.getElementById('qr-vid');
    var cvs=document.getElementById('qr-cvs');if(!cvs)return;
    var ctx=cvs.getContext('2d');
    QR_DETECT_INT=setInterval(function(){
      if(!vid||!document.getElementById('qr-vid')||!vid.videoWidth)return;
      cvs.width=vid.videoWidth;cvs.height=vid.videoHeight;
      ctx.drawImage(vid,0,0);
      var img=ctx.getImageData(0,0,cvs.width,cvs.height);
      var code=jsQR&&jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
      if(code&&code.data){stopQrCamera();closeModal();onQrScan(code.data);}
    },300);
  },function(){toast('⚠ '+('Browser tidak support scan'));stopQrCamera();closeModal();});
}

// loadAll 與 refreshPeople 共用，避免權限同步邏輯重複兩份。
function syncMyPerms(){
  if(!CURRENT_USER||IS_SUPER||CURRENT_USER.id==null)return;
  var me=DATA.people.find(function(x){return x.id==CURRENT_USER.id;});
  if(!me)return;
  CURRENT_USER.can_ambil=me.can_ambil;
  CURRENT_USER.can_masuk=me.can_masuk;
  CURRENT_USER.can_view_pricing=me.can_view_pricing;
  CURRENT_USER.is_admin=!!me.is_admin;
  CURRENT_USER.perms=me.perms||null;
  if(me.warehouses)CURRENT_USER.warehouses=me.warehouses;
  IS_ADMIN=!!me.is_admin;
  try{
    var ss=JSON.parse(localStorage.getItem('staff_sess')||'null');
    if(ss){ss.can_ambil=me.can_ambil;ss.can_masuk=me.can_masuk;ss.can_view_pricing=me.can_view_pricing;ss.is_admin=!!me.is_admin;ss.perms=me.perms||null;if(me.warehouses)ss.warehouses=me.warehouses;localStorage.setItem('staff_sess',JSON.stringify(ss));}
  }catch(e){}
}
// 輕量刷新：只重抓 people 表並就地更新員工清單。不動庫存/請求/設定，也不砍
// 掉 #mc（admin 每次改權限/改名/PIN 後畫面不再亂跳、不再等一輪全站網路）。
// 欄位缺失（migration 未跑）或任何其他例外（渲染出錯等）都退回完整 loadAll。
// 絕不對呼叫端拋錯：否則「新增/改名已成功寫入 DB」會被呼叫端的 catch 誤判成
// 失敗，顯示「Gagal」還害輸入框已清空、使用者以為要重試而重複新增。
async function refreshPeople(){
  try{
    var p=await sb.from('people').select('id,name,is_admin,warehouses,can_view_pricing,can_ambil,can_masuk,perms').order('name');
    if(p.error)throw p.error;
    DATA.people=p.data||[];
    try{localStorage.setItem('cached_people',JSON.stringify(DATA.people));}catch(e){}
    syncMyPerms();
    var pe=document.getElementById('pe-list');
    if(pe)pe.innerHTML=peListHTML();
  }catch(e){
    console.warn('refreshPeople gagal, fallback ke loadAll:',e&&e.message);
    await loadAll();
  }
}
// item_variants + items(join) 攤平成單一物件。loadAll 與 refreshInventory 共用，
// 避免兩份攤平邏輯漂移。
function flattenItems(ivData){
  return (ivData||[]).map(function(v){
    var itm=v.items||{};
    return{
      id:v.item_id,variant_id:v.id,
      name:itm.name||'?',code:itm.code,spec:itm.spec,pcs_per_ctn:itm.pcs_per_ctn,description:itm.description,
      image_url:itm.image_url,supplier_name:itm.supplier_name,supplier_url:itm.supplier_url,supplier_whatsapp:itm.supplier_whatsapp,
      unit:itm.unit,storage_condition:itm.storage_condition,coa_url:itm.coa_url,tags:itm.tags,
      remark:itm.remark,production_date:itm.production_date,expiry_date:itm.expiry_date,
      qty:v.qty,critical_qty:v.critical_qty,storage_photo_url:v.storage_photo_url,warehouse_id:v.warehouse_id
    };
  });
}
// ── 頁面切換「長久解法」的核心：分頁 ↔ 資料來源 依賴表 ──
// 局部刷新後只讓「資料真的變了的分頁」失效（從 RENDERED_TABS 移除），其餘保持
// 已繪。這樣存一次料/改一筆請求後，切到 QC/分析/歷史等無關分頁是即時的，不再
// 因為以前「每次 loadAll 全清 RENDERED_TABS」而每切一頁都從零重建。
var TAB_DATA={
  home:['inventory','requests'],
  ambil:['inventory'],
  masuk:['inventory'],
  permintaan:['requests'],
  admin:['inventory','people'],
  riwayat:['transactions'],
  analisa:['inventory','transactions']
  // qc/produksi/shipment/referensi(Katalog Supplier) 有自己的 *_LOADED 快取與 ensure 流程，不受這裡影響
};
// 只有 rerenderInventoryActive() 真的認得怎麼「就地重繪」的分頁，才能在自己是目前
// 分頁時被跳過——不然像 analisa（rerenderInventoryActive 沒有它的分支）身為目前分頁時
// 會兩頭落空：沒被就地重繪，RENDERED_TABS 也沒被標記失效，之後切走再切回來還是舊資料，
// 等於永遠卡在失效前的畫面。riwayat 交易編輯已有自己專屬的局部刷新（不靠這裡），這條
// 規則對它只是多一層保險，不影響原本行為。
var LIVE_REDRAW_TABS={home:1,ambil:1,masuk:1,permintaan:1,admin:1};
function invalidateTabs(dataKeys){
  Object.keys(TAB_DATA).forEach(function(tab){
    if(tab===ACTIVE_TAB&&LIVE_REDRAW_TABS[tab])return; // 這幾頁呼叫端會就地重繪
    var hit=TAB_DATA[tab].some(function(d){return dataKeys.indexOf(d)>=0;});
    if(hit)delete RENDERED_TABS[tab];
  });
}
// 就地重繪「目前的庫存相關分頁」，保留捲動/搜尋字。admin 只換商品清單不整頁重建。
function rerenderInventoryActive(){
  var snap=snapshotView();
  var t=ACTIVE_TAB;
  if(t==='home')renderHome();
  else if(t==='ambil')renderAmbil();
  else if(t==='masuk')renderMasuk();
  else if(t==='permintaan')renderPermintaan();
  else if(t==='admin'){
    var aitc=document.getElementById('ait-content');
    if(aitc){aitc.innerHTML='<div class="ai-list'+(VIEW_AI==='grid'?' grid':'')+'">'+aiListHTML()+'</div>';}
    else renderAdminFull();
  }
  updateCartBar();
  restoreView(snap);
}
// 只重抓 requests 表並就地更新（新增/核准/拒絕請求都只動這張表）。不重抓庫存/人員/設定。
async function refreshRequests(){
  try{
    var q=CURRENT_WAREHOUSE
      ? sb.from('requests').select('*').eq('warehouse_id',CURRENT_WAREHOUSE).order('created_at',{ascending:false})
      : sb.from('requests').select('*').order('created_at',{ascending:false});
    var r=await q;
    if(r.error)throw r.error;
    DATA.requests=r.data||[];
    buildIndexes();
    saveWhCache(CURRENT_WAREHOUSE);
    if(ACTIVE_TAB==='permintaan'){var snap=snapshotView();renderPermintaan();restoreView(snap);}
    else if(ACTIVE_TAB==='home'){var s2=snapshotView();renderHome();restoreView(s2);}
    invalidateTabs(['requests']);
  }catch(e){console.warn('refreshRequests fallback:',e&&e.message);await loadAll();}
}
// 只重抓 item_variants + item_batches（領料/收料/新增編輯商品/批次都只動庫存）。
// 不重抓 people/requests/config。錯誤一律退回完整 loadAll，永不把畫面卡死。
async function refreshInventory(){
  try{
    var q1=CURRENT_WAREHOUSE
      ? sb.from('item_variants').select('*, items(*)').eq('warehouse_id',CURRENT_WAREHOUSE).order('items(name)')
      : sb.from('item_variants').select('*, items(*)').order('items(name)');
    var q4=CURRENT_WAREHOUSE
      ? sb.from('item_batches').select('*').eq('warehouse_id',CURRENT_WAREHOUSE).order('expiry_date',{ascending:true})
      : sb.from('item_batches').select('*').order('expiry_date',{ascending:true});
    var res=await Promise.all([q1,q4]);
    if(res[0].error)throw res[0].error;
    DATA.items=flattenItems(res[0].data||[]);
    if(res[1]&&!res[1].error)DATA.batches=res[1].data||[];
    buildIndexes();
    saveWhCache(CURRENT_WAREHOUSE);
    rerenderInventoryActive();
    TX_LOADED=false;
    invalidateTabs(['inventory','transactions']);
    setTimeout(checkLowStock,300);
  }catch(e){console.warn('refreshInventory fallback:',e&&e.message);await loadAll();}
}
async function loadAll(afterCb,fromCache){
  var mySeq=++LOAD_SEQ; // 這次呼叫的序號，用來偵測後續是否被更新的呼叫取代
  setDot('');
  var tOut=new Promise(function(_,rej){setTimeout(function(){rej(new Error('Koneksi timeout (20s), coba lagi'));},20000);});
  try{
    // Transaksi (Riwayat) dimuat terpisah saat tab dibuka - bukan di sini -
    // supaya pemuatan awal lebih ringan & cepat
    var q1,q2,q3,q4;
    // 新架構: item_variants (各倉庫庫存) + items (商品共享信息) + batches + requests
    var q5;
    if(CURRENT_WAREHOUSE){
      q1=sb.from('item_variants').select('*, items(*)').eq('warehouse_id',CURRENT_WAREHOUSE).order('items(name)');
      q2=sb.from('people').select('id,name,is_admin,warehouses,can_view_pricing,can_ambil,can_masuk,perms').order('name');
      q3=sb.from('requests').select('*').eq('warehouse_id',CURRENT_WAREHOUSE).order('created_at',{ascending:false});
      q4=sb.from('item_batches').select('*').eq('warehouse_id',CURRENT_WAREHOUSE).order('expiry_date',{ascending:true});
      q5=sb.from('categories').select('name').eq('warehouse_id',CURRENT_WAREHOUSE).order('name');
    }else{
      q1=sb.from('item_variants').select('*, items(*)').order('items(name)');
      q2=sb.from('people').select('id,name,is_admin,warehouses,can_view_pricing,can_ambil,can_masuk,perms').order('name');
      q3=sb.from('requests').select('*').order('created_at',{ascending:false});
      q4=sb.from('item_batches').select('*').order('expiry_date',{ascending:true});
      q5=sb.from('categories').select('name').order('name');
    }
    // q6：全站設定（office 臨時開放旗標 + 低庫存彈窗設定）；表未建時容錯
    var q6=sb.from('app_config').select('key,value').in('key',['office_view_delivery','alert_config']);
    var results=await Promise.race([Promise.all([q1,q2,q3,q4,q5,q6]),tOut]);
    if(mySeq!==LOAD_SEQ)return; // 過期：使用者已經切到別的倉庫，這批回應不再代表目前狀態
    var iv=results[0],p=results[1],r=results[2],bt=results[3],cg=results[4],cfg=results[5];
    var cfgRows=(cfg&&!cfg.error&&cfg.data)?cfg.data:[];
    var ovdRow=cfgRows.find(function(r2){return r2.key==='office_view_delivery';});
    OFFICE_VIEW_DELIVERY=!!(ovdRow&&ovdRow.value==='1');
    // 低庫存彈窗設定：JSON 存在 app_config.alert_config，解析失敗時用預設值
    var acRow=cfgRows.find(function(r2){return r2.key==='alert_config';});
    ALERT_CFG={mode:'daily',scope:'zero',days:1,snooze:'',vol:'mati'};
    if(acRow&&acRow.value){try{var ac=JSON.parse(acRow.value);if(ac&&typeof ac==='object'){if(ac.mode)ALERT_CFG.mode=ac.mode;if(ac.scope)ALERT_CFG.scope=ac.scope;if(ac.days)ALERT_CFG.days=Math.min(30,Math.max(1,parseInt(ac.days,10)||1));if(ac.snooze)ALERT_CFG.snooze=ac.snooze;if(ac.vol)ALERT_CFG.vol=ac.vol;}}catch(e2){}}
    // categories 表若尚未建立(migration 前)，cg.error 會有值，容錯成空陣列
    DATA.categories=(cg&&!cg.error&&cg.data)?cg.data.map(function(c){return c.name;}):[];
    if(iv.error)throw iv.error;
    // Flatten item_variants + items: 合併成單一物件，便於現有程式碼使用
    DATA.items=flattenItems(iv.data||[]);
    // 容錯：perms / can_ambil / can_masuk 欄位還沒加(migration 未跑)時逐步退回舊欄位清單
    if(p&&p.error){
      p=await sb.from('people').select('id,name,is_admin,warehouses,can_view_pricing,can_ambil,can_masuk').order('name');
    }
    if(p&&p.error){
      p=await sb.from('people').select('id,name,is_admin,warehouses,can_view_pricing').order('name');
    }
    DATA.people=(p&&p.data)||[];
    // 同步「目前登入者」的最新權限：super admin 剛切了 📤/📥/💰/👑 開關，
    // 員工這邊下一次載入（切倉/重整/交易後）就生效，不用登出重登
    syncMyPerms();
    DATA.requests=r.data||[];
    DATA.batches=bt?bt.data||[]:[];
    DATA.transactions=[];TX_LOADED=false;TX_OFFSET=0;TX_HAS_MORE=false;
    buildIndexes();DATA_READY=true;
    try{localStorage.setItem('cached_people',JSON.stringify(DATA.people));}catch(e){}
    saveWhCache(CURRENT_WAREHOUSE);
    setDot('ok');
    // 二次確認：people 欄位缺失時上面的 fallback 重查也有 await 空隙，理論上切倉可能插在
    // 那之間。渲染前再檢查一次序號，過期就不渲染（較新的那次呼叫自己會渲染正確狀態）。
    if(mySeq!==LOAD_SEQ)return;
    // 同倉庫的資料重載（存檔/核准/交易後）不可以把使用者「彈走」：
    // 重繪前記住捲動位置與搜尋字，重繪後原地還原。換倉庫是新情境，不還原。
    var sameWh=(LAST_LOADED_WAREHOUSE===CURRENT_WAREHOUSE);
    LAST_LOADED_WAREHOUSE=CURRENT_WAREHOUSE;
    var snap=sameWh?snapshotView():null;
    renderAll(); // renderAll 內部已呼叫 renderHome，不要重複渲染（避免雙倍 DOM 建構導致卡頓）
    restoreView(snap);
    if(afterCb)setTimeout(afterCb,0);
    setTimeout(checkLowStock,800);
    // 背景預熱本倉的生產資料，讓第一次點 Produksi / QC 不用等網路（ensure 內部有 *_LOADED 節流，重複呼叫安全）
    idlePreload(function(){
      try{
        var canProd=(typeof canProduksi==='function'&&canProduksi())||IS_OFFICE;
        if(canProd&&CURRENT_WAREHOUSE==='DENIKIN'&&typeof dinEnsure==='function'&&!DIN_LOADED)dinEnsure(function(){},true);
        else if(canProd&&CURRENT_WAREHOUSE==='SJA'&&typeof sjaEnsure==='function'&&!SJA_LOADED)sjaEnsure(function(){},true);
      }catch(_){}
    },2000);
    // Preload gudang lain di background untuk switch cepat（函數內部自帶節流/新鮮度判斷）
    idlePreload(function(){preloadAllWarehouses();},4000);
  }catch(e){
    if(mySeq!==LOAD_SEQ)return; // 過期呼叫的失敗別蓋掉更新那次呼叫已經渲染好的畫面
    setDot('err');
    // Jika data cache sudah tampil, jangan hapus layar - cukup beri tahu
    if(fromCache){toast('⚠ '+('Offline - tampilkan data tersimpan'));if(afterCb)afterCb();return;}
    document.getElementById('mc').innerHTML=
      '<div style="padding:1.5rem;text-align:center">'+
      '<div class="ab ab-d" style="margin-bottom:1rem">⚠ '+e.message+'</div>'+
      '<button class="btn btn-p" onclick="initSupabase(function(){loadAll();},function(e2){toast(\'⚠ \'+e2.message);})">'+('🔄 Coba Lagi')+'</button>'+
      '</div>';
  }
}

var RENDERED_TABS={};
var ACTIVE_TAB='home'; // 目前所在分頁（renderAll 只重繪這個）
function renderAll(){
  applyNavLang();
  var hdrSub=document.getElementById('hdr-sub');
  if(hdrSub){
    var whLabel=IS_ADMIN?(CURRENT_WAREHOUSE?'Admin · '+CURRENT_WAREHOUSE:'Admin · Semua Gudang'):(CURRENT_WAREHOUSE?(WH_SHORT[CURRENT_WAREHOUSE]||CURRENT_WAREHOUSE):'Manajemen Stok Barang');
    hdrSub.textContent=whLabel;
  }
  updateWhChips();
  var tabAmbil=tbBtn('ambil');
  var tabMasuk=tbBtn('masuk');
  // 分頁依「每人權限」顯示：Ambil/Masuk 由 super admin 在員工列表設定
  if(tabAmbil)tabAmbil.style.display=canAmbil()?'':'none';
  if(tabMasuk)tabMasuk.style.display=canMasuk()?'':'none';
  // 低頻/管理分頁集中在 Lainnya 選單頁；一個都沒有的帳號連 Lainnya 都不顯示
  var tabMore=tbBtn('lainnya');
  if(tabMore)tabMore.style.display=moreEntries().length?'':'none';
  // 只重繪「目前所在的分頁」，其他分頁等切過去時才建（lazy）。
  // 之前每次 loadAll 都整頁砍掉+固定重繪 home，切分頁就得從零重蓋 → 卡頓主因之一
  var SEC_IDS=['home','ambil','masuk','produksi','shipment','permintaan','riwayat','analisa','qc','referensi','admin','lainnya'];
  if(SEC_IDS.indexOf(ACTIVE_TAB)<0)ACTIVE_TAB='home';
  if(ACTIVE_TAB==='ambil'&&!canAmbil())ACTIVE_TAB='home';
  if(ACTIVE_TAB==='masuk'&&!canMasuk())ACTIVE_TAB='home';
  if(ACTIVE_TAB==='produksi'&&!canProduksi()&&!IS_OFFICE)ACTIVE_TAB='home';
  if(ACTIVE_TAB==='shipment'&&!canKirim())ACTIVE_TAB='home';
  if(!IS_ADMIN&&(ACTIVE_TAB==='riwayat'||ACTIVE_TAB==='admin'||ACTIVE_TAB==='referensi'))ACTIVE_TAB='home';
  if(!IS_SUPER&&ACTIVE_TAB==='analisa')ACTIVE_TAB='home';
  if(!IS_ADMIN&&ACTIVE_TAB==='qc')ACTIVE_TAB='home';
  // 分頁骨架只在第一次建立。存檔/編輯/切倉後重繪時，若骨架已存在就「不砍 #mc」——
  // 只切換目前分頁的 active，再重繪目前分頁即可（下方）。之前每次都 innerHTML 整片重蓋，
  // 11 個 section 全毀重建 → 新增/編輯時畫面亂跳、切分頁還得從零重繪的主因。
  var mc=document.getElementById('mc');
  if(!mc.querySelector('.sec')){
    mc.innerHTML=SEC_IDS.map(function(s){
      return '<div id="'+s+'" class="sec'+(s===ACTIVE_TAB?' active':'')+'"></div>';
    }).join('');
  }else{
    SEC_IDS.forEach(function(s){var el=document.getElementById(s);if(el)el.classList.toggle('active',s===ACTIVE_TAB);});
  }
  // 高亮改用 data-tab 對應（不再依賴按鈕順序）；身在 Lainnya 子頁時高亮 Lainnya
  document.querySelectorAll('.tb').forEach(function(b){
    var dt=b.getAttribute('data-tab');
    b.classList.toggle('active',dt===ACTIVE_TAB||(MORE_TABS[ACTIVE_TAB]&&dt==='lainnya'));
  });
  RENDERED_TABS={};
  RENDERED_TABS[ACTIVE_TAB]=true;
  if(ACTIVE_TAB==='home')renderHome();
  else if(ACTIVE_TAB==='ambil')renderAmbil();
  else if(ACTIVE_TAB==='masuk')renderMasuk();
  else if(ACTIVE_TAB==='produksi')renderProduksi();
  else if(ACTIVE_TAB==='shipment')renderShipment();
  else if(ACTIVE_TAB==='permintaan')renderPermintaan();
  else if(ACTIVE_TAB==='riwayat')renderRiwayat();
  else if(ACTIVE_TAB==='analisa')renderAnalisa();
  else if(ACTIVE_TAB==='qc')renderQC();
  else if(ACTIVE_TAB==='referensi')renderReferensi();
  else if(ACTIVE_TAB==='admin')renderAdmin();
  else if(ACTIVE_TAB==='lainnya')renderLainnya();
  updateCartBar();
  var hsb=document.getElementById('hdr-search-btn');
  if(hsb)hsb.style.display=(CURRENT_USER&&CURRENT_WAREHOUSE)?'':'none';
}

// 首頁庫存列：名稱＋編號、規格/包裝說明、供應商，右側 現量/低標 單位
function homeStockRowHTML(i){
  var ratio=i.critical_qty>0?i.qty/i.critical_qty:2;
  var dot=ratio<=0?'❌':ratio<=1?'🟠':'🟢';
  var meta=[];
  var dd=descDisplay(i);
  if(i.spec)meta.push('📐 '+esc(i.spec));                   // 規格欄（每包幾公斤等）
  else if(dd)meta.push(esc(dd));      // 沒填規格才退回描述
  if(i.supplier_name)meta.push('🏢 '+esc(i.supplier_name));
  return '<div class="srch-stock" data-name="'+esc((i.name||'').toLowerCase()+' '+(i.code||'').toLowerCase())+'" style="display:flex;align-items:center;padding:.45rem .9rem;border-bottom:1px solid #F3F4F6;gap:.4rem">'+
    '<span style="font-size:1rem;flex-shrink:0">'+dot+'</span>'+
    '<div style="flex:1;min-width:0">'+
      '<div style="font-weight:600;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:.3rem">'+esc(i.name)+
        (i.code?'<span style="font-size:.66rem;font-weight:800;color:var(--s);background:#EEF2FF;border:1px solid #E0E7FF;border-radius:5px;padding:0 .3rem;flex-shrink:0">'+esc(i.code)+'</span>':'')+
        (i.storage_photo_url?'<button onclick="showImg(\''+jsq(i.storage_photo_url)+'\',\''+jsq(i.name)+' - Tempat Simpan\',\'📍\')" style="background:none;border:none;cursor:pointer;font-size:.85rem;color:var(--p);padding:0;flex-shrink:0" title="Tempat Simpan">📍</button>':'')+'</div>'+
      (meta.length?'<div style="font-size:.78rem;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.05rem">'+meta.join(' · ')+'</div>':'')+

// ── 🔍 首頁全域庫存搜尋：目前倉用即時 DATA，其他倉用 preloadAllWarehouses 的快取 ──
function gsItems(){
  if(!CURRENT_WAREHOUSE)return DATA.items; // Semua Gudang 視圖本身已含全部倉庫
  var whs=IS_ADMIN?WAREHOUSES:((CURRENT_USER&&CURRENT_USER.warehouses)||[]);
  var out=DATA.items.slice();
  whs.forEach(function(w){
    if(w===CURRENT_WAREHOUSE)return;
    try{var fc=JSON.parse(localStorage.getItem('wh_cache_'+w)||'null');if(fc&&fc.items)out=out.concat(fc.items);}catch(e){}
  });
  return out;
}
var GS_TIMER=null;
function gsSearch(){clearTimeout(GS_TIMER);GS_TIMER=setTimeout(gsRun,140);}
function gsRun(){
  var inp=document.getElementById('gs-inp'),res=document.getElementById('gs-res');
  if(!inp||!res)return;
  var q=(inp.value||'').toLowerCase().trim();
  if(!q){res.style.display='none';res.innerHTML='';return;}
  // items.id 是全倉共用主檔 → 同品項的各倉庫存聚成同一列
  var seen={},order=[];
  gsItems().forEach(function(i){
    if(((i.name||'')+' '+(i.code||'')).toLowerCase().indexOf(q)<0)return;
    var k=String(i.id||i.name||'');
    if(!seen[k]){seen[k]={name:i.name,code:i.code,unit:i.unit,rows:[]};order.push(k);}
    seen[k].rows.push(i);
  });
  if(!order.length){res.innerHTML='<div style="padding:.7rem .9rem;color:var(--muted);font-size:.85rem">'+Z('Tidak ditemukan')+'</div>';res.style.display='block';return;}
  var html=order.slice(0,30).map(function(k){
    var it=seen[k];
    var chips=it.rows.map(function(r){
      var col=WH_TEXT[r.warehouse_id]||WH_FB_TEXT;
      var qcol=r.qty<=0?'#DC2626':(r.critical_qty>0&&r.qty<=r.critical_qty?'#D97706':'inherit');
      return '<span style="display:inline-flex;align-items:center;gap:.25rem;border:1px solid '+col+'33;background:'+(WH_COLORS[r.warehouse_id]||WH_FB_BG)+'55;border-radius:8px;padding:.12rem .5rem;font-size:.78rem;font-weight:700;color:'+col+'">'+esc(WH_SHORT[r.warehouse_id]||r.warehouse_id||'')+' <b style="color:'+qcol+'">'+r.qty+'</b>'+esc(boxFmt(r.qty,r.pcs_per_ctn))+(r.unit?' <span style="font-weight:500;font-size:.7rem">'+esc(r.unit)+'</span>':'')+'</span>';
    }).join('');
    return '<div style="padding:.55rem .8rem;border-bottom:1px solid #F3F4F6">'+
      '<div style="font-weight:600;font-size:.88rem">'+esc(it.name||'')+(it.code?' <span style="font-size:.66rem;font-weight:800;color:var(--s);background:#EEF2FF;border:1px solid #E0E7FF;border-radius:5px;padding:0 .3rem">'+esc(it.code)+'</span>':'')+'</div>'+
      '<div style="margin-top:.3rem;display:flex;gap:.3rem;flex-wrap:wrap">'+chips+'</div>'+
    '</div>';
  }).join('');
  if(order.length>30)html+='<div style="padding:.5rem .9rem;color:var(--muted);font-size:.78rem">+'+(order.length-30)+' '+Z('lainnya — perjelas kata kunci')+'</div>';
  res.innerHTML=html;
  res.style.display='block';
}

var _audioCtx=null;
var _userInteracted=false;
document.addEventListener('click',function(){_userInteracted=true;if(_audioCtx&&_audioCtx.state==='suspended')_audioCtx.resume();},{once:false,passive:true});
// 提示音量對照：後台「🔔 Peringatan Stok Rendah」卡片可調，存 app_config 全裝置生效。
// 預設 mati：畫面本來就會跳警示彈窗，聲音只是可選的加強
var ALERT_VOL={keras:0.3,sedang:0.12,pelan:0.04,mati:0};
function playNotificationSound(volKey){
  if(!_userInteracted)return;
  var v=ALERT_VOL[volKey||((ALERT_CFG&&ALERT_CFG.vol)||'mati')];
  if(v==null)v=0;
  if(v<=0)return; // 靜音
  try{
    if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(_audioCtx.state==='suspended'){_audioCtx.resume();}
    var oscillator=_audioCtx.createOscillator();
    var gainNode=_audioCtx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(_audioCtx.destination);
    oscillator.frequency.value=800;
    oscillator.type='sine';
    gainNode.gain.setValueAtTime(v,_audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.005,_audioCtx.currentTime+0.5);
    oscillator.start(_audioCtx.currentTime);
    oscillator.stop(_audioCtx.currentTime+0.5);
  }catch(e){}
}
// 設定卡「試聽」：用選到的音量放一聲看大小合不合適
function tesAlertSound(v){_userInteracted=true;playNotificationSound(v);}

function sendTelegram(type,params){

  // 因為 anon key 就在瀏覽器裡，任何前端持有的密鑰都擋不住偽造；改由伺服器端組訊息後，別人
  // 頂多能觸發預定形狀、填自己的參數，無法冒名廣播假警示到員工群。前端只負責把資料丟過去。

// Telegram low-stock throttle：同商品重複提醒間隔，30 天（原本 24h，避免一直轟炸）。
var TG_INTERVAL=30*86400000;
function tgGetNotified(){
  // Reset sekali: kunci lama pakai item.id, sekarang variant_id — item.id lama bisa
  // bentrok dengan variant_id baru (nilai kebetulan sama) dan salah men-throttle notifikasi.
  try{if(!localStorage.getItem('tg_nv2')){localStorage.removeItem('tg_notified');localStorage.setItem('tg_nv2','1');}}catch(e){}
  try{return JSON.parse(localStorage.getItem('tg_notified')||'{}');}catch(e){return {};}
}
function tgSaveNotified(m){try{localStorage.setItem('tg_notified',JSON.stringify(m));}catch(e){}}
// Kunci throttle di sini dulu pakai i.id (item.id, dibagi lintas gudang) sedangkan
// executeAmbilCart pakai variantId (khusus satu gudang) — dua mekanisme beda kunci padahal
// sama-sama nulis ke tg_notified, jadi bisa dobel notif untuk kejadian stok rendah yang sama
// (satu ditandai lewat i.id, satu lewat variant_id, tidak saling kenal), dan di tampilan
// Semua Gudang dua gudang beda yang kebetulan berbagi item.id bisa saling menekan notifnya.
// Disamakan ke variant_id — itu granularitas yang benar karena qty/critical_qty per-gudang.
function checkAndNotifyLow(items){
  var map=tgGetNotified();var now=Date.now();var changed=false;
  items.forEach(function(i){
    var key=i.variant_id||i.id;
    if(i.remark&&i.remark.includes('#noalert')){if(map[key]){delete map[key];changed=true;}return;}
    // qty<=0 視為「新增/尚未進貨的目錄商品」，載入時不通知，避免新增即轟炸
    if(i.qty>0&&i.qty<=i.critical_qty&&i.critical_qty>0){
      var last=map[key]||0;
      if(now-last>=TG_INTERVAL){
        map[key]=now;changed=true;
        sendTelegram('low_stock',{name:i.name,qty:i.qty,unit:i.unit,critical:i.critical_qty,supplier_url:i.supplier_url||''});
      }
    }else if(i.qty>i.critical_qty){
      if(map[key]){delete map[key];changed=true;}
    }
  });
  if(changed)tgSaveNotified(map);
}

function matchesSearch(i,q){
  if(!q)return true;
  if(i.name.toLowerCase().includes(q))return true;
  if(i.code&&i.code.toLowerCase().includes(q))return true;
  if((i.tags||[]).some(function(tg){return tg.toLowerCase().includes(q);}))return true;
  if(i.spec&&i.spec.toLowerCase().includes(q))return true;
  if(i.description&&i.description.toLowerCase().includes(q))return true;
  return false;
}
// UX P1：口語化庫存行（領料/入庫列共用）。
// Habis＝沒了（紅）；低於 critical_qty＝紅字＋hampir habis；其餘綠字。操作表單維持印尼文（見 Z() 註解），故不包 Z()。
// pcs → 「幾箱(+零頭)」輔助顯示。存的永遠是 pcs（單一真相來源），這裡只是換算給人看，
// 所以 pcs_per_ctn 之後改了也不會有資料歪掉的問題，顯示自動跟著新比例走。
function boxFmt(qty,ppc){
  ppc=Number(ppc)||0;qty=Number(qty)||0;
  if(ppc<=0||qty<ppc)return'';
  var b=Math.floor(qty/ppc),r=Math.round((qty-b*ppc)*100)/100;
  return' ('+b+' box'+(r?' + '+r:'')+')';
}

var AMB_SEQ=0; // 分塊渲染序號：搜尋字快速變動時，作廢過期的補渲染
function ambRows(q){
  var items=DATA.items.filter(function(i){return matchesSearch(i,q)&&(!CATG_FILTER||(i.tags||[]).includes(CATG_FILTER));});
  items=items.slice().sort(function(a,b){return (a.qty<=0?1:0)-(b.qty<=0?1:0);}); // 缺貨沉底
  if(!items.length)return'<div style="text-align:center;padding:2rem;color:var(--muted);font-size:.85rem">'+('Tidak ada barang')+'</div>';
  var seq=++AMB_SEQ;
  // 先渲染前 60 筆讓畫面立即可互動，其餘延後補上（商品多時不再整頁卡死）
  var first=items.slice(0,60).map(ambRowHTML).join('');
  if(items.length>60){
    setTimeout(function(){
      if(seq!==AMB_SEQ)return; // 已有更新的渲染，作廢
      var el=document.getElementById('amb-more');
      if(el)el.outerHTML=items.slice(60).map(ambRowHTML).join('');
    },60);
    return first+'<div id="amb-more" style="text-align:center;color:var(--muted);padding:.8rem;font-size:.8rem">⏳ +'+(items.length-60)+'…</div>';
  }
  return first;

// 一鍵回沖剛才的領料：庫存加回 + 補一筆 masuk 交易（FIFO 批次不回沖，管理員可在批次頁手動調整）
var LAST_TAKE=[];
async function undoLastTake(btn){
  if(!LAST_TAKE.length){toast('⚠ Tidak ada yang bisa dibatalkan');return;}
  if(!confirm('Batalkan pengambilan barusan?\nStok akan dikembalikan.'))return;
  btn.disabled=true;btn.textContent='...';
  try{
    for(var i=0;i<LAST_TAKE.length;i++){
      var x=LAST_TAKE[i];
      await atomicAdjustQty(x.variantId,x.qty); // baca-terbaru + compare-and-swap, bukan qty lokal
      var r2=await sb.from('transactions').insert({type:'masuk',item_id:x.itemId,item_name:x.name,person_id:(CURRENT_USER&&CURRENT_USER.id)||null,person_name:(CURRENT_USER?CURRENT_USER.name:'')+' (batal ambil)',qty:x.qty,warehouse_id:CURRENT_WAREHOUSE||null});
      if(r2.error)throw r2.error;
      // Kembalikan qty_remaining persis ke batch yang kepotong saat ambil tadi (lihat batchDed
      // di executeAmbilCart) — dulu qty_remaining tidak pernah dikembalikan sama sekali, jadi
      // tiap "Batalkan Ambil" bikin total item_batches.qty_remaining makin ketinggalan dari
      // item_variants.qty (stok utuh, tapi rincian per-lot di Kelola Lot jadi kurang). Best-effort
      // seperti pemotongannya: variant qty & transaction di atas sudah commit, gagal di sini cuma warning.
      var bds=x.batches||[];
      for(var bj=0;bj<bds.length;bj++){
        try{
          var bd=bds[bj];
          var rbc=await sb.from('item_batches').select('qty_remaining').eq('id',bd.batchId).single();
          if(rbc.error||!rbc.data)continue;
          var newRem=(Number(rbc.data.qty_remaining)||0)+bd.amt;
          var rbu=await sb.from('item_batches').update({qty_remaining:newRem}).eq('id',bd.batchId);
          if(rbu.error)console.warn('[undoLastTake] gagal kembalikan batch',bd.batchId,rbu.error.message);
        }catch(e3){console.warn('[undoLastTake] batch restore exception',e3);}
      }
    }
    LAST_TAKE=[];
    toast('✓ Dibatalkan — stok dikembalikan');
    closeModal();
    await refreshInventory();
  }catch(e){toast('⚠ '+friendlyErr(e));btn.disabled=false;btn.textContent='↩ Salah ambil? Batalkan';}
}
function getAmbilBatches(itemId,qty){
  var result=[];
  // Get batches for current warehouse only
  var abat=DATA.batches.filter(function(b){return b.item_id==itemId&&b.warehouse_id==CURRENT_WAREHOUSE&&b.qty_remaining>0;}).sort(function(a,b){
    if(a.expiry_date&&b.expiry_date)return new Date(a.expiry_date)-new Date(b.expiry_date);
    if(a.expiry_date)return -1;if(b.expiry_date)return 1;
    return new Date(a.created_at)-new Date(b.created_at);
  });
  var remQ=qty;
  for(var bi=0;bi<abat.length&&remQ>0;bi++){
    var bat=abat[bi];
    var ded=Math.min(bat.qty_remaining,remQ);
    result.push({lot_no:bat.lot_no,expiry_date:bat.expiry_date,deduct:ded});
    remQ-=ded;
  }
  return result;
}

// Ambil/Masuk/batal-ambil semua pernah menulis qty pakai "baca lokal (mungkin basi) + qty±delta"
// — dua orang ambil barang yang sama nyaris bersamaan bisa saling timpa (lost update), bahkan
// stok jadi minus tanpa peringatan. Ganti dengan baca-terbaru-lalu-tulis pakai compare-and-swap:
// UPDATE ... WHERE qty = (nilai yang baru dibaca). Kalau 0 baris ter-update, berarti orang lain
// baru saja mengubahnya di antara baca & tulis kita — baca ulang & coba lagi (maks 5x).
async function atomicAdjustQty(variantId,delta,opts){
  var floorZero=opts&&opts.floorZero;
  for(var attempt=0;attempt<5;attempt++){
    var rv=await sb.from('item_variants').select('qty').eq('id',variantId).single();
    if(rv.error)throw rv.error;
    var cur=Number(rv.data&&rv.data.qty)||0;
    var next=cur+delta;
    if(floorZero&&next<0){
      var e=new Error('Stok tidak cukup (sisa '+cur+')');
      e.friendly=true;throw e;
    }
    var upd=await sb.from('item_variants').update({qty:next}).eq('id',variantId).eq('qty',cur).select('qty');
    if(upd.error)throw upd.error;
    if(upd.data&&upd.data.length)return next; // sukses, tak ada yang menimpa di antaranya
    // 0 baris = ditimpa orang lain barusan; ulangi dari baca terbaru
  }
  var e2=new Error('Stok berubah terlalu cepat, coba lagi');
  e2.friendly=true;throw e2;
}
async function executeAmbilCart(){
  closeModal();

  var taken=[]; // 已成功落帳的品項（成功一項就從購物車移除，失敗重按不會重複入帳）
  var batchWarn=[]; // FIFO 批次扣減失敗的品項名（variant/transaction 已成功，不能整項回滾重試，只能警示）
  try{
    for(var ki=0;ki<keys.length;ki++){
      var variantId=keys[ki];var item=DATA.items.find(function(i){return i.variant_id==variantId;});var qty=CART[variantId];
      btn.textContent=(ki+1)+'/'+keys.length+'...';
      // Update item_variants (per-warehouse) instead of items — baca-terbaru + compare-and-swap,
      // bukan qty lokal yang mungkin basi (lihat atomicAdjustQty)
      var newQty=await atomicAdjustQty(variantId,-qty,{floorZero:true});
      var rt=await sb.from('transactions').insert({type:'ambil',item_id:item.id,item_name:item.name,person_id:pid||null,person_name:pname,qty:qty,warehouse_id:CURRENT_WAREHOUSE||null});
      if(rt.error)throw rt.error;
      // FIFO: deduct from batches in current warehouse (filter by item_id AND warehouse_id)
      var abat=DATA.batches.filter(function(b){return b.item_id==item.id&&b.warehouse_id==CURRENT_WAREHOUSE&&b.qty_remaining>0;}).sort(function(a,b){if(a.expiry_date&&b.expiry_date)return new Date(a.expiry_date)-new Date(b.expiry_date);if(a.expiry_date)return -1;if(b.expiry_date)return 1;return new Date(a.created_at)-new Date(b.created_at);});
      var remQ=qty;
      var batchDed=[]; // {batchId,amt} tiap batch yang kepotong — dipakai undoLastTake() buat kembalikan qty_remaining yang tepat
      for(var bi=0;bi<abat.length&&remQ>0;bi++){
        var bat=abat[bi];var ded=Math.min(bat.qty_remaining,remQ);var nr=bat.qty_remaining-ded;
        var rb=await sb.from('item_batches').update({qty_remaining:nr}).eq('id',bat.id);
        // variant qty & transaction di atas SUDAH commit — batch gagal tak boleh membatalkan
        // seluruh item (retry akan dobel-potong variant). Cukup catat + beri tahu, jangan throw.
        if(rb.error){console.warn('[batch update gagal]',item.name,bat.id,rb.error.message);if(batchWarn.indexOf(item.name)<0)batchWarn.push(item.name);break;}
        bat.qty_remaining=nr;remQ-=ded;batchDed.push({batchId:bat.id,amt:ded});
      }
      // Telegram throttle: use variant_id to ensure per-warehouse-item throttling
      if(newQty<=item.critical_qty&&item.critical_qty>0){
        var tgm=tgGetNotified();var lastN=tgm[variantId]||0;
        if(Date.now()-lastN>=TG_INTERVAL){
          tgm[variantId]=Date.now();tgSaveNotified(tgm);
          sendTelegram('low_stock',{name:item.name,qty:newQty,unit:item.unit,critical:item.critical_qty,supplier_url:item.supplier_url||'',taken_by:pname,taken_qty:qty,empty:newQty<=0});
        }
      }
      taken.push({variantId:variantId,itemId:item.id,name:item.name,qty:qty,unit:item.unit,batches:batchDed});
      delete CART[variantId]; // 這一項已完整落帳
    }
    LAST_TAKE=taken; // 供「↩ Batalkan」復原用
    showTakeConfirm(taken);
    if(batchWarn.length)toast('⚠ Stok tersimpan, tapi catatan lot untuk '+batchWarn.join(', ')+' mungkin tidak sinkron — cek Kelola Lot');
    CART={};
    await refreshInventory(); // 只重抓庫存+就地重繪 Ambil，不再全站 loadAll
  }catch(e){
    // 部分成功：已落帳的不在購物車了，剩下的保留，重按只會送失敗的那些
    toast('⚠ '+friendlyErr(e)+(taken.length?' — '+taken.length+' item tersimpan, sisanya masih di keranjang':''));
    var keep=Object.assign({},CART);
    await refreshInventory(); // 同步已扣的庫存（會重繪並清空 CART）
    // Kalau gagalnya karena stok berubah (orang lain barusan ambil juga / CAS retry akhirnya
    // nyerah), qty yang tersisa di keranjang bisa lebih besar dari stok TERBARU — submit ulang
    // tanpa koreksi cuma bakal gagal lagi dengan pesan sama. Sesuaikan dulu ke batas stok
    // terbaru (atau buang kalau sudah habis) sebelum keranjang dikembalikan ke user.
    var clampedNames=[];
    Object.keys(keep).forEach(function(vId){
      var it2=DATA.items.find(function(i){return i.variant_id==vId;});
      if(!it2||it2.qty<=0){clampedNames.push(it2?it2.name:vId);delete keep[vId];return;}
      if(keep[vId]>it2.qty){keep[vId]=it2.qty;clampedNames.push(it2.name);}
    });
    CART=keep;       // 還原未送出的項目（qty 已disesuaikan ke stok terbaru）
    if(clampedNames.length)toast('⚠ Jumlah di keranjang disesuaikan ke stok terbaru: '+clampedNames.join(', '));
    var cw=document.getElementById('amb-cart');if(cw)cw.innerHTML=cartRowsAmb();
    updateCartBar();
    var q=((document.getElementById('asrch')||{}).value||'').toLowerCase();
    var el=document.getElementById('amb-list');if(el)el.innerHTML=AMB_GRID?ambGrid(q):ambRows(q);
  }
  btn=document.getElementById('amb-btn');
  if(btn){btn.disabled=false;btn.textContent=t('doTake');}
}

function cAdjM(variantId,d){

}
function cSetM(variantId,inp){
  var cur=CART_M[variantId]?CART_M[variantId].qty:0;

}

function mskBoxFill(variantId,boxInput){
  var item=DATA.items.find(function(i){return i.variant_id==variantId;});
  var ppc=(item&&item.pcs_per_ctn)||0;if(ppc<=0)return;

}

async function doMasukCart(){
  if(!CURRENT_USER){toast('⚠ Belum login');return;}
  if(!canMasuk()){toast('⚠ Tidak ada akses Masuk');return;}
  var keys=Object.keys(CART_M);
  var sel=document.getElementById('msk-p');
  var pname,pid;
  if(!sel){ // 一般員工：固定用登入者，不經下拉
    pname=CURRENT_USER?CURRENT_USER.name:'';pid=(CURRENT_USER&&CURRENT_USER.id)||null;
  }else{
    pname=(sel.value===''?'':(sel.value==='__new__'?(document.getElementById('msk-pn').value||'').trim():sel.selectedOptions[0]?.text||'')).trim();
    var person=DATA.people.find(function(p){return p.id==sel.value;});
    pid=person?person.id:null;
  }
  if(!pname||!keys.length){toast(t('selBoth'));return;}
  var btn=document.getElementById('msk-btn');btn.disabled=true;btn.textContent='...';
  var done=0;
  try{
    for(var ki=0;ki<keys.length;ki++){
      var variantId=keys[ki];var ci=CART_M[variantId];var item=DATA.items.find(function(i){return i.variant_id==variantId;});var qty=ci.qty;
      btn.textContent=(ki+1)+'/'+keys.length+'...';
      // Update item_variants (per-warehouse) instead of items
      await atomicAdjustQty(variantId,qty); // baca-terbaru + compare-and-swap, bukan qty lokal
      var r2=await sb.from('transactions').insert({type:'masuk',item_id:item.id,item_name:item.name,person_id:pid||null,person_name:pname,qty:qty,warehouse_id:CURRENT_WAREHOUSE||null});
      if(r2.error)throw r2.error;
      // 批次記錄失敗不能靜默吞掉（否則庫存加了、批號/效期/FIFO 卻沒建），用 safe insert 容錯缺欄位
      var r3=await sbInsertSafe('item_batches',{item_id:item.id,warehouse_id:CURRENT_WAREHOUSE||null,lot_no:ci.lot_no||null,code_produksi:ci.code_produksi||null,po_no:ci.po_no||null,do_no:ci.do_no||null,production_date:ci.production_date||null,expiry_date:ci.expiry_date||null,shelf_life:ci.shelf_life||null,unit_price:ci.unit_price||null,supplier:ci.supplier||null,qty_initial:qty,qty_remaining:qty,received_date:today()});
      if(r3.error)throw r3.error;
      delete CART_M[variantId];done++; // 這一項已完整落帳，失敗重送不會重複
    }
    // 留在 Masuk 頁（常常還要繼續收下一批），refreshInventory 會重繪當前分頁
    toast(t('rcvOk')+' ✓');CART_M={};await refreshInventory();
  }catch(e){
    toast('⚠ '+friendlyErr(e)+(done?' — '+done+' item tersimpan, sisanya masih di keranjang':''));
    var keep=Object.assign({},CART_M);
    await refreshInventory(); // 同步庫存（重繪會清空 CART_M）
    CART_M=keep;
    var cw=document.getElementById('msk-cart');if(cw)cw.innerHTML=cartRowsMsk();
    var cnt=document.getElementById('msk-cart-cnt');if(cnt)cnt.textContent=Object.keys(CART_M).length?Object.keys(CART_M).length+' barang':'';
    updateCartBar();
  }
  btn=document.getElementById('msk-btn');
  if(btn){btn.disabled=false;btn.textContent=t('doRcv');}
}

function reqHTML(r){

// LAINNYA — 低頻/管理分頁的入口選單。底部導覽固定 5 格，其餘功能都從這裡進
function moreEntries(){
  var e=[];
  if(PRODUKSI_WH.indexOf(CURRENT_WAREHOUSE)>=0&&(canProduksi()||IS_OFFICE))e.push({id:'produksi',ic:'🏭',n:'Produksi',d:Z('Rendam, potong, hasil produksi')});
  if(KIRIM_WH.indexOf(CURRENT_WAREHOUSE)>=0&&canKirim())e.push({id:'shipment',ic:'🚚',n:'Kirim',d:Z('Pengiriman ke customer')});
  if(IS_ADMIN)e.push({id:'riwayat',ic:'📊',n:t('hist'),d:Z('Riwayat keluar-masuk')});
  if(IS_ADMIN)e.push({id:'qc',ic:'✅',n:'QC',d:Z('Cek mutu & batch')});
  if(IS_ADMIN)e.push({id:'referensi',ic:'🗂️',n:'Katalog Supplier',d:Z('Vendor/produk incaran — simpan sekarang, beli nanti')});

// REFERENSI — katalog supplier/produk incaran, TERPISAH dari inventory.
// Sengaja punya tabel sendiri (product_refs, bukan items): ini cuma catatan
// "barang bagus, mungkin nanti dibeli" — tidak ikut hitungan stok/low-stock/
// CSV inventory. Cari lewat kata kunci nanti, bukan lewat menu Kelola Barang.
// ═══════════════════════════════════════════════════════════
var PRODREF={list:[],loaded:false};
var PR_EDIT=null,PR_PHOTO='',PR_SEARCH='';
var PR_SHARE_LASTNAME=''; // nama terakhir yang diisi otomatis dari paste — supaya tidak menimpa nama yang sudah diedit manual
var PR_PROMOTE=null; // referensi yang sedang di-"Jadikan Stok" — dikonsumsi itemFormHTML/saveItem saat render/simpan form tambah barang
function prodRefEnsure(cb){
  if(PRODREF.loaded){cb&&cb();return;}
  sb.from('product_refs').select('*').order('created_at',{ascending:false}).then(function(r){
    if(r.error){
      var el=document.getElementById('referensi');
      if(el)el.innerHTML='<div class="st">🗂️ Katalog Supplier</div><div class="ab ab-d" style="margin:1rem">⚠ '+esc(friendlyErr(r.error))+'<br><br><span style="font-size:.8rem;color:var(--muted)">Jika tabel belum ada, jalankan migrations/MIGRATION_PRODUCT_REFS.sql di Supabase dulu.</span><br><br><button class="btn btn-p" onclick="renderReferensi()">🔄 Coba lagi</button></div>';
      return;
    }
    PRODREF.list=r.data||[];PRODREF.loaded=true;cb&&cb();
  });
}
function prReload(){PRODREF.loaded=false;prodRefEnsure(renderReferensi);}
function prMatch(p,q){
  if(!q)return true;
  var hay=((p.name||'')+' '+(p.supplier_name||'')+' '+(p.note||'')).toLowerCase();
  return hay.indexOf(q)>=0;
}
function prCardHTML(p){
  return '<div class="card" style="display:flex;gap:.7rem;padding:.8rem" data-pr-id="'+p.id+'">'+
    (p.image_url?'<img src="'+esc(p.image_url)+'" style="width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:pointer" onclick="showImg(\''+jsq(p.image_url)+'\',\''+jsq(p.name)+'\')">':'<div style="width:56px;height:56px;border-radius:8px;flex-shrink:0;background:#F3F4F6;display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--muted)">📦</div>')+
    '<div style="flex:1;min-width:0">'+
      '<div style="font-weight:800;font-size:.95rem;line-height:1.3">'+esc(p.name)+'</div>'+
      (p.supplier_name?'<div style="font-size:.78rem;color:var(--ink2);margin-top:.1rem">🏢 '+esc(p.supplier_name)+'</div>':'')+
      (p.note?'<div style="font-size:.78rem;color:var(--ink2);margin-top:.15rem;white-space:pre-wrap">'+esc(p.note)+'</div>':'')+
      '<div style="display:flex;align-items:center;gap:.4rem;margin-top:.45rem;flex-wrap:wrap">'+
        '<button class="btn btn-ok" style="font-size:.85rem;padding:.4rem .7rem;flex-shrink:0" onclick="prMakeItem('+p.id+')">📦 Jadikan Stok</button>'+
        (p.url?'<a href="'+safeUrl(p.url)+'" target="_blank" rel="noopener noreferrer" style="color:var(--p);font-size:.8rem;text-decoration:underline;padding:.4rem .2rem">🔗 Link</a>':'')+
        (p.supplier_whatsapp?'<a href="'+esc(waLink(p.supplier_whatsapp))+'" target="_blank" rel="noopener noreferrer" style="color:var(--ok);font-size:.8rem;text-decoration:underline;padding:.4rem .2rem">📱 WA</a>':'')+
        '<span style="flex:1"></span>'+
        '<button class="ib" onclick="prShowEdit('+p.id+')" title="Edit">✏️</button>'+
        '<button class="ib" onclick="prDelete('+p.id+')" title="Hapus">🗑️</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}
function renderReferensi(){
  if(!IS_ADMIN){var el0=document.getElementById('referensi');if(el0)el0.innerHTML='<div class="st">🗂️ Katalog Supplier</div><div class="ab ab-d" style="margin:1rem">⚠ Hanya admin</div>';return;}
  if(!PRODREF.loaded){
    document.getElementById('referensi').innerHTML='<div class="st">🗂️ Katalog Supplier</div><div class="loading"><div class="spin"></div><p style="margin-top:.8rem;font-size:.88rem">Memuat...</p></div>';
    prodRefEnsure(renderReferensi);
    return;
  }
  var q=(PR_SEARCH||'').toLowerCase().trim();
  var shown=PRODREF.list.filter(function(p){return prMatch(p,q);});
  document.getElementById('referensi').innerHTML=
    '<div class="st">🗂️ Katalog Supplier &amp; Produk</div>'+
    '<div style="padding:.6rem .7rem 0;font-size:.8rem;color:var(--ink2)">Vendor/produk incaran — tersimpan di sini walau belum dibeli, cari lewat kata kunci kapan saja.</div>'+
    '<div style="padding:.6rem .7rem;display:flex;gap:.5rem">'+
      '<input id="pr-search" type="text" placeholder="🔍 Cari nama, supplier, catatan..." value="'+esc(PR_SEARCH)+'" style="flex:1;padding:.55rem .7rem;border:1.5px solid var(--border);border-radius:8px;font-size:.92rem" oninput="prSearchInput(this.value)">'+
    '</div>'+
    '<div style="padding:0 .7rem"><button class="btn btn-p btn-full" onclick="prShowAdd()">➕ Tambah ke Katalog</button></div>'+
    '<div id="pr-list" style="padding:.7rem;display:flex;flex-direction:column;gap:.6rem">'+
      (shown.length?prListHTML(shown):'<div style="text-align:center;color:var(--muted);padding:2rem;font-size:.9rem">'+(q?'Tidak ada yang cocok 🚫':'Belum ada di katalog — tekan ➕ untuk mulai mencatat')+'</div>')+
    '</div>';
}
// dipisah dari prFilter supaya cap 60 item + tombol "Tampilkan semua" dipakai bareng renderReferensi & prFilter
function prListHTML(shown){
  var list=PR_SHOWALL?shown:shown.slice(0,60);
  var html=list.map(prCardHTML).join('');
  if(!PR_SHOWALL&&shown.length>60)html+='<div style="text-align:center;padding:.6rem"><button class="btn btn-s" onclick="prShowAll()">Tampilkan semua ('+shown.length+')</button></div>';
  return html;
}
var PR_FILTER_TIMER=null;
// pengetikan didebounce 200ms; pemanggilan program (savePr/prDelete) tetap langsung lewat prFilter()
function prSearchInput(v){PR_SHOWALL=false;clearTimeout(PR_FILTER_TIMER);PR_FILTER_TIMER=setTimeout(function(){prFilter(v);},200);}
var PR_SHOWALL=false;
function prShowAll(){PR_SHOWALL=true;prFilter(PR_SEARCH);}
function prFilter(v){PR_SEARCH=v||'';var host=document.getElementById('pr-list');if(!host)return;var q=PR_SEARCH.toLowerCase().trim();var shown=PRODREF.list.filter(function(p){return prMatch(p,q);});host.innerHTML=shown.length?prListHTML(shown):'<div style="text-align:center;color:var(--muted);padding:2rem;font-size:.9rem">'+(q?'Tidak ada yang cocok 🚫':'Belum ada referensi — tekan ➕ untuk mulai mencatat')+'</div>';}
function onPrPasteShare(el){
  var p=parseShareText(el.value||'');
  if(!p.url&&!p.name){
    if((el.value||'').trim()){var info0=document.getElementById('pr-share-info');if(info0)info0.innerHTML='<div style="background:#FFF7ED;border:1px solid #FDBA74;border-radius:8px;padding:.5rem .7rem;font-size:.8rem;color:#9A3412;margin-top:.4rem">🤔 Teks tidak terbaca — isi kolom di bawah secara manual saja.</div>';}
    return;
  }
  var nm=document.getElementById('pr-name');
  // jangan timpa nama yang sudah diedit manual — hanya isi kalau kosong atau masih sama dengan hasil auto-fill terakhir
  if(nm&&p.name&&(!nm.value||nm.value===PR_SHARE_LASTNAME)){nm.value=p.name;PR_SHARE_LASTNAME=p.name;}
  var lk=document.getElementById('pr-url');
  if(lk&&p.url)lk.value=p.url;
  var nt=document.getElementById('pr-note');
  if(nt&&p.price&&!nt.value)nt.value='Harga ±'+p.price+' ('+today().slice(0,7)+')';
  var info=document.getElementById('pr-share-info');
  if(info)info.innerHTML='<div style="background:#ECFDF5;border:1px solid #86EFAC;border-radius:8px;padding:.5rem .7rem;font-size:.8rem;color:#065F46;margin-top:.4rem">✓ Nama, link'+(p.price?' &amp; harga':'')+' terisi — semua kolom di bawah masih bisa diedit bebas.</div>';
}
function onPrPhoto(e){
  var f=e.target.files[0];if(!f)return;
  var ph=document.getElementById('pr-fph');if(ph)ph.innerHTML='<div class="prev" style="display:flex;align-items:center;justify-content:center;color:var(--ink2)">⏳</div>';
  uploadImage(f,'refs').then(function(d){
    PR_PHOTO=d;
    var ph2=document.getElementById('pr-fph');if(ph2)ph2.innerHTML='<img class="prev" src="'+d+'">';
  });
}
function prFormHTML(item){
  return (item?'':'<div class="ig" style="background:var(--light);border:1.5px dashed var(--border-input);border-radius:10px;padding:.6rem .7rem"><label style="color:var(--ink2)">🛒 Tempel dari Shopee / Tokopedia (opsional)</label><textarea id="pr-share" oninput="onPrPasteShare(this)" placeholder="Tempel teks &quot;Bagikan&quot; dari aplikasi toko di sini — nama, link &amp; harga terisi otomatis" style="min-height:56px;font-family:inherit;font-size:.88rem"></textarea><div id="pr-share-info"></div></div>')+
    '<div class="ig"><label>Nama Produk *</label><input id="pr-name" type="text" value="'+(item?esc(item.name):'')+'"></div>'+
    '<div class="ig"><label>🏢 Supplier</label><input id="pr-sup" type="text" value="'+(item&&item.supplier_name?esc(item.supplier_name):'')+'" placeholder="opsional"></div>'+
    '<div class="ig"><label>📱 WhatsApp Supplier</label><input id="pr-wa" type="tel" value="'+(item&&item.supplier_whatsapp?esc(item.supplier_whatsapp):'')+'" placeholder="08xxxxxxxxxx (opsional)"></div>'+
    '<div class="ig"><label>🔗 Link</label><input id="pr-url" type="url" value="'+(item&&item.url?esc(item.url):'')+'" placeholder="https://..."></div>'+
    '<div class="ig"><label>Foto</label>'+
      '<div style="display:flex;gap:.5rem;margin-bottom:.4rem">'+
        '<button type="button" class="btn btn-s" style="flex:1;font-size:.82rem" onclick="document.getElementById(\'pr-cam\').click()">📷 Kamera</button>'+
        '<button type="button" class="btn btn-s" style="flex:1;font-size:.82rem" onclick="document.getElementById(\'pr-fi\').click()">🖼️ Album</button>'+
      '</div>'+
      '<input type="file" id="pr-cam" accept="image/*" capture="environment" style="display:none" onchange="onPrPhoto(event)">'+
      '<input type="file" id="pr-fi" accept="image/*" style="display:none" onchange="onPrPhoto(event)">'+
      '<div id="pr-fph">'+(item&&item.image_url?'<img class="prev" src="'+esc(item.image_url)+'">':'')+'</div>'+
    '</div>'+
    '<div class="ig"><label>📝 Catatan (harga, spek, kenapa bagus...)</label><textarea id="pr-note" style="min-height:70px;font-family:inherit">'+(item&&item.note?esc(item.note):'')+'</textarea></div>'+
    '<button id="pr-save-btn" class="btn btn-p btn-full" onclick="savePr()">'+(item?'💾 Simpan Perubahan':'➕ Simpan ke Katalog')+'</button>';
}
function prShowAdd(){PR_EDIT=null;PR_PHOTO='';PR_SHARE_LASTNAME='';showModal('➕ Tambah ke Katalog Supplier',prFormHTML(null));}
function prShowEdit(id){
  var item=PRODREF.list.find(function(p){return p.id==id;});if(!item)return;
  PR_EDIT=item;PR_PHOTO='';PR_SHARE_LASTNAME='';
  showModal('✏️ Edit Katalog Supplier',prFormHTML(item));
}
async function savePr(){
  var name=(document.getElementById('pr-name').value||'').trim();
  if(!name){toast('⚠ Isi nama produk dulu');return;}
  var b=document.getElementById('pr-save-btn');if(b){b.disabled=true;b.textContent='⏳ Menyimpan...';}
  var sup=(document.getElementById('pr-sup').value||'').trim();
  var wa=(document.getElementById('pr-wa').value||'').trim();
  var url=(document.getElementById('pr-url').value||'').trim();
  var note=(document.getElementById('pr-note').value||'').trim();
  var img=PR_PHOTO||(PR_EDIT&&PR_EDIT.image_url)||null;
  var row={name:name,supplier_name:sup||null,supplier_whatsapp:wa||null,url:url||null,note:note||null,image_url:img,updated_at:new Date().toISOString()};
  try{
    if(PR_EDIT){
      var u=await sb.from('product_refs').update(row).eq('id',PR_EDIT.id);
      if(u.error)throw u.error;
      Object.assign(PR_EDIT,row);
      toast('✓ Tersimpan');closeModal();
      PR_EDIT=null;PR_PHOTO='';
      prFilter(PR_SEARCH);
    }else{
      row.created_by=CURRENT_USER?CURRENT_USER.name:null;
      var ins=await sb.from('product_refs').insert(row).select();
      if(ins.error)throw ins.error;
      toast('✓ Tersimpan');closeModal();
      PR_EDIT=null;PR_PHOTO='';
      if(ins.data&&ins.data[0]){
        PRODREF.list.unshift(ins.data[0]);
        prFilter(PR_SEARCH);
      }else{
        prReload();
      }
    }
  }catch(e){
    toast('⚠ '+friendlyErr(e));
    if(b){b.disabled=false;b.textContent=(PR_EDIT?'💾 Simpan Perubahan':'➕ Simpan ke Katalog');}
  }
}
async function prDelete(id){
  var p=PRODREF.list.find(function(x){return x.id==id;});
  if(!confirm('Hapus "'+(p?p.name:'')+'" dari katalog?'))return;
  try{
    var r=await sb.from('product_refs').delete().eq('id',id);
    if(r.error)throw r.error;
    toast('✓ Terhapus');
    PRODREF.list=PRODREF.list.filter(function(p){return p.id!=id;});
    prFilter(PR_SEARCH);
  }catch(e){toast('⚠ '+friendlyErr(e));}
}
// "Jadikan Stok" — buka alur tambah barang biasa dengan data referensi terisi otomatis;
// referensi itu sendiri TIDAK diubah/dihapus, cuma dipinjam datanya.
function prMakeItem(id){
  var p=PRODREF.list.find(function(x){return x.id==id;});if(!p)return;
  PR_PROMOTE=p;showAddItem(true);
}

// RIWAYAT
// Baris riwayat — top-level (bukan cuma tertutup di dalam renderRiwayat) supaya saveTxEdit/
// loadMoreTransactions bisa pakai fungsi yang sama persis untuk update/tambah baris in-place
// tanpa perlu renderRiwayat() ulang (yang mereset pagination & scroll posisi).
function txRowHTML(tx){
  var out=tx.type==='ambil';
  return '<div class="tx'+(out?' out':'')+'" data-txid="'+esc(tx.id)+'">'+
    '<div class="txl"><div class="txp">'+esc(tx.person_name)+'</div><div class="txd">'+esc(tx.item_name)+'</div></div>'+
    '<div class="txr"><div class="txq '+(out?'out':'in')+'">'+(out?'−':'+')+tx.qty+'</div><div class="txt">'+fmtDate(tx.created_at)+'</div>'+(IS_ADMIN?'<button class="tedit" onclick="showEditTx(\''+esc(tx.id)+'\')">✏️</button><button class="tdel" onclick="confirmDeleteTx(\''+esc(tx.id)+'\',\''+jsq(tx.item_name)+'\')">🗑️</button>':'')+'</div>'+
  '</div>';
}
function renderRiwayat(){
  if(!TX_LOADED){
    document.getElementById('riwayat').innerHTML='<div class="st">📊 '+t('hist')+'</div><div class="loading"><div class="spin"></div><p style="margin-top:.8rem;font-size:.88rem">'+('Memuat riwayat')+'...</p></div>';
    loadTransactions(renderRiwayat);
    return;
  }
  if(TX_LOAD_FAILED){

    return;

  // 先渲染前 40 筆（快速呈現），其餘分批補上避免一次性大 DOM 建構造成卡頓
  var first=all.slice(0,40).map(txRowHTML).join('');

  document.getElementById('riwayat').innerHTML='<div class="st">📊 '+t('hist')+'</div><div id="rw-list">'+first+(all.length>40?'<div id="rw-more" style="text-align:center;color:var(--muted);padding:.8rem;font-size:.8rem">⏳ '+('Memuat')+'… (+'+(all.length-40)+')</div>':'')+'</div>'+loadMoreBtn;
  if(all.length>40)setTimeout(function(){

// ═══════════════════════════════════════════════════════════
// QC / HACCP 模組（彈性：檢查項後台可編輯 · 備註欄 · CCP 放行閘門）
// 資料表見 migrations/MIGRATION_QC_SYSTEM.sql
// ═══════════════════════════════════════════════════════════
var QC={templates:[],items:[],checks:[]},QC_LOADED=false,QC_SUBTAB='periksa';
var QC_CTX=null,QC_FORM={bools:{}};
// qc_checks di-scope per-gudang (CURRENT_WAREHOUSE) + limit dinaikkan dari 300→2000:
// dulu 300 baris itu gabungan SEMUA gudang, jadi gudang yang ramai QC-nya bisa "kehabisan
// jatah" cuma dari riwayat gudang lain — checks lawas gudang ini ke-drop dari cache, dan
// qcCheckFor() (yang cuma nyari di cache ini) salah bilang "Belum QC" padahal sudah pernah
// dicek. Scoping per gudang membuat working-set jauh lebih kecil, jadi limit 2000 baru akan
// terpotong kalau SATU gudang sendirian sudah punya 2000+ riwayat QC.
function qcChecksQuery(){
  var q=CURRENT_WAREHOUSE?sb.from('qc_checks').select('*').eq('warehouse_id',CURRENT_WAREHOUSE):sb.from('qc_checks').select('*');
  return q.order('checked_at',{ascending:false}).limit(2000);
}
function qcEnsure(cb){
  if(QC_LOADED){cb&&cb();return;}
  Promise.all([
    sb.from('qc_templates').select('*').order('created_at'),
    sb.from('qc_template_items').select('*').order('order_index'),
    qcChecksQuery()
  ]).then(function(r){
    for(var i=0;i<r.length;i++){if(r[i].error)throw r[i].error;}
    QC={templates:r[0].data||[],items:r[1].data||[],checks:r[2].data||[]};
    QC_LOADED=true;cb&&cb();
  }).catch(function(e){
    var el=document.getElementById('qc');
    if(el)el.innerHTML='<div class="ab ab-d" style="margin:1rem">⚠ '+esc(friendlyErr(e))+'<br><br><span style="font-size:.8rem;color:var(--muted)">Jika tabel belum ada, jalankan migrations/MIGRATION_QC_SYSTEM.sql di Supabase dulu.</span><br><br><button class="btn btn-p" onclick="QC_LOADED=false;renderQC()">🔄 Coba lagi</button></div>';
  });
}
function qcReload(cb){QC_LOADED=false;qcEnsure(cb);}
// 部分刷新：存一筆檢驗只重抓 checks；改範本只重抓 templates+items
// qc_checks 現在依 CURRENT_WAREHOUSE 縮小查詢範圍再 limit 2000（見 qcChecksQuery 註解）——
// 之前 300 筆是跨全部倉庫共用額度，忙碌倉庫的舊檢驗紀錄會被擠出快取，讓 qcCheckFor()
// （只在這份快取裡找）誤判成「Belum QC」，即使那筆真的檢驗過。
var QC_Q={
  templates:function(){return sb.from('qc_templates').select('*').order('created_at');},
  items:function(){return sb.from('qc_template_items').select('*').order('order_index');},
  checks:qcChecksQuery
};
async function qcRefresh(parts,cb){
  if(!QC_LOADED){qcEnsure(cb);return;}
  try{
    var r=await Promise.all(parts.map(function(k){return QC_Q[k]();}));
    for(var i=0;i<r.length;i++){if(r[i].error)throw r[i].error;QC[parts[i]]=r[i].data||[];}
    cb&&cb();
  }catch(e){qcReload(cb);}
}
function qcTplItems(tplId){return QC.items.filter(function(x){return x.template_id===tplId;}).sort(function(a,b){return (a.order_index||0)-(b.order_index||0);});}
function qcTemplatesFor(scope){return QC.templates.filter(function(t){return t.warehouse_id===CURRENT_WAREHOUSE&&t.scope===scope&&t.is_active!==false;});}
function qcCheckFor(refType,refId){var c=QC.checks.filter(function(x){return x.ref_type===refType&&String(x.ref_id)===String(refId);});return c.length?c[0]:null;}
function qcBadge(check){
  // 統一用 stBadge 三件組；conditional/rework 歸黃色警示（hold），未檢/待檢歸等待（wait）
  var map={pass:['ok','Lulus'],fail:['bad','Gagal'],conditional:['hold','Bersyarat'],rework:['hold','Rework'],pending:['wait','Menunggu']};
  var k=check?check.result:null;var m=map[k]||['wait','Belum QC'];
  return stBadge(m[0],m[1]+(check&&check.ccp_fail?' ⚠CCP':''));
}

    } else {
      field='<input id="'+iid+'" type="text" value="'+(pv.value?esc(String(pv.value)):'')+'" style="width:100%;padding:.5rem;border:1.5px solid var(--border);border-radius:8px;box-sizing:border-box">';
    }

      [['pass','🟢 Lulus'],['conditional','🟡 Bersyarat'],['rework','🟡 Rework'],['fail','🔴 Gagal']].map(function(kv){return '<option value="'+kv[0]+'"'+(existing&&existing.result===kv[0]?' selected':'')+'>'+kv[1]+'</option>';}).join('')+
