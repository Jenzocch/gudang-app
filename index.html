function qcTgl(ix,v){
  QC_FORM.bools[ix]=(v===1);
  var ok=document.getElementById('qci-'+ix+'-ok'),no=document.getElementById('qci-'+ix+'-no');
  if(ok){ok.style.background=(v===1)?'#059669':'#fff';ok.style.color=(v===1)?'#fff':'#059669';}
  if(no){no.style.background=(v===0)?'#DC2626':'#fff';no.style.color=(v===0)?'#fff':'#DC2626';}
}
// 把 critical_limit 的自由文字（"≤ 4°C"、"pH 3.5-4.2"、">= 70"）解析成可比對的邊界。
// 解析不出來（格式太自由/純文字說明）就回傳 null → 不自動判定，維持原本靠人工挑 Hasil 的行為。
function parseCriticalLimit(s){
  if(!s)return null;
  s=String(s).trim();
  var m=s.match(/(-?\d+(?:[.,]\d+)?)\s*(?:-|–|~|sampai|to|s\/d)\s*(-?\d+(?:[.,]\d+)?)/i);
  if(m)return{min:parseFloat(m[1].replace(',','.')),max:parseFloat(m[2].replace(',','.'))};
  m=s.match(/(≤|<=)\s*(-?\d+(?:[.,]\d+)?)/);
  if(m)return{max:parseFloat(m[2].replace(',','.'))};
  m=s.match(/(≥|>=)\s*(-?\d+(?:[.,]\d+)?)/);
  if(m)return{min:parseFloat(m[2].replace(',','.'))};
  m=s.match(/<\s*(-?\d+(?:[.,]\d+)?)/);
  if(m)return{maxExclusive:parseFloat(m[1].replace(',','.'))};
  m=s.match(/>\s*(-?\d+(?:[.,]\d+)?)/);
  if(m)return{minExclusive:parseFloat(m[1].replace(',','.'))};
  return null;
}
function qcSave(){
  var ctx=QC_CTX;if(!ctx)return;
  var tplId=document.getElementById('qc-tplid').value;
  var items=qcTplItems(tplId);var data=[];var ccpFail=false,ccpUnverified=false;
  for(var ix=0;ix<items.length;ix++){
    var it=items[ix];var val=null,pass=null;
    if(it.input_type==='bool'){pass=(QC_FORM.bools[ix]===true)?true:((QC_FORM.bools[ix]===false)?false:null);}
    else{var el=document.getElementById('qci-'+ix);val=el?el.value:'';if(it.input_type==='number'&&val!=='')val=Number(val);}
    if(it.required&&it.input_type==='bool'&&pass===null){toast('⚠ Isi: '+it.label);return;}
    if(it.required&&it.input_type!=='bool'&&(val===''||val==null)){toast('⚠ Isi: '+it.label);return;}
    // CCP 閘門：bool CCP 未通過(=false) → 失敗；未作答(null) → 未驗證，兩者都不能判 Lulus。
    // 數值型 CCP 之前完全沒被檢查——填了超過臨界值(critical_limit)的數字照樣能選「Lulus」。
    // 現在能解析出臨界值時，數字超出範圍一樣算 ccpFail；沒填則跟 bool 一樣算未驗證。
    if(it.is_ccp&&it.input_type==='bool'){if(pass===false)ccpFail=true;if(pass!==true)ccpUnverified=true;}
    else if(it.is_ccp&&it.input_type==='number'){
      if(val===''||val==null)ccpUnverified=true;
      else{
        var lim=parseCriticalLimit(it.critical_limit);
        if(lim){
          var v=Number(val);
          if((lim.min!=null&&v<lim.min)||(lim.max!=null&&v>lim.max)||(lim.minExclusive!=null&&v<=lim.minExclusive)||(lim.maxExclusive!=null&&v>=lim.maxExclusive))ccpFail=true;
        }
      }
    }
    data.push({label:it.label,input_type:it.input_type,value:val,pass:pass,is_ccp:!!it.is_ccp,critical_limit:it.critical_limit||null});
  }
  var result=document.getElementById('qc-result').value;
  var corr=(document.getElementById('qc-corr').value||'').trim();
  var note=(document.getElementById('qc-note').value||'').trim();
  if(!result){toast('⚠ Pilih hasil pemeriksaan');return;}
  if(ccpFail&&!corr){toast('⚠ CCP gagal — wajib isi Tindakan Koreksi');return;}
  if(result==='pass'&&(ccpFail||ccpUnverified)){toast('⚠ CCP belum semua lolos, tidak boleh Lulus');return;}
  var row={warehouse_id:CURRENT_WAREHOUSE,scope:ctx.scope,ref_type:ctx.refType,ref_id:String(ctx.refId),ref_label:ctx.label,template_id:tplId,inspector_name:CURRENT_USER?CURRENT_USER.name:null,result:result,ccp_fail:ccpFail,data:data,corrective_action:corr||null,note:note||null,checked_at:new Date().toISOString(),updated_at:new Date().toISOString()};
  var op=ctx.existingId?sb.from('qc_checks').update(row).eq('id',ctx.existingId):sb.from('qc_checks').insert(row);
  op.then(function(r){if(r.error){toast('⚠ '+friendlyErr(r.error));return;}
    // 食安事件主動推播：QC 不合格（尤其 CCP）立刻通知 Telegram 管理群，不等人打開 App
    if(result==='fail'||ccpFail){
      sendTelegram('qc_fail',{warehouse:(WH_SHORT[CURRENT_WAREHOUSE]||CURRENT_WAREHOUSE),label:ctx.label||String(ctx.refId),inspector:CURRENT_USER?CURRENT_USER.name:'-',ccp:!!ccpFail,corrective:corr||'',note:note||''});
    }
    toast('✓ QC tersimpan');closeModal();qcRefresh(['checks'],qcBody);});
}
function qcRiwayatHTML(){
  var cs=QC.checks.filter(function(c){return c.warehouse_id===CURRENT_WAREHOUSE;});
  var h='<div class="card"><div class="card-title">📊 Riwayat QC ('+cs.length+')</div>';

// 只是連結，不呼叫任何 API、不抓價 → 對系統效能「零影響」（不點就什麼都不跑）。
// 手機上 Shopee/Tokopedia 的 https 連結會直接開對應 App。網址集中在此，平台若

var MARKETPLACES=[
  {label:'Shopee',emoji:'🛒',bg:'#EE4D2D',url:'https://shopee.co.id/search?keyword='},
  {label:'Tokopedia',emoji:'🛍️',bg:'#03AC0E',url:'https://www.tokopedia.com/search?q='},

// 誰能看價格：Super Admin、Admin Gudang、或被特別授權看價的人(💰)。
// 一般員工/訪客/Minta 申請人一律看不到。所有顯示價格的地方都走這個判斷。
function canSeePrice(){return !!(IS_SUPER||IS_ADMIN||(CURRENT_USER&&CURRENT_USER.can_view_pricing));}
// description kadang dipakai nyimpen catatan harga marketplace ('Harga ±Rp… (YYYY-MM)') saat
// simpan barang baru — itu bocor kalau ditampilkan apa adanya ke staf yang tak boleh lihat harga.
function descDisplay(i){var d=i.description;if(!d)return'';if(/^Harga ±/.test(d)&&!canSeePrice())return'';return d;}
// 共用的線上搜尋面板（三個平台大按鈕，間距大不會點錯）。name=關鍵字，
// item=可選，若給且有看價權限就顯示自家上次進貨價當基準。卡片與 Minta 共用。
function marketPopup(name,item){
  name=(name||'').trim();
  if(!name){toast('⚠ Ketik / pilih nama barang dulu');return;}
  var kw=encodeURIComponent(name);
  var lp=(canSeePrice()&&item)?lastHardwarePrice(item.id):null;
  var btns=MARKETPLACES.map(function(m){
    return '<a href="'+m.url+kw+'" target="_blank" rel="noopener noreferrer" onclick="closeModal()" style="display:flex;align-items:center;gap:.7rem;background:'+m.bg+';color:#fff;padding:.9rem 1rem;border-radius:12px;font-size:1.02rem;font-weight:800;text-decoration:none;min-height:54px">'+
      '<span style="font-size:1.25rem">'+m.emoji+'</span>'+
      '<span style="flex:1">'+esc(m.label)+'</span>'+
      (m.cmp?'<span style="font-size:.76rem;font-weight:700;opacity:.92;background:rgba(255,255,255,.2);padding:.15rem .5rem;border-radius:6px">banding harga</span>':'<span style="opacity:.75;font-size:1.1rem">↗</span>')+
    '</a>';
  }).join('');
  showModal('🔍 Cari Online',
    '<div style="font-weight:800;font-size:1.05rem;margin-bottom:.25rem">'+esc(name)+'</div>'+
    (lp!=null?'<div style="font-size:.88rem;color:var(--ink2);margin-bottom:1rem">💰 Terakhir beli: <b style="color:var(--p)">Rp '+lp.toLocaleString('id-ID')+'</b> — bandingkan dengan harga online</div>'
      :'<div style="font-size:.84rem;color:var(--muted);margin-bottom:1rem">Cari harga & stok di toko online, lalu tempel link-nya ke catatan</div>')+
    '<div style="display:flex;flex-direction:column;gap:.65rem">'+btns+'</div>'
  );
}
// 卡片上的 🔍（Hardware 商品）：帶入該商品名 + 基準價
function openMarketSearch(itemId){
  var it=DATA.items.find(function(x){return x.id==itemId&&x.warehouse_id==='HARDWARE';})||DATA.items.find(function(x){return x.id==itemId;});
  if(!it)return;
  marketPopup(it.name,it);
}
// Minta 表單的 🔍（所有人可用）：讀目前選/填的物品名去搜；若剛好是 Hardware 現有品項就一併帶基準價
function mintaCariOnline(){
  var sel=document.getElementById('ri-sel');
  var name='';
  if(sel&&sel.value&&sel.value!=='__new__')name=sel.value;
  else{var ri=document.getElementById('ri');name=ri?(ri.value||'').trim():'';}
  if(!name){toast('⚠ Pilih atau ketik nama barang dulu');return;}
  var item=DATA.items.find(function(i){return i.name===name&&i.warehouse_id==='HARDWARE';});
  marketPopup(name,item);
}
// 把備註/文字裡的網址變成可點連結（其餘文字照樣 escape，安全 scheme 白名單）
function linkifyNote(s){
  s=String(s==null?'':s);
  var out='',last=0,re=/https?:\/\/[^\s]+/gi,m;
  while((m=re.exec(s))){
    out+=esc(s.slice(last,m.index));
    var u=m[0];
    out+='<a href="'+safeUrl(u)+'" target="_blank" rel="noopener noreferrer" style="color:var(--p);text-decoration:underline;word-break:break-all">'+esc(u)+'</a>';
    last=m.index+u.length;
  }
  out+=esc(s.slice(last));
  return out;
}
// Hardware 最近一次進貨單價（當線上比價的基準）；只在有看價權限時顯示。
// 直查 DATA.batches（不是 IDX.batchesByItem，那個只留有庫存的），因為就算那批
// 已用完，它的進貨價仍是有效的比價參考。
function lastHardwarePrice(itemId){
  var bats=(DATA.batches||[]).filter(function(b){return b.item_id==itemId&&b.warehouse_id==='HARDWARE'&&b.unit_price!=null&&b.unit_price!=='';});
  if(!bats.length)return null;

// 點權限格子：直接寫入 DB + 就地更新表格（不整頁重載、不跳確認框）
async function togglePermCell(id,w,kind){
  if(!IS_SUPER&&!IS_OFFICE){toast('⚠ Tidak ada akses');return;} // office 也能設員工權限
  var p=DATA.people.find(function(x){return x.id==id;});if(!p)return;
  var nv=!pWhPerm(p,w,kind);
  var perms={};try{perms=JSON.parse(JSON.stringify(p.perms||{}));}catch(e){}
  if(!perms[w])perms[w]={};
  perms[w][kind]=nv;
  try{
    await managePeople('update',{id:id,patch:{perms:perms}});
    p.perms=perms;
    var mx=document.getElementById('perm-mx');
    if(mx)mx.innerHTML=permMatrixHTML(p);
  }catch(e){
    if(/perms/i.test(e.message||''))toast('⚠ Jalankan migrations/MIGRATION_PERMS_PER_GUDANG.sql dulu');
    else toast('⚠ '+friendlyErr(e));
  }
}

// Kategori bawaan Bahan Baku (BB): selalu tersedia untuk filter & tagging
function getCategories(){
  // 分類來源 = 該倉庫商品身上的標籤 + 資料庫 categories 表（依倉庫分開）。
  // 不再硬塞預設分類（之前 Packing/Food Ingredient 會出現在每個倉庫 → HARDWARE 分類錯亂）
  var seen={};var all=[];
  DATA.items.forEach(function(i){var tags=i.tags||[];for(var k=0;k<tags.length;k++){var tg=tags[k];if(tg&&!seen[tg]){seen[tg]=1;all.push(tg);}}});
  (DATA.categories||[]).forEach(function(tg){if(tg&&!seen[tg]){seen[tg]=1;all.push(tg);}});
  return all.sort();
}

async function addCatg(){
  var inp=document.getElementById('ncg');
  if(!inp)return;

  if(!v){toast('⚠ '+('Isi nama tag'));return;}
  if(!CURRENT_WAREHOUSE){toast('⚠ Pilih gudang dulu (kategori per gudang)');return;}
  if(getCategories().includes(v)){toast('⚠ '+('Tag sudah ada'));return;}
  try{
    var {error}=await sb.from('categories').insert({warehouse_id:CURRENT_WAREHOUSE,name:v});
    if(error)throw error;
    DATA.categories=(DATA.categories||[]).concat([v]);
    inp.value='';
    document.getElementById('acg').innerHTML=catgPanelHTML();
    setTimeout(function(){var ni=document.getElementById('ncg');if(ni)ni.focus();},100);
    toast('✓ '+v);

async function delCatg(cat){
  // Kategori itu per-gudang (lihat addCatg). Tanpa gudang terpilih (mode "Semua Gudang"),
  // DATA.items memuat SEMUA gudang → menghapus tag akan mencabutnya dari barang di semua
  // gudang sekaligus, dan baris categories tak ikut terhapus (muncul lagi saat reload).
  if(!CURRENT_WAREHOUSE){toast('⚠ Pilih gudang dulu (kategori per gudang)');return;}
  if(!confirm('Hapus tag "'+cat+'"? Barang tetap ada, tag hanya dihapus.'))return;
  try{
    var affected=DATA.items.filter(function(i){return (i.tags||[]).includes(cat);});
    for(var ki=0;ki<affected.length;ki++){
      var nt=(affected[ki].tags||[]).filter(function(tg){return tg!==cat;});
      var {error}=await sb.from('items').update({tags:nt}).eq('id',affected[ki].id);
      if(error)throw error;
      affected[ki].tags=nt;
    }
    if(CURRENT_WAREHOUSE){var dc=await sb.from('categories').delete().eq('warehouse_id',CURRENT_WAREHOUSE).eq('name',cat);if(dc.error)throw dc.error;}
    DATA.categories=(DATA.categories||[]).filter(function(c){return c!==cat;});
    document.getElementById('acg').innerHTML=catgPanelHTML();
    toast(t('delOk'));
  }catch(e){toast('⚠ '+friendlyErr(e));}
}
async function renameCatg(cat){
  if(!CURRENT_WAREHOUSE){toast('⚠ Pilih gudang dulu (kategori per gudang)');return;}
  var newName=prompt('Nama baru untuk "'+cat+'":',cat);
  if(!newName||newName.trim()===cat)return;
  newName=newName.trim();if(!newName)return;
  try{
    var affected=DATA.items.filter(function(i){return (i.tags||[]).includes(cat);});
    for(var ki=0;ki<affected.length;ki++){
      var nt=(affected[ki].tags||[]).map(function(tg){return tg===cat?newName:tg;});
      var {error}=await sb.from('items').update({tags:nt}).eq('id',affected[ki].id);
      if(error)throw error;
      affected[ki].tags=nt;
    }
    if(CURRENT_WAREHOUSE){var rc=await sb.from('categories').update({name:newName}).eq('warehouse_id',CURRENT_WAREHOUSE).eq('name',cat);if(rc.error)throw rc.error;}
    DATA.categories=(DATA.categories||[]).map(function(c){return c===cat?newName:c;});

}

async function saveCatgItems(){
  var cat=CATG_MODAL_CAT;if(!cat)return;
  var toAdd=[],toDel=[];
  document.querySelectorAll('#ci-list input[type=checkbox]').forEach(function(cb){
    var id=parseInt(cb.value);
    var item=DATA.items.find(function(i){return i.id==id;});if(!item)return;
    var has=(item.tags||[]).includes(cat);
    if(cb.checked&&!has)toAdd.push(item);
    else if(!cb.checked&&has)toDel.push(item);
  });
  if(!toAdd.length&&!toDel.length){closeModal();return;}
  try{
    for(var i=0;i<toAdd.length;i++){
      var nt=(toAdd[i].tags||[]).concat([cat]);
      var r=await sb.from('items').update({tags:nt}).eq('id',toAdd[i].id);
      if(r.error)throw r.error;toAdd[i].tags=nt;
    }
    for(var j=0;j<toDel.length;j++){
      var nt2=(toDel[j].tags||[]).filter(function(tg){return tg!==cat;});
      var r2=await sb.from('items').update({tags:nt2}).eq('id',toDel[j].id);
      if(r2.error)throw r2.error;toDel[j].tags=nt2;
    }

// 有搜尋 → 直接平鋪最快找到；無搜尋 → 依分類分組、預設收合(點分類才展開)
function stkRowsHTML(){
  var q=STK_SEARCH;
  // Semua Gudang 總覽時只列目標倉的品項（單倉模式下本來就全是該倉，等於不過濾）
  var wh=CURRENT_WAREHOUSE||STK_WH;
  var items=DATA.items.filter(function(i){
    if(wh&&i.warehouse_id!==wh)return false;
    if(q&&!(i.name.toLowerCase().includes(q)||(i.code&&i.code.toLowerCase().includes(q))))return false;
    return true;
  });
  if(!items.length)return'<div style="text-align:center;color:var(--muted);padding:2rem;font-size:.85rem">'+('Tidak ada barang')+'</div>';
  if(q){
    // 搜尋模式：平鋪結果

      ('Hasil pencarian')+' · '+items.length+'</div>'+items.map(stkItemRow).join('');
  }
  // 分組模式：每個商品歸到第一個標籤，沒標籤歸「未分類」
  var groups={},order=[];
  items.forEach(function(i){
    var tag=(i.tags&&i.tags.length)?i.tags[0]:'📭 Tanpa Kategori';
    if(!groups[tag]){groups[tag]=[];order.push(tag);}
    groups[tag].push(i);
  });
  order.sort(function(a,b){
    var au=a==='📭 Tanpa Kategori',bu=b==='📭 Tanpa Kategori';
    if(au!==bu)return au?1:-1; // 未分類排最後
    return a.localeCompare(b);
  });
  var html='';
  order.forEach(function(cat){
    var open=!!STK_OPEN[cat];
    var list=groups[cat];
    var edited=list.filter(function(i){return i.variant_id in STOCKTAKE;}).length;
    html+='<div>'+
      '<div onclick="toggleStkCat(\''+jsq(cat)+'\')" style="display:flex;align-items:center;justify-content:space-between;padding:.65rem .8rem;background:#F1F5F9;border-bottom:1px solid var(--border);cursor:pointer;user-select:none">'+
        '<span style="font-weight:700;font-size:.9rem">'+(open?'▼':'▶')+' 🏷️ '+esc(cat)+'</span>'+
        '<span style="font-size:.78rem;color:var(--ink2)">'+(edited?'<b style="color:#D97706">'+edited+' ✏️</b> · ':'')+list.length+' barang</span>'+
      '</div>'+
      (open?list.map(stkItemRow).join(''):'')+
    '</div>';
  });
  return html;
}

async function saveStocktake(){
  if(!canOpname()){toast('⚠ Tidak ada akses Opname');return;}
  var keys=Object.keys(STOCKTAKE);if(!keys.length)return;
  var btn=document.getElementById('stk-save-btn');btn.disabled=true;btn.textContent='Menyimpan...';
  var okCount=0,failed=[];
  for(var ki=0;ki<keys.length;ki++){
    var variantId=keys[ki];
    var item=null;
    try{
      // item lookup + diff harus di dalam try: kalau DATA sempat ke-refresh di tengah
      // opname dan variant ini sudah tidak ada lagi, item.qty dulu meledak DI LUAR try
      // → seluruh loop for berhenti mendadak, sisa item dalam batch ini tidak pernah
      // tersimpan & tombol macet di "Menyimpan...". Sekarang error ini cuma gagalkan
      // baris ini saja, baris berikutnya tetap lanjut diproses.
      item=DATA.items.find(function(i){return i.variant_id==variantId;});
      if(!item)throw new Error('Barang tidak ditemukan (mungkin sudah dihapus)');
      var nv=STOCKTAKE[variantId];var diff=nv-item.qty;
      var u1=await sb.from('item_variants').update({qty:nv}).eq('id',variantId);
      if(u1.error)throw u1.error;
      if(diff!==0){
        var u2=await sb.from('transactions').insert({type:diff>0?'masuk':'ambil',item_id:item.id,item_name:item.name,person_name:(CURRENT_USER?CURRENT_USER.name:'Admin')+('(Opname)'),qty:Math.abs(diff),warehouse_id:(CURRENT_WAREHOUSE||STK_WH||null)});
        if(u2.error)throw u2.error;
      }
      item.qty=nv;
      delete STOCKTAKE[variantId];
      okCount++;
    }catch(e){
      failed.push(item?item.name:variantId);
    }
  }
  btn.disabled=false;btn.textContent=t('save')||'Simpan';
  if(failed.length){
    toast('⚠ '+okCount+' tersimpan, '+failed.length+' GAGAL: '+failed.slice(0,3).join(', ')+(failed.length>3?'...':''));
  }else{
    toast('✓ '+('Selesai, '+okCount+' item diubah'));
  }
  // keepState=true：失敗項目留在 STOCKTAKE 讓使用者原地重試，不要被這次重繪清空；
  // 展開的分類、正在打的搜尋字也一併保留（存到一半的人不用重新展開找位置）
  renderStocktake(STK_CATG,true);
  buildIndexes();TX_LOADED=false;invalidateTabs(['inventory','transactions']);
}

// 🛒 Tempel teks "Bagikan" dari Shopee/Tokopedia → otomatis isi nama + simpan link & harga.
// Murni parsing teks di sisi klien — TIDAK fetch/scrape situs tokonya (lihat lesson
// external-integrations-deeplink-not-scrape; Shopee memblokir bot, dan kita memang tak perlu).
// Nama hasil parse TETAP bisa diedit di kolom nama — judul toko sering kepanjangan,
// pendekkan saja; link & harga disimpan terpisah di F_SHARE jadi tidak hilang saat nama diubah.
var F_SHARE={url:'',price:''};
var F_SHARE_LASTNAME=''; // nama terakhir yang diisi otomatis dari paste — supaya tidak menimpa nama yang sudah diedit manual
function parseShareText(text){
  var out={url:'',price:'',name:''};
  if(!text)return out;
  var um=text.match(/https?:\/\/\S+/);
  if(um)out.url=um[0].replace(/[.,;!?)\]]+$/,'');
  var pm=text.match(/Rp\s?[\d][\d.,]*/);
  if(pm)out.price=pm[0].replace(/\s/g,'').replace(/[.,]+$/,''); // buang titik/koma akhir kalimat yang ikut kena regex
  // Nama: coba pola persis Shopee dulu (paling akurat kalau kena) — "Temukan {nama} seharga/
  // hanya Rp...". Tokopedia dan versi app lain pakai kalimat pembungkus yang beda-beda dan
  // sering berubah, jadi jangan taruh nasib di SATU pola tepat lagi (itu sebabnya nama sering
  // gagal ke-parse). Fallback format-agnostic: buang URL, harga, dan daftar kata/frasa basa-basi
  // yang UMUM dipakai lintas platform — apa pun yang tersisa dianggap nama produk. Kalau nama
  // produk kebetulan memuat salah satu kata basa-basi ini, hasilnya bisa kepotong dikit — tapi
  // kolom nama tetap bisa diedit manual, jadi lebih baik "hampir benar" daripada kosong.
  var nm=text.match(/Temukan\s+([\s\S]+?)\s+(?:seharga|hanya)\s/i)
       ||text.match(/^([\s\S]+?)\s+(?:seharga|hanya)\s+Rp/i);
  var name;
  if(nm){
    name=nm[1];
  }else{
    name=text
      .replace(/https?:\/\/\S+/g,'')
      .replace(/Rp\s?[\d][\d.,]*/g,'')
      .replace(/^\s*(yuk|hai|halo)[,!]?\s*/i,'')
      .replace(/\b(temukan|dapatkan|checkout|order)\b/gi,'')
      .replace(/\bcek\s+produk\b/gi,'').replace(/\blihat\s+produk\b/gi,'')
      .replace(/\bbeli\s+(sekarang|di)\b/gi,'')
      .replace(/\bsekarang(\s+juga)?\b/gi,'')
      .replace(/\bhanya\s+di\b/gi,'')
      .replace(/\b(seharga|harga|hanya)\b/gi,'')
      .replace(/\bdi\s+(shopee|tokopedia|tiktok\s*shop|lazada|bukalapak)\b/gi,'')
      .replace(/\b(shopee|tokopedia|tiktokshop|lazada|bukalapak)\b/gi,'')
      .replace(/\bdownload\s+aplikasinya\b/gi,'');
  }
  out.name=(name||'').replace(/\s+/g,' ').replace(/^[\s\-–—:,.!]+|[\s\-–—:,.!]+$/g,'').trim().slice(0,150);
  return out;
}
function onPasteShare(el){

var ADD_SEARCH_TIMER=null;
function searchExistingItems(){
  var q=(document.getElementById('add-search').value||'').trim().toLowerCase();
  var box=document.getElementById('add-search-results');
  if(!box)return;
  if(q.length<2){box.innerHTML='<div style="text-align:center;color:var(--muted);font-size:.78rem;padding:.6rem">🔍 Ketik nama barang (min 2 huruf)</div>';return;}
  // ID barang yang sudah ada di gudang target (jangan tampilkan lagi)。
  // Semua Gudang 模式下 DATA.items 是所有倉的變體，要按目標倉過濾
  var twh=ADD_WH||CURRENT_WAREHOUSE;
  var here={};DATA.items.forEach(function(i){if(i.warehouse_id===twh)here[i.id]=true;});
  clearTimeout(ADD_SEARCH_TIMER);
  ADD_SEARCH_TIMER=setTimeout(async function(){
    try{
      var {data,error}=await sb.from('items').select('id,name,unit,image_url,tags').ilike('name','%'+q+'%').order('name').limit(50);
      if(error)throw error;
      var avail=(data||[]).filter(function(it){return!here[it.id];});
      if(!avail.length){box.innerHTML='<div style="text-align:center;color:var(--muted);font-size:.78rem;padding:.6rem">Tidak ada yang cocok — buat barang baru!</div>';return;}
      // 按標籤分組（每個商品只歸到第一個標籤，避免重複顯示）
      var byTag={};avail.forEach(function(it){
        var tags=it.tags||[];var tag=tags.length?tags[0]:'📭 Tanpa Kategori';
        if(!byTag[tag])byTag[tag]=[];byTag[tag].push(it);
      });
      var html='';Object.keys(byTag).sort().forEach(function(tag){
        html+='<div style="padding:.5rem .7rem;background:#F8FAFC;border-bottom:1px solid #E2E8F0;font-weight:600;font-size:.75rem;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em">'+esc(tag)+'</div>';
        byTag[tag].forEach(function(it){
          var ph=it.image_url?'<img src="'+esc(it.image_url)+'" style="width:36px;height:36px;border-radius:6px;object-fit:cover;flex-shrink:0">':'<div style="width:36px;height:36px;border-radius:6px;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0">📦</div>';
          html+='<div style="display:flex;align-items:center;gap:.5rem;padding:.4rem;border-bottom:1px solid #F1F5F9">'+ph+
            '<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(it.name)+'</div>'+
            '<div style="font-size:.72rem;color:var(--muted)">'+esc(it.unit||'pcs')+'</div></div>'+
            '<button class="btn btn-ok" style="padding:.3rem .6rem;font-size:.78rem;flex-shrink:0" onclick="addExistingToWarehouse(\''+esc(it.id)+'\')">➕ Tambah</button>'+
          '</div>';
        });
      });
      box.innerHTML=html;
    }catch(e){box.innerHTML='<div style="color:var(--danger);font-size:.78rem;padding:.6rem">⚠ '+esc(e.message)+'</div>';}
  },300);
}
async function addExistingToWarehouse(itemId){
  var wh=ADD_WH||CURRENT_WAREHOUSE;
  if(!wh){toast('⚠ Pilih gudang dulu');return;}
  try{
    var {error}=await sb.from('item_variants').insert({item_id:itemId,warehouse_id:wh,qty:0,critical_qty:10});
    if(error)throw error;
    // jangan sampai link dari katalog hilang begitu saja — isi ke master kalau master belum punya link
    if(PR_PROMOTE&&PR_PROMOTE.url){var uu=await sb.from('items').update({supplier_url:PR_PROMOTE.url}).eq('id',itemId).is('supplier_url',null);if(uu.error)console.warn('[addExistingToWarehouse] link tidak tersimpan:',uu.error.message);}
    PR_PROMOTE=null;
    toast('✓ '+('Barang ditambah ke ')+wh);
    closeModal();await refreshInventory();
  }catch(e){
    if(/duplicate|unique/i.test(e.message||''))toast('⚠ '+('Barang sudah ada di gudang ini'));
    else toast('⚠ '+friendlyErr(e));
  }
}

// Insert/update tahan kolom hilang: jika PostgREST melaporkan kolom tak ada di
// schema cache, buang kolom itu lalu coba lagi. DB asli kadang beda dgn migrasi.
async function sbInsertSafe(table,row){
  var r=await sb.from(table).insert(row).select(),g=0;
  while(r.error&&g<8){
    var msg=r.error.message||'',m=msg.match(/'([^']+)'(?:\s+column|\s+does not exist)/i);
    if(!m){m=msg.match(/column\s+["`]?([^"`\s]+)["`]?/i);}
    if(!m||!(m[1] in row))break;
    delete row[m[1]];r=await sb.from(table).insert(row).select();g++;
  }
  return r;
}
async function sbUpdateSafe(table,row,idCol,idVal){
  var r=await sb.from(table).update(row).eq(idCol,idVal).select(),g=0;
  while(r.error&&g<8){
    var msg=r.error.message||'',m=msg.match(/'([^']+)'(?:\s+column|\s+does not exist)/i);
    if(!m){m=msg.match(/column\s+["`]?([^"`\s]+)["`]?/i);}
    if(!m||!(m[1] in row))break;
    delete row[m[1]];r=await sb.from(table).update(row).eq(idCol,idVal).select();g++;
  }
  return r;
}
// LIKE/ILIKE 萬用字元跳脫，使用者名稱裡的 % _ 不可以變成萬用字元
function likeEsc(s){return String(s).replace(/[\\%_]/g,'\\$&');}
var DUP_CHK_TIMER=null;
function checkDuplicateItem(){
  var inp=document.getElementById('fn');
  var dupEl=document.getElementById('fn-dup');
  if(!inp||!dupEl)return;
  var name=(inp.value||'').trim().toLowerCase();
  clearTimeout(DUP_CHK_TIMER);
  if(!name){dupEl.style.display='none';return;}
  var existing=DATA.items.find(function(i){return (i.name||'').toLowerCase()===name&&i.id!==(EDIT_ITEM&&EDIT_ITEM.id);});
  if(existing){
    dupEl.style.display='block';
    dupEl.innerHTML='⚠️ Sudah ada: <strong>'+esc(existing.name)+'</strong>（'+esc(existing.warehouse_id)+'）';
    return;
  }
  dupEl.style.display='none';
  if(EDIT_ITEM)return;
  // 本地（已載入倉庫）沒撞名，再查全庫主檔：其他倉庫已有同名時邊打字就先告知，
  // 存檔時系統會引導「沿用同一個品項」，不會另建一個重複名稱
  DUP_CHK_TIMER=setTimeout(async function(){
    try{
      var g=await sb.from('items').select('id,name').ilike('name',likeEsc(name)).limit(1);
      var cur=(inp.value||'').trim().toLowerCase();
      if(cur!==name)return; // 使用者已繼續打字，這筆結果過期
      if(!g.error&&g.data&&g.data.length){
        dupEl.style.display='block';
        dupEl.innerHTML='💡 <strong>'+esc(g.data[0].name)+'</strong> sudah ada di gudang lain — saat simpan bisa langsung dipakai barang yang sama (tidak bikin nama dobel)';
      }
    }catch(e){}
  },400);
}

  if(!PENDING_ITEM)return;var p=PENDING_ITEM;PENDING_ITEM=null;

    var vins=await sbInsertSafe('item_variants',{item_id:p.masterId,warehouse_id:p.warehouse,qty:p.qty,critical_qty:p.min,storage_photo_url:p.sp});
    if(vins.error)throw vins.error;
    // Link yang sempat ditempel/dipilih di form ini jangan hilang begitu saja — isi ke

async function saveItem(){

  }
  if(PHOTO_UPLOADING>0){toast('⚠ Tunggu foto selesai diupload dulu');return;}
  // 防連點：整段（含查重+insert）用同一顆按鈕上鎖，避免雙擊建出兩筆重複主檔
  var _sv=document.getElementById('f-save-btn');
  if(_sv){if(_sv.disabled)return;_sv.disabled=true;_sv.textContent='⏳...';}
  // 新增時查重：先查已載入的資料，再查全庫 items 主檔（抓「其他倉庫已有同名」的情況，
  // 以前只查本倉，跨倉同名會靜靜建出第二個重複主檔）。名稱相同＝同一個品項：
  //  · 同倉已有 → 只能編輯，不給建重複
  //  · 別倉已有 → 引導沿用同一主檔、只幫本倉開庫存（名稱不會多一份，庫存照樣獨立）
  if(!EDIT_ITEM){
    var lower=name.toLowerCase();
    var master=DATA.items.find(function(i){return (i.name||'').toLowerCase()===lower;});
    var masterId=master?master.id:null;
    if(!masterId){
      try{
        var g=await sb.from('items').select('id,name').ilike('name',likeEsc(name)).limit(1);
        if(!g.error&&g.data&&g.data[0])masterId=g.data[0].id;
      }catch(e){}
    }
    if(masterId){
      var inTarget=DATA.items.find(function(i){return i.id===masterId&&i.warehouse_id===targetWh;});
      if(inTarget){
        showModal('⚠️ Nama barang sudah ada',
          '<div style="background:#FEF3C7;border-left:4px solid #D97706;padding:1rem;border-radius:8px;margin-bottom:1rem">'+
            '<div style="font-weight:700;margin-bottom:.3rem">📦 '+esc(inTarget.name)+'</div>'+
            '<div style="font-size:.85rem;color:#92400E">Gudang: '+esc(targetWh)+'　|　Stok: '+inTarget.qty+' '+esc(inTarget.unit)+'</div>'+
          '</div>'+
          '<div style="font-size:.9rem;color:var(--ink2);margin-bottom:1rem">Barang ini sudah terdaftar di gudang ini — tidak bisa dibuat dobel.</div>'+
          '<div style="display:flex;flex-direction:column;gap:.5rem">'+
            '<button class="btn btn-p btn-full" onclick="closeModal();showEdit(\''+esc(inTarget.variant_id)+'\')">✏️ Edit barang yang ada</button>'+
            '<button class="btn btn-s btn-full" onclick="closeModal()">Batal</button>'+
          '</div>');
        return;
      }
      // 撞名在別的倉庫：抄下表單再開對話框（對話框會換掉表單彈窗）
      PENDING_ITEM=collectItemForm(name);
      PENDING_ITEM.warehouse=targetWh;PENDING_ITEM.masterId=masterId;
      var whs=DATA.items.filter(function(i){return i.id===masterId;}).map(function(i){return WH_SHORT[i.warehouse_id]||i.warehouse_id;});
      showModal('📦 Barang sudah ada',
        '<div style="background:#FEF3C7;border-left:4px solid #D97706;padding:1rem;border-radius:8px;margin-bottom:1rem">'+

  var code=(document.getElementById('fc')?document.getElementById('fc').value:'').trim();

  var qty=Math.max(0,parseInt(document.getElementById('fq').value)||0);
  var unit=(document.getElementById('fu').value||'pcs').trim();

  var pd=(document.getElementById('fpd').value||'').trim();
  var ed=(document.getElementById('fed').value||'').trim();
  var rm=(document.getElementById('frm').value||'').trim();
  var noAlert=document.getElementById('f-no-alert').checked;
  if(noAlert&&!rm.includes('#noalert')){rm=(rm+' #noalert').trim();}

  // EDIT_ITEM (edit) dan PR_PROMOTE (tambah dari Katalog Supplier) tidak pernah aktif bersamaan
  var img=F_PHOTO||(EDIT_ITEM&&EDIT_ITEM.image_url)||(PR_PROMOTE&&PR_PROMOTE.image_url)||null;
  var sp=F_STORAGE_PHOTO||(EDIT_ITEM&&EDIT_ITEM.storage_photo_url)||null;
  // Link & harga hasil tempel-share (F_SHARE) / referensi (PR_PROMOTE) hanya dipakai saat
  // TAMBAH baru — form edit tidak menampilkan kotak tempel (link diedit via ✏️ Link Beli).
  var supUrl=F_SHARE.url||(PR_PROMOTE&&PR_PROMOTE.url)||null;
  var supName=(PR_PROMOTE&&PR_PROMOTE.supplier_name)||null;
  var priceNote=F_SHARE.price?('Harga ±'+F_SHARE.price+' ('+today().slice(0,7)+')'):null;
  try{
    if(EDIT_ITEM){
      // 編輯：改 items 表（共享信息）+ item_variants 表（倉庫特定）
      var u1=await sbUpdateSafe('items',{name:name,code:code||null,spec:spec||null,pcs_per_ctn:pcsPerCtn,image_url:img,unit:unit,production_date:pd||null,expiry_date:ed||null,remark:rm||null},'id',EDIT_ITEM.id);

      // jangan timpa stok yang mungkin sudah berubah (ambil/masuk staf lain) sejak form dibuka.
      var vp={critical_qty:min,storage_photo_url:sp};
      if(qty!==EDIT_ITEM.qty)vp.qty=qty;
      var u2=await sbUpdateSafe('item_variants',vp,'id',EDIT_ITEM.variant_id);
      if(u2.error)throw u2.error;
    }else{
      // 新增：targetWh 已在函式開頭解析（倉庫優先流程），這裡直接用
      var ins=await sbInsertSafe('items',{name:name,code:code||null,spec:spec||null,pcs_per_ctn:pcsPerCtn,image_url:img,unit:unit,production_date:pd||null,expiry_date:ed||null,remark:rm||null,supplier_url:supUrl,supplier_name:supName,description:priceNote});
      if(ins.error||!ins.data||!ins.data[0])throw ins.error||new Error('Gagal tambah barang');

async function delItem(variantId){
  if(!IS_ADMIN){toast('⚠ '+('Hanya admin yang bisa menghapus'));return;}
  // 用 variant_id 精確定位（支援同名重複品項）
  var item=DATA.items.find(function(i){return i.variant_id==variantId;});
  if(!item)return;
  var msg='Hapus barang dari '+item.warehouse_id+':\n"'+item.name+'" (stok: '+item.qty+' '+item.unit+')\n\nBarang masih ada di gudang lain (jika ada).';
  if(!confirm(msg))return;
  try{
    // Delete only this specific variant row by its unique id
    var {error}=await sb.from('item_variants').delete().eq('id',variantId);
    if(error)throw error;
    // 連帶清掉該商品在此倉的批次，避免留下孤兒 item_batches
    if(item.id!=null&&item.warehouse_id){
      // Supabase delete tidak throw — try/catch kosong dulu menelan error diam-diam; kalau
      // gagal (RLS/offline) batch jadi yatim, dan bisa "hidup lagi" kalau barang ditambah ulang.
      var bd=await sb.from('item_batches').delete().eq('item_id',item.id).eq('warehouse_id',item.warehouse_id);
      if(bd.error)console.warn('[delItem] sisa batch tidak terhapus:',bd.error.message);
    }
    toast('✓ '+('Barang dihapus dari '+item.warehouse_id));
    // 就地移除：只拿掉這一列 DOM，畫面完全不重繪、不跳（保留分頁/搜尋/捲動位置）
    DATA.items=DATA.items.filter(function(v){return v.variant_id!=variantId;});
    if(typeof buildIndexes==='function')buildIndexes();
    var row=document.getElementById('ai-'+variantId);
    if(row){row.remove();}
    else{
      var aitc=document.getElementById('ait-content');
      if(aitc){aitc.innerHTML='<div class="ai-list'+(VIEW_AI==='grid'?' grid':'')+'">'+aiListHTML()+'</div>';}
      else{await loadAll();}
    }
  }
  catch(e){toast('⚠ '+friendlyErr(e));}
}

async function saveTxEdit(id){

  var newIn=(document.getElementById('etx-in').value||'').trim();
  var newQ=Math.max(1,parseInt(document.getElementById('etx-q').value)||1);
  var newT=(document.getElementById('etx-t').value||'ambil').trim();
  if(!newPn||!newIn){toast('⚠ '+('Isi semua field'));return;}
  var oldVals={person_name:tx.person_name,item_name:tx.item_name,qty:tx.qty,type:tx.type};
  var newVals={person_name:newPn,item_name:newIn,qty:newQ,type:newT};

    if(upd.error)throw upd.error;
    var editEntry={transaction_id:id,edited_by:CURRENT_USER?CURRENT_USER.name:'Admin',old_values:oldVals,new_values:newVals,edited_at:new Date().toISOString()};
    // Supabase insert tidak throw — jejak audit yang gagal ditulis (tabel hilang/RLS) dulu

    var ae=await sb.from('transaction_edits').insert(editEntry);
    if(ae.error)console.warn('[saveTxEdit] jejak audit gagal ditulis:',ae.error.message);
    // 交易編輯只動 transactions 表（不連動庫存）— update lokal objeknya lalu ganti baris DOM

    tx.person_name=newPn;tx.item_name=newIn;tx.qty=newQ;tx.type=newT;

async function deleteTx(id){
  try{
    var del=await sb.from('transactions').delete().eq('id',id);
    if(del.error)throw del.error;
    toast('✓ Riwayat transaksi dihapus');
    closeModal();
    // Buang dari DATA + DOM di tempat (bukan renderRiwayat() ulang) — pagination/scroll tetap;
    // TX_LOADED tetap true, data lain tidak perlu dimuat ulang.
    var ix=DATA.transactions.findIndex(function(t){return t.id==id;});
    if(ix>=0){
      DATA.transactions.splice(ix,1);
      // TX_OFFSET = 已從伺服器載入的筆數，也是下一次「載入更多」的 range 起點。刪掉一筆已載入的
      // 交易後若不減一,伺服器清單整個上移,下一頁的 range(TX_OFFSET,..) 會跳過一筆(或重複)。
      if(typeof TX_OFFSET==='number'&&TX_OFFSET>0)TX_OFFSET--;
    }
    var el=document.querySelector('[data-txid="'+id+'"]');
    if(el&&el.parentNode)el.parentNode.removeChild(el);
  }catch(e){
    toast('⚠ Gagal hapus: '+friendlyErr(e));
  }
}

function switchWarehouse(wid){

  CART={};CART_M={};STOCKTAKE={};

  // checks gudang sebelumnya, harus dibuang supaya qcCheckFor() tidak salah lapor status
  // dari gudang yang baru saja ditinggalkan.
  QC_LOADED=false;

  // saat pindah keluar dari Semua Gudang — pilih filter "wh1", pindah ke gudang lain kerja,
  // balik lagi ke Semua Gudang: filter lama diam-diam masih aktif, kelihatannya seperti

  // 之前這裡會把 admin 押去 Admin 頁、員工押去 Ambil，且背景刷新完 1-3 秒後「再跳一次」——工作到一半被彈走的主因。

// FAMMS 送來的多品項申請格式："• name [partNo] × qty unit"（見 famms-request/index.ts），
// 逐行對應到一個商品。手動「Minta」單品項是自由文字、不會有這個格式 → 回傳 null，走原本整串模糊比對。
// 只要有一行不符合格式就整批當非結構化文字（保守：寧可退回舊邏輯，不要誤判成多品項）。
function parseReqItemLines(text){
  var lines=(text||'').split('\n').map(function(s){return s.trim();}).filter(Boolean);
  if(!lines.length)return null;
  var out=[];
  for(var i=0;i<lines.length;i++){
    var m=lines[i].match(/^•\s*(.+?)(?:\s*\[([^\]]+)\])?\s*×\s*([\d.]+)\s*(\S+)?\s*$/);
    if(!m)return null;
    out.push({raw:lines[i],name:m[1].trim(),partNo:m[2]||'',qty:parseFloat(m[3])||0,unit:m[4]||''});
  }
  return out;
}
// 已購買 → 開窗選擇對應商品與數量，記為進貨(Masuk)並加庫存
function approveReqBuy(id){
  if(!IS_ADMIN){toast('⚠ '+('Hanya admin'));return;}
  var r=DATA.requests.find(function(x){return x.id==id;});
  if(!r)return;
  var lines=parseReqItemLines(r.items_requested);
  // 多品項的 FAMMS 申請（例如一次叫 2 種零件）不能只用一個下拉選單、只入庫其中一項
  // 卻把整筆請求標記已完成 — 那會讓其餘品項的庫存永遠不會被加回去。改走逐項處理的流程。
  if(lines&&lines.length>1){approveReqBuyMulti(id,r,lines);return;}
  // 嘗試把請求文字對應到現有商品（先精確、再包含匹配）；若已解析出單一品項（bullet 格式只有一行），
  // 用解析出的乾淨名稱比對，比直接拿含「• × pcs」雜訊的整串字比對準確。
  var reqName=(lines&&lines.length===1?lines[0].name:(r.items_requested||'')).toLowerCase().trim();
  var matched=DATA.items.find(function(i){return reqName===(i.name||'').toLowerCase();})
    ||DATA.items.find(function(i){var n=(i.name||'').toLowerCase();return n&&(reqName.indexOf(n)>=0||n.indexOf(reqName)>=0);});
  var opts=DATA.items.map(function(i){
    return '<option value="'+esc(i.variant_id)+'"'+(matched&&matched.variant_id===i.variant_id?' selected':'')+'>'+esc(i.name)+' (stok: '+i.qty+' '+esc(i.unit)+')'+(CURRENT_WAREHOUSE?'':' ['+esc(WH_SHORT[i.warehouse_id]||i.warehouse_id||'?')+']')+'</option>';
  }).join('');
  showModal('🛒 Sudah Beli — Masuk ke Stok',
    '<div style="background:#ECFDF5;border:1.5px solid #86EFAC;border-radius:8px;padding:.7rem;margin-bottom:.8rem;font-size:.85rem">'+
      '<div style="font-weight:700;color:#059669;margin-bottom:.2rem">📋 Permintaan</div>'+
      '<div style="color:var(--ink2)">'+esc(r.items_requested)+'</div>'+
      '<div style="font-size:.78rem;color:var(--ink2);margin-top:.2rem">👤 '+esc(r.person_name)+'</div>'+
    '</div>'+
    '<div class="ig"><label>📦 Barang yang dibeli</label>'+
      '<select id="arq-item">'+(matched?'':'<option value="">-- Pilih barang --</option>')+opts+'</select>'+
    '</div>'+
    (matched?'':'<div style="font-size:.78rem;color:#D97706;margin-bottom:.6rem">⚠️ Tidak ada barang yang cocok otomatis. Jika ini barang baru, tambahkan dulu di menu Admin, lalu setujui lagi.</div>')+
    '<div class="ig"><label>🔢 Jumlah Dibeli</label><input id="arq-qty" type="number" min="1" value="'+(lines&&lines.length===1&&lines[0].qty>0?lines[0].qty:1)+'"></div>'+
    '<div style="display:flex;gap:.5rem;margin-top:.5rem">'+
      '<button class="btn btn-s" style="flex:1" onclick="closeModal()">✕ Batal</button>'+
      '<button id="arq-confirm-btn" class="btn btn-ok" style="flex:2" onclick="confirmApproveReqBuy(\''+esc(id)+'\')">✓ Masuk ke Stok</button>'+
    '</div>'
  );
}

async function confirmApproveReqBuyMulti(id){
  var r=DATA.requests.find(function(x){return x.id==id;});
  if(!r)return;
  var rowsEl=document.getElementById('arqm-rows');
  var n=rowsEl?(parseInt(rowsEl.getAttribute('data-count'))||0):0;
  var rows=[];
  for(var i=0;i<n;i++){
    var sel=document.getElementById('arqm-item-'+i);
    var qtyEl=document.getElementById('arqm-qty-'+i);
    var variantId=sel?sel.value:'';
    var q=parseInt(qtyEl&&qtyEl.value)||0;
    if(!variantId){toast('⚠ Pilih semua barang dulu (baris '+(i+1)+' belum dipilih)');return;}
    if(q<1){toast('⚠ Jumlah minimal 1 (baris '+(i+1)+')');return;}
    var item=DATA.items.find(function(it2){return it2.variant_id==variantId;});
    if(!item)return;
    rows.push({item:item,qty:q});
  }
  var _bm=document.getElementById('arqm-confirm-btn');
  if(_bm){if(_bm.disabled)return;_bm.disabled=true;_bm.textContent='⏳...';} // 防連點導致整批重複入庫
  var ok=[],fail=[],batchWarn=[];
  for(var j=0;j<rows.length;j++){
    var row=rows[j];
    try{
      await atomicAdjustQty(row.item.variant_id,row.qty);
      var u2=await sb.from('transactions').insert({type:'masuk',item_id:row.item.id,item_name:row.item.name,person_name:r.person_name,qty:row.qty,warehouse_id:row.item.warehouse_id||CURRENT_WAREHOUSE||null});
      if(u2.error)throw u2.error;
      var u2b=await sbInsertSafe('item_batches',{item_id:row.item.id,warehouse_id:row.item.warehouse_id||CURRENT_WAREHOUSE||null,qty_initial:row.qty,qty_remaining:row.qty,received_date:today()});
      if(u2b.error){console.warn('[confirmApproveReqBuyMulti] batch insert gagal:',u2b.error.message);batchWarn.push(row.item.name);}
      ok.push(row.item.name+' +'+row.qty);
    }catch(e){
      console.warn('[confirmApproveReqBuyMulti] gagal untuk',row.item.name,e);
      fail.push(row.item.name+' ('+friendlyErr(e)+')');
    }
  }
  // Kalau minimal satu barang berhasil masuk stok, tandai permintaan selesai — yang gagal
  // sudah ditampilkan di toast supaya admin tahu harus tindak lanjut manual (bukan hilang diam-diam).
  if(ok.length){
    try{
      var u3=await sb.from('requests').update({status:'approved'}).eq('id',id);
      if(u3.error)console.warn('[confirmApproveReqBuyMulti] update status gagal:',u3.error.message);
      notifyFammsIfNeeded(id);
    }catch(e2){console.warn('[confirmApproveReqBuyMulti] update status exception:',e2);}
  }
  closeModal();
  var msg=(ok.length?'✓ Masuk: '+ok.join(', '):'')+(fail.length?(ok.length?' | ':'')+'✗ Gagal: '+fail.join(', '):'')+(batchWarn.length?' ⚠ catatan lot gagal untuk '+batchWarn.join(', '):'');
  toast(msg||'⚠ Tidak ada barang diproses');
  await loadAll();
}

  var sel=document.getElementById('arq-item');

  var item=DATA.items.find(function(i){return i.variant_id==variantId;});
  if(!item)return;
  var _b=document.getElementById('arq-confirm-btn');
  if(_b){if(_b.disabled)return;_b.disabled=true;_b.textContent='⏳...';} // 防手套連點導致重複入庫
  try{
    // 1) 加庫存（baca-terbaru + compare-and-swap，bukan qty lokal）
    await atomicAdjustQty(item.variant_id,q);
    // 2) 記為進貨交易(Masuk)
    var u2=await sb.from('transactions').insert({type:'masuk',item_id:item.id,item_name:item.name,person_name:r.person_name,qty:q,warehouse_id:item.warehouse_id||CURRENT_WAREHOUSE||null});

    // 總量多，FIFO 領料批次提早見底但總庫存還沒扣完（沒有 lot/效期可填，留空即可）。
    // qty/交易在這之前都已 commit，批次失敗不能整段回滾重試（會重複加庫存+記交易），
    // 只能警示、繼續往下標記已核准。
    var u2b=await sbInsertSafe('item_batches',{item_id:item.id,warehouse_id:item.warehouse_id||CURRENT_WAREHOUSE||null,qty_initial:q,qty_remaining:q,received_date:today()});
    if(u2b.error)console.warn('[confirmApproveReqBuy] batch insert gagal:',u2b.error.message);
    // 4) 請求標記為已批准
    var u3=await sb.from('requests').update({status:'approved'}).eq('id',id);
    if(u3.error)throw u3.error;
    notifyFammsIfNeeded(id);
    toast('✓ '+item.name+' +'+q+' '+('masuk stok')+(u2b.error?' ⚠ catatan lot gagal disimpan':''));
    closeModal();
    await loadAll();
  }catch(e){toast('⚠ '+friendlyErr(e));var _b2=document.getElementById('arq-confirm-btn');if(_b2){_b2.disabled=false;_b2.textContent='✓ Masuk ke Stok';}}
}

// LOW STOCK — 依 ALERT_CFG 決定要不要彈窗（off=不彈 / daily=每天一次 / always=每次）
function checkLowStock(){
  if(ALERT_CFG.mode==='off')return;
  if(!lowAlertAllowed())return;
  if(document.getElementById('m-ov'))return; // 有 modal 開著時不要疊上去打斷使用者，下次 loadAll 再檢查
  // 暫停日期：該日期(不含)之前都安靜，到期自動恢復，不用再回來改設定
  if(ALERT_CFG.snooze&&today()<ALERT_CFG.snooze)return;
  var pool=DATA.items.filter(function(i){
    if(!(i.critical_qty>0))return false;
    if(i.remark&&i.remark.includes('#noalert'))return false;
    return ALERT_CFG.scope==='low'?i.qty<=i.critical_qty:i.qty===0;
  });
  if(!pool.length)return;
  if(ALERT_CFG.mode!=='always'){
    var gap=Math.max(1,parseInt(ALERT_CFG.days,10)||1);
    var k='lowlast_'+CURRENT_WAREHOUSE;
    try{
      var last=localStorage.getItem(k);
      if(last&&(new Date(today())-new Date(last))/86400000<gap)return;
      localStorage.setItem(k,today());
    }catch(e){}
  }
  showLow(pool[0],1);
}

// ── 🗂 Arsip & Bersihkan：舊資料先下載 CSV 存電腦，確認後才可刪除（僅 Super Admin）──
var ARC={cutoff:null,counts:null,dl:{}};
// ts:true → kolomnya timestamptz (created_at/checked_at), bukan date murni (date). Perlu dibedakan
// karena cara membangun batas cutoff-nya beda — lihat arcCutoffFor().
var ARC_TABLES=[
  {t:'transactions',label:'📜 Riwayat Ambil/Masuk',col:'created_at',ts:true},
  {t:'din_production',label:'🏭 DIN Produksi',col:'date'},
  {t:'din_rehidrasi',label:'💧 DIN Rehidrasi',col:'date'},
  {t:'din_delivery',label:'🚚 DIN Pengiriman',col:'date'},
  {t:'sja_production',label:'🏭 SJA Produksi',col:'date'},
  {t:'sja_delivery',label:'🚚 SJA Pengiriman',col:'date'},
  {t:'qc_checks',label:'✅ QC / HACCP',col:'checked_at',ts:true},
  {t:'requests',label:'🙋 Permintaan (selesai)',col:'created_at',ts:true,extra:function(q){return q.neq('status','pending');}},
  {t:'item_batches',label:'📦 Batch stok habis',col:'created_at',ts:true,extra:function(q){return q.lte('qty_remaining',0);}}
];
// Kolom ts:true (created_at/checked_at) bertipe TIMESTAMP TANPA zona (bukan timestamptz!) —
// isinya jam UTC (dari now() di server) tapi disimpan sebagai "wall time" tanpa info zona.
// Kalau kita kirim literal '...+07:00', Postgres MEMBUANG offset itu saat cast ke timestamp
// (offset diabaikan begitu saja) — jadi menambahkan +07:00 sebelumnya TIDAK BEREFEK APA-APA,
// cutoff yang terkirim ke DB sama saja dengan jam WIB dianggap jam UTC (mundur 7 jam dari
// yang dimaksud). Perbaikannya: hitung instant tengah-malam WIB itu di sisi client lalu ubah
// ke string UTC (toISOString()) — hasilnya cocok dengan wall-time UTC yang tersimpan di kolom.
// Kolom date murni tidak kena masalah ini (tidak ada komponen jam), tetap pakai string apa adanya.
function arcCutoffFor(c,cutoff){return c.ts?(new Date(cutoff+'T00:00:00+07:00').toISOString()):cutoff;}
function arcDefaultDate(){var d=new Date();d.setMonth(d.getMonth()-12);return ymd(d);}

async function arcFetchAll(c,cutoff){
  var out=[],page=0,truncated=false,CAP=200; // 安全上限 20 萬筆
  var cf=arcCutoffFor(c,cutoff);
  while(true){
    var q=sb.from(c.t).select('*').lt(c.col,cf).order(c.col,{ascending:true}).range(page*1000,page*1000+999);
    if(c.extra)q=c.extra(q);
    var r=await q;
    if(r.error)throw new Error(r.error.message);
    out=out.concat(r.data||[]);
    if(!r.data||r.data.length<1000)break;
    page++;
    if(page>CAP){truncated=true;break;} // 資料量超過上限：CSV 只含前面部分，回報 truncated 讓刪除端阻擋
  }
  return {rows:out,truncated:truncated};
}
function csvCell(v){if(v==null)v='';if(typeof v==='object')v=JSON.stringify(v);v=String(v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function dlCSV(name,rows){
  var cols={};rows.forEach(function(r){Object.keys(r).forEach(function(k){cols[k]=1;});});
  var keys=Object.keys(cols);
  var lines=[keys.join(',')].concat(rows.map(function(r){return keys.map(function(k){return csvCell(r[k]);}).join(',');}));
  var blob=new Blob(['\ufeff'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'}); // BOM 讓 Excel 正確顯示中文
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},1500);
}
async function arcCsv(i){
  var c=ARC_TABLES[i];
  var btn=document.getElementById('arc-dl-'+i);
  if(btn){btn.disabled=true;btn.textContent='⏳';}
  try{
    var res=await arcFetchAll(c,ARC.cutoff);
    var rows=res.rows;
    if(!rows.length){toast('Tidak ada data');if(btn){btn.disabled=false;btn.textContent='📥 CSV';}return;}
    dlCSV('arsip-'+c.t+'-sebelum-'+ARC.cutoff+'.csv',rows);
    if(res.truncated){
      // Data lebih banyak dari yang muat di satu CSV → JANGAN tandai "sudah diunduh".
      // Kalau ditandai, arcDelete menganggap sudah ada backup lalu menghapus SEMUA baris
      // (termasuk yang tak masuk CSV) → kehilangan data. Biarkan ARC.dl tetap false supaya
      // arcDelete memperingatkan "belum diunduh".
      if(btn){btn.disabled=false;btn.textContent='📥 CSV (sebagian)';}
      toast('⚠ Data terlalu banyak — CSV hanya memuat '+rows.length+' baris pertama. JANGAN hapus, backup manual dulu (mis. per rentang tanggal).');
      return;
    }
    ARC.dl[c.t]=true;
    if(btn){btn.textContent='✓ Terunduh';btn.style.background='#ECFDF5';btn.style.color='#065F46';}
    toast('✓ '+rows.length+' baris → CSV');
  }catch(e){toast('⚠ '+friendlyErr(e));if(btn){btn.disabled=false;btn.textContent='📥 CSV';}}
}
async function arcDelete(){
  if(!ARC.cutoff||!ARC.counts)return;
  var withData=ARC_TABLES.filter(function(c){return ARC.counts[c.t]>0;});
  var notDl=withData.filter(function(c){return !ARC.dl[c.t];});
  if(notDl.length&&!confirm('⚠ Ada '+notDl.length+' jenis data yang BELUM diunduh CSV:\n'+notDl.map(function(c){return '· '+c.label;}).join('\n')+'\n\nTetap hapus tanpa backup?'))return;
  var total=withData.reduce(function(s,c){return s+ARC.counts[c.t];},0);
  if(!confirm('🗑 Hapus '+total+' data sebelum '+ARC.cutoff+'?\n\nData TIDAK BISA dikembalikan. Lanjut?'))return;
  var btn=document.getElementById('arc-del');if(btn){btn.disabled=true;btn.textContent='⏳ Menghapus...';}
  var ok=0,fail=[];
  for(var i=0;i<withData.length;i++){
    var c=withData[i];
    try{
      var q=sb.from(c.t).delete().lt(c.col,arcCutoffFor(c,ARC.cutoff));
      if(c.extra)q=c.extra(q);
      var r=await q;
      if(r.error)throw new Error(r.error.message);
      ok+=ARC.counts[c.t];
    }catch(e){fail.push(c.label);}
  }
  // 清掉所有快取，讓相關畫面重新載入
  TX_LOADED=false;DIN_LOADED=false;SJA_LOADED=false;QC_LOADED=false;
  if(typeof ANA!=='undefined')ANA.loadedFor=0;
  auditLog('purge','arsip',null,'Hapus '+ok+' baris data lama sebelum '+ARC.cutoff,null);
  toast(fail.length?('⚠ Sebagian gagal: '+fail.join(', ')):('✓ '+ok+' data lama terhapus'));
  ADMIN_SUBTAB='adt';
  await loadAll();
}
function compressImg(file,cb){
  // File rusak / format tak terbaca (mis. HEIC di sebagian Android) harus tetap memanggil cb —
  // dulu tanpa onerror, decode gagal = callback tak pernah jalan, preview nyangkut ⏳ selamanya
  // dan PHOTO_UPLOADING tak pernah turun. cb(null) = gagal, penelepon menampilkan error.
  var rd=new FileReader();
  rd.onerror=function(){cb(null);};
  rd.onload=function(e){
    var img=new Image();
    img.onerror=function(){cb(null);};
    img.onload=function(){
      try{
        var MAX=1200,r=Math.min(MAX/img.width,MAX/img.height,1);
        var cv=document.createElement('canvas');
        cv.width=Math.round(img.width*r);cv.height=Math.round(img.height*r);
        cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
        var dataUrl=cv.toDataURL('image/jpeg',0.85);
        // Baca .length ULANG tiap kali sebelum cek — dulu dibaca sekali di awal lalu dipakai
        // buat kedua cek, jadi cek kedua menilai ukuran HASIL 0.85 yang sudah basi, bukan
        // ukuran dataUrl 0.75 yang baru saja dihasilkan. Efeknya foto besar bisa kepotong dua
        // kali (0.85→0.75→0.65) padahal hasil 0.75-nya saja sudah cukup kecil.
        if(dataUrl.length>2000000){dataUrl=cv.toDataURL('image/jpeg',0.75);}
        if(dataUrl.length>3000000){dataUrl=cv.toDataURL('image/jpeg',0.65);}
        cb(dataUrl);
      }catch(err){cb(null);}
    };
    img.src=e.target.result;
  };
  rd.readAsDataURL(file);
}
// Supabase Storage bucket untuk foto barang. Foto di-upload ke sini lalu kita
// simpan URL-nya (bukan base64) supaya baris DB kecil & tidak kena "payload too large".
var PHOTO_BUCKET='item-photos';
// Kompres dulu, lalu upload ke Storage. Kembalikan public URL.
// Kalau Storage belum siap / gagal (bucket hilang, policy, offline), fallback ke
// data URL base64 supaya simpan barang tetap jalan dan tidak pernah error fatal.
function uploadImage(file,prefix){
  return new Promise(function(resolve){
    compressImg(file,function(dataUrl){
      if(!dataUrl){resolve('');return;} // decode gagal → kembalikan kosong, jangan gantung
      (async function(){
        try{
          var blob=await (await fetch(dataUrl)).blob();
          var path=(prefix||'img')+'/'+Date.now()+'_'+Math.random().toString(36).slice(2)+'.jpg';
          var up=await sb.storage.from(PHOTO_BUCKET).upload(path,blob,{contentType:'image/jpeg',upsert:false});
          if(up.error)throw up.error;
          var pub=sb.storage.from(PHOTO_BUCKET).getPublicUrl(path);
          var url=pub&&pub.data&&pub.data.publicUrl;
          resolve(url||dataUrl);
        }catch(err){
          console.warn('uploadImage fallback ke base64:',err&&err.message);
          resolve(dataUrl);
        }
      })();
    });
  });
}

// 背景預載排程：等主執行緒 idle 才做（requestIdleCallback），並避開省流量/2G 網路。
// 之前用固定 1.2/2.5 秒 timer，低階手機剛可操作時就被預載搶 CPU/流量；改成 idle + 網路感知，
// timeoutMs 是「就算一直不 idle 也最遲多久要做」的上限。無 rIC 時退回 setTimeout。
function idlePreload(fn,timeoutMs){
  try{
    var c=navigator.connection||navigator.webkitConnection||navigator.mozConnection;
    if(c&&(c.saveData||/(^|-)2g$/.test(c.effectiveType||'')))return; // 省流量/2G：跳過背景預載
  }catch(_){}
  if(typeof requestIdleCallback==='function'){requestIdleCallback(function(){try{fn();}catch(_){}},{timeout:timeoutMs});}
  else{setTimeout(function(){try{fn();}catch(_){}},timeoutMs);}
}
var PRELOAD_TS=0;
function preloadAllWarehouses(){
  // Background: cache gudang lain supaya switch cepat (silent, no toast)
  // 開放給「有多個倉庫權限」的使用者（不只 super admin），chips 快速切換才會秒切
  var whs=IS_ADMIN?WAREHOUSES:((CURRENT_USER&&CURRENT_USER.warehouses)||[]);
  if(whs.length<2)return;
  var now=Date.now();
  if(now-PRELOAD_TS<120000)return; // 節流：2 分鐘內不重複預載（之前每次 loadAll 都狂打 9 個請求）
  PRELOAD_TS=now;
  whs.forEach(function(w){
    if(w===CURRENT_WAREHOUSE)return; // skip yg sudah loaded
    // 快取還新鮮(<5 分鐘)就不重抓
    try{var fc=JSON.parse(localStorage.getItem('wh_cache_'+w)||'null');if(fc&&fc.ts&&now-fc.ts<300000)return;}catch(e){}
    // Background fetch silently - jangan interrupt user
    (async function(){
      try{
        var [iRes,rRes,bRes,cRes]=await Promise.all([
          sb.from('item_variants').select('*, items(*)').eq('warehouse_id',w).order('items(name)'),
          sb.from('requests').select('*').eq('warehouse_id',w).order('created_at',{ascending:false}),
          sb.from('item_batches').select('*').eq('warehouse_id',w).order('expiry_date',{ascending:true}),
          sb.from('categories').select('name').eq('warehouse_id',w).order('name')
        ]);
        // Flatten item_variants + items like loadAll does
        var flatItems=(iRes.data||[]).map(function(v){
          var itm=v.items||{};
          return{
            id:v.item_id,
            variant_id:v.id,
            name:itm.name||'?',
            code:itm.code,
            spec:itm.spec,
            pcs_per_ctn:itm.pcs_per_ctn,
            description:itm.description,
            image_url:itm.image_url,
            supplier_name:itm.supplier_name,
            supplier_url:itm.supplier_url,
            supplier_whatsapp:itm.supplier_whatsapp,
            unit:itm.unit,
            storage_condition:itm.storage_condition,
            coa_url:itm.coa_url,
            tags:itm.tags,
            qty:v.qty,
            critical_qty:v.critical_qty,
            storage_photo_url:v.storage_photo_url,
            warehouse_id:v.warehouse_id
          };
        });
        // Strip gambar base64 spt saveWhCache — supaya muat di kuota localStorage (~5MB)
        // & cache benar2 tersimpan agar switch warehouse instan
        var litItems=flatItems.map(function(i){
          var c={};for(var k in i){if(k!=='image_url'&&k!=='storage_photo_url')c[k]=i[k];}return c;
        });
        // Simpan cache tanpa ubah DATA/UI (silent background load)
        localStorage.setItem('wh_cache_'+w,JSON.stringify({items:litItems,batches:bRes.data||[],requests:rRes.data||[],categories:(cRes&&!cRes.error&&cRes.data)?cRes.data.map(function(c){return c.name;}):[],ts:Date.now()}));
      }catch(e){}
    })();
  });
}

async function exportToCSV(){
  // Catatan: fungsi ini mengambil SEMUA transaksi sendiri (loop di bawah, variabel allTx),
  // tidak pernah baca DATA.transactions/TX_LOADED — jadi tidak perlu nunggu Riwayat dimuat
  // dulu. Gate `if(!TX_LOADED)` yang lama menyebabkan retry tanpa akhir saat offline (offline
  // → loadTransactions gagal terus → TX_LOADED tidak pernah true → exportToCSV dipanggil ulang
  // tanpa henti oleh callback-nya sendiri).
  if(!CURRENT_WAREHOUSE){toast('⚠ Pilih gudang dulu');return;}
  toast('⏳ Mengambil semua transaksi...');
  var allTx=[];
  try{
    var page=0;
    while(page<=50){ // 安全上限 5萬筆，跟 arcFetchAll 同款寫法
      var q=await sb.from('transactions').select('*').eq('warehouse_id',CURRENT_WAREHOUSE).order('created_at',{ascending:false}).range(page*1000,page*1000+999);
      if(q.error)throw q.error;
      allTx=allTx.concat(q.data||[]);
      if(!q.data||q.data.length<1000)break;
      page++;
    }
  }catch(e){toast('⚠ Gagal ambil transaksi: '+friendlyErr(e));return;}
  try{
    var now=new Date();
    var dateStr=now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0')+'-'+now.getDate().toString().padStart(2,'0');

    // 準備資料為陣列格式（給 Google Sheet） - 只含目前倉庫的資料
    var itemsData=DATA.items.filter(function(i){return i.warehouse_id===CURRENT_WAREHOUSE;}).map(function(i){return[
      i.name,i.qty,i.unit,i.critical_qty,i.supplier_name||'',i.warehouse_id||'',i.storage_condition||'',i.description||'',i.coa_url||''
    ];});

    var txData=allTx.map(function(t){
      var it=itemById(t.item_id,t.warehouse_id);
      return[
        new Date(t.created_at).toLocaleDateString('id-ID'),
        t.type,t.item_name,t.qty,
        it?it.unit:'',
        t.person_name||'',t.warehouse_id||'',''
      ];
    });

    var batchData=DATA.batches.filter(function(b){return b.warehouse_id===CURRENT_WAREHOUSE;}).map(function(b){
      var item=itemById(b.item_id,b.warehouse_id);
      return[
        item?item.name:'?',b.lot_no||'',b.code_produksi||'',b.po_no||'',b.do_no||'',
        b.production_date||'',b.expiry_date||'',b.qc_status||'',b.qty_initial||0,b.qty_remaining||0,b.warehouse_id||''
      ];
    });

    // 根據倉庫選對應的 webhook
    var webhook=GS_WEBHOOKS[CURRENT_WAREHOUSE];
    if(!webhook){toast('⚠ Gudang tidak terdaftar');return;}

    // 寄到 Google Sheet
    var payload={items:itemsData,transactions:txData,batches:batchData};
    fetch(webhook,{
      method:'POST',
      body:JSON.stringify(payload)
    }).then(function(r){return r.json();}).then(function(res){
      if(res.success){
        var whName=WH_SHORT[CURRENT_WAREHOUSE]||CURRENT_WAREHOUSE;
        toast('✓ '+whName+' backup sukses: '+res.sheetUrl);
      }else{
        toast('⚠ '+res.error);
      }
    }).catch(function(e){
      toast('⚠ '+friendlyErr(e));
    });
  }catch(e){toast('⚠ '+friendlyErr(e));}
}
function fmtDate(s){if(!s)return'';var d=new Date(s);return d.toLocaleDateString('id-ID',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
// 用「當地」日期，不能用 toISOString()（=UTC）：印尼 UTC+7，早上 7 點前會差一天/跨月
function today(){return ymd(new Date());}
function esc(s){return(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function jsq(v){return esc(String(v==null?'':v).replace(/\\/g,'\\\\').replace(/'/g,"\\'"));} // untuk nilai di dalam string literal JS pada atribut onclick
// 只允許 http/https 連結；擋掉 javascript:/data: 等會在點擊時執行的 scheme。
// 因為 supplier_url/coa_url 是自由文字、又能經 API 寫入，必須先過白名單再放進 href。
function safeUrl(u){u=(u==null?'':String(u)).trim();return /^https?:\/\//i.test(u)?esc(u):'#';}
// 供應商 WhatsApp 號碼：只留數字，開頭 0 換成 62（印尼國碼，wa.me 深連結要求純數字、不能有 +/空白）。
function waDigits(v){var d=String(v==null?'':v).replace(/\D/g,'');if(!d)return'';if(d.charAt(0)==='0')d='62'+d.slice(1);return d;}
function waLink(v){var d=waDigits(v);return d?'https://wa.me/'+d:'';}
// 全站統一狀態徽章：圖示+顏色+文字三件組（色弱/強光下仍可辨識）
function stBadge(kind,label){
  var m={
    wait:  {i:'⏳',bg:'#FEF0DC',fg:'#8C4A06'},   // 等待中
    ok:    {i:'✓', bg:'#E3F5EE',fg:'#0B6647'},   // 完成/通過
    off:   {i:'✕', bg:'#F1F2F4',fg:'#787F8E'},   // 拒絕/作廢（灰，不用紅）
    bad:   {i:'✗', bg:'#FDE8E8',fg:'#C22323'},   // 錯誤/Fail（紅只留給真正的危險）
    hold:  {i:'⏸',bg:'#FEF08A',fg:'#854D0E'}    // QC Hold
  }[kind]||{i:'',bg:'#F1F2F4',fg:'#787F8E'};
  return '<span style="display:inline-flex;align-items:center;gap:.25rem;border-radius:999px;padding:.18rem .6rem;font-size:.78rem;font-weight:800;background:'+m.bg+';color:'+m.fg+'">'+m.i+' '+label+'</span>';
}
// Ubah error mentah (JWT expired / Failed to fetch / duplicate key…) jadi pesan
// ramah bahasa Indonesia untuk pekerja. Error asli tetap ke console buat debug.
function friendlyErr(e){
  var m=(e&&e.message)||String(e||'');
  try{if(m)console.error('[err]',m);}catch(_){}
  // Error yang sudah ditulis khusus untuk pengguna (mis. atomicAdjustQty) — tampilkan apa adanya,
  // jangan digeneralisir jadi "Gagal, coba lagi" oleh pola-pola di bawah.
  if(e&&e.friendly)return m;
  if(/failed to fetch|network|timeout|koneksi|fetch/i.test(m))return 'Koneksi bermasalah, coba lagi';
  if(/jwt|expired|token|unauthorized|auth/i.test(m))return 'Sesi habis, silakan masuk ulang';
  if(/duplicate|unique|already exists|sudah ada/i.test(m))return 'Data sudah ada';
  if(/permission|denied|not allowed|\brls\b|policy|row-level/i.test(m))return 'Tidak ada izin untuk aksi ini';
  if(/violates|constraint|null value|invalid|not-null/i.test(m))return 'Data tidak lengkap / tidak valid';
  if(/payload|too large|size/i.test(m))return 'File terlalu besar';
  return m?'Gagal, coba lagi':'Terjadi kesalahan';
}
function toast(msg,dur){
  var isErr=/^\s*[⚠❌]/.test(msg)||/gagal/i.test(msg);
  var isOk=/^\s*[✓✅]/.test(msg);
  var t=document.createElement('div');
  t.className='toast'+(isErr?' toast-err':isOk?' toast-ok':'');
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(function(){
    t.classList.add('out');
    setTimeout(function(){t.remove();},180);
  },dur||(isErr?6000:2800)); // 錯誤停久一點，來得及讀
}
// Tappable toast with an action (dipakai pemberitahuan update Service Worker)
function showToast(msg,actionLabel,cb){
  var el=document.createElement('div');el.className='toast';el.style.cursor='pointer';
  el.innerHTML=esc(msg)+(actionLabel?' <span style="text-decoration:underline;font-weight:700;margin-left:.4rem">'+esc(actionLabel)+'</span>':'');
  var dismissed=false;
  function dismiss(){
    if(dismissed)return;dismissed=true;
    el.classList.add('out');
    setTimeout(function(){el.remove();},180);
  }
  el.onclick=function(){if(cb)cb();dismiss();};
  document.body.appendChild(el);
  setTimeout(dismiss,8000);
}

  if(table==='din_production')return['production','stock','monthly'];

function dinProd(code){for(var i=0;i<DIN.products.length;i++)if(DIN.products[i].code===code)return DIN.products[i];return null;}
function dinStockOf(code){for(var i=0;i<DIN.stock.length;i++)if(DIN.stock[i].product_code===code)return DIN.stock[i];return null;}
// 產品排序比較：先看手動 sort_order（後台可調），沒設定就退回 code
function prodCmp(a,b){return ((a.sort_order||0)-(b.sort_order||0))||String(a.code||'').localeCompare(String(b.code||''));}
// inclInactiveStock=true（只給「出貨」下拉用）：把停產但仍有餘貨的產品也列出，標 (nonaktif)，
// 讓餘貨還能被出清；生產下拉不傳這旗標，停產品照樣不出現（停產就不該再生產）。
function dinProdOptions(sel,inclInactiveStock){
  var byCust={};
  DIN.products.forEach(function(p){
    if(p.is_active===false){
      if(!inclInactiveStock)return;
      var s=dinStockOf(p.code);
      if(!s||((s.stock_kg||0)===0&&(s.stock_bags||0)===0))return; // 停產且無餘貨 → 不列
    }
    (byCust[p.customer_name]=byCust[p.customer_name]||[]).push(p);
  });
  var h='<option value="">-- Pilih Produk --</option>';
  Object.keys(byCust).forEach(function(c){
    h+='<optgroup label="'+esc(c)+'">';
    byCust[c].slice().sort(prodCmp).forEach(function(p){h+='<option value="'+esc(p.code)+'"'+(sel===p.code?' selected':'')+'>'+esc(p.code)+' — '+esc(p.item_name)+(p.is_active===false?' (nonaktif)':'')+'</option>';});
    h+='</optgroup>';
  });
  return h;
}

function sjaBoxTotal(prefix){

  var ppc=(p&&p.pcs_per_ctn)||0;
  var boxes=Number((document.getElementById(prefix+'-boxes')||{}).value)||0;
  var units=Number((document.getElementById(prefix+'-units')||{}).value)||0;
  var totalQty=boxes*ppc+units;
  var totalEl=document.getElementById(prefix+'-total');
  if(totalEl){
    if(boxes<=0&&units<=0){totalEl.style.display='none';}
    else{
      totalEl.style.display='block';
      var parts=[];
      if(boxes>0)parts.push(fmtN(boxes)+' box'+(ppc?' ('+fmtN(boxes*ppc)+')':''));
      if(units>0)parts.push(fmtN(units));
      var txt=parts.join(' + ')+' = '+fmtN(totalQty);
      if(boxes<=0&&units>0&&ppc>0){
        if(units%ppc===0)txt+='（= '+(units/ppc)+' box）';
        else if(units>ppc)txt+='（= '+Math.floor(units/ppc)+' box + '+(units%ppc)+'）';
      }
      document.getElementById(prefix+'-total-val').textContent=txt;
      document.getElementById(prefix+'-total-unit').textContent=p?(p.unit||'pcs'):'pcs';
    }
  }
  if(prefix==='sd'&&SJA_FIFO.code)renderSjaFifo(); // 出貨數量變 → 更新 FIFO 分配預覽
  return totalQty;
}

function fmtD(s){if(!s)return'';return String(s).slice(5);} // MM-DD
function fmtN(n){if(n==null||n==='')return'-';var v=Number(n);return(v%1?v.toFixed(1):String(v));}

// 產品排序：把某產品在同一「群組」內上移/下移，寫回 sort_order（整群重編號，穩定）
async function dinMoveProduct(code,dir){
  var p=dinProd(code);if(!p)return;
  var grp=DIN.products.filter(function(x){return (x.customer_name||'-')===(p.customer_name||'-');}).sort(prodCmp);
  var i=grp.findIndex(function(x){return x.code===code;});var j=i+dir;
  if(i<0||j<0||j>=grp.length)return;
  var t=grp[i];grp[i]=grp[j];grp[j]=t;
  for(var k=0;k<grp.length;k++){if((grp[k].sort_order||0)!==k+1){var e=await sb.from('din_products').update({sort_order:k+1}).eq('code',grp[k].code);if(e.error){toast('⚠ '+friendlyErr(e.error));return;}grp[k].sort_order=k+1;}}
  dinRefresh(['products'],dinBody);
}

async function dinToggleProduct(code,activate){

      if(!confirm('⚠ Produk "'+code+'" masih ada sisa stok ('+fmtN(s.stock_kg)+' kg). Nonaktifkan?\nSisa stok tetap bisa dikirim & muncul ditandai "nonaktif", tapi produk tak bisa diproduksi lagi.'))return;

}

async function sjaSaveProduction(){
  var code=document.getElementById('sp-code').value;
  if(!code){toast('⚠ Pilih produk dulu');return;}
  var p=sjaProd(code);var ppc=(p&&p.pcs_per_ctn)||0;
  var boxes=Number(document.getElementById('sp-boxes').value)||0;
  var units=Number(document.getElementById('sp-units').value)||0;
  var qty=boxes*ppc+units; // 總數 = 箱數×每箱件數 + 散件（與畫面總計一致）
  if(qty<=0){toast('⚠ Isi Box atau Eceran');return;}
  var btn=document.getElementById('sp-save');btn.disabled=true;
  var r=await sb.from('sja_production').insert({
    date:document.getElementById('sp-date').value||today(),
    product_code:code,qty:qty,
    batch_lot_no:(document.getElementById('sp-batch').value||'').trim()||null,
    staff:CURRENT_USER?CURRENT_USER.name:null,
    note:(document.getElementById('sp-note').value||'').trim()||null
  });
  btn.disabled=false;
  if(r.error){toast('⚠ '+friendlyErr(r.error));return;}
  toast('✓ Produksi tersimpan');
  // 連續打同產品：重繪後帶回剛才的選擇
  var keepCode=document.getElementById('sp-code').value;
  sjaRefresh(['production','stock','monthly'],function(){
    sjaBody();
    setTimeout(function(){var c=document.getElementById('sp-code');if(c){c.value=keepCode;sjaFillProd();}},50);
  });
}

function sjaStockOf(code){for(var i=0;i<SJA.stock.length;i++)if(SJA.stock[i].product_code===code)return SJA.stock[i];return null;}
function sjaStokRows(q){
  q=(q||'').toLowerCase();
  var rows=SJA.stock.filter(function(s){
    if(!q)return true;
    return (s.product_code||'').toLowerCase().indexOf(q)>=0||(s.product_name||'').toLowerCase().indexOf(q)>=0||(s.category||'').toLowerCase().indexOf(q)>=0;
  });
  if(!rows.length)return'<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:1.2rem;font-size:.85rem">Tidak ada data</td></tr>';
  return rows.map(function(s){
    var neg=(s.stock_qty||0)<0;
    var inact=s.is_active===false; // 停產但仍有餘貨（視圖更新後才會出現）
    return'<tr style="border-top:1px solid #F1F5F9'+(inact?';background:#F9FAFB':'')+'"><td style="padding:.35rem .4rem"><b>'+esc(s.product_code)+'</b>'+(inact?' <span style="font-size:.62rem;background:#E5E7EB;color:#6B7280;padding:.05rem .3rem;border-radius:5px;font-weight:700">nonaktif</span>':'')+'<br><span style="color:var(--muted);font-size:.7rem">'+esc(s.product_name||'')+'</span></td>'+
    '<td style="text-align:right">'+fmtN(s.total_produced_qty)+'</td>'+
    '<td style="text-align:right">'+fmtN(s.total_delivered_qty)+'</td>'+
    '<td style="text-align:right;font-weight:700;color:'+(neg?'#DC2626':'#059669')+'">'+fmtN(s.stock_qty)+' '+esc(s.unit||'')+'</td></tr>';
  }).join('');
}

function sjaProdukRows(q){
  q=(q||'').toLowerCase();
  var rows=SJA.products.filter(function(p){
    if(!q)return true;
    return (p.code||'').toLowerCase().indexOf(q)>=0||(p.product_name||'').toLowerCase().indexOf(q)>=0||(p.category||'').toLowerCase().indexOf(q)>=0;
  });
  if(!rows.length)return'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:1.2rem;font-size:.85rem">Tidak ada data</td></tr>';
  // 依分類分組、組內照 sort_order（後台可調），組序維持原順序
  var byCat={},order=[];
  rows.forEach(function(p){var c=p.category||'-';if(!byCat[c]){byCat[c]=[];order.push(c);}byCat[c].push(p);});
  var out='';
  order.forEach(function(cat){
    var arr=byCat[cat].slice().sort(prodCmp);
    arr.forEach(function(p,gi){
      var c=esc(p.code).replace(/'/g,"\\'");
      var move=(IS_ADMIN&&!q)?'<button onclick="sjaMoveProduct(\''+c+'\',-1)" '+(gi===0?'disabled':'')+' style="border:1px solid var(--border);border-radius:5px;background:#fff;cursor:pointer;font-size:.72rem;padding:.1rem .3rem;opacity:'+(gi===0?'.3':'1')+'">▲</button><button onclick="sjaMoveProduct(\''+c+'\',1)" '+(gi===arr.length-1?'disabled':'')+' style="border:1px solid var(--border);border-radius:5px;background:#fff;cursor:pointer;font-size:.72rem;padding:.1rem .3rem;opacity:'+(gi===arr.length-1?'.3':'1')+'">▼</button> ':'';
      out+='<tr style="border-top:1px solid #F1F5F9'+(p.is_active===false?';opacity:.45':'')+'">'+
      '<td style="padding:.35rem .4rem"><b>'+esc(p.code)+'</b></td>'+
      '<td>'+esc(p.product_name)+'<br><span style="color:var(--muted);font-size:.7rem">'+esc(p.category||'-')+'</span></td>'+
      '<td>'+esc(p.unit||'')+'</td>'+
      '<td style="text-align:right">'+(p.pcs_per_ctn||'-')+'</td>'+
      '<td>'+(IS_ADMIN?'<button onclick="sjaToggleProduct(\''+c+'\')" style="background:none;border:none;cursor:pointer;font-size:.9rem" title="aktif/nonaktif">'+(p.is_active===false?'🔴':'🟢')+'</button>':'')+'</td>'+
      '<td style="white-space:nowrap">'+move+(IS_ADMIN?'<button class="tedit" onclick="sjaEditProduct(\''+c+'\')">✏️</button><button class="tdel" onclick="sjaDeleteProduct(\''+c+'\')">🗑</button>':'')+'</td></tr>';
    });
  });
  return out;
}
async function sjaMoveProduct(code,dir){
  var p=sjaProd(code);if(!p)return;
  var grp=SJA.products.filter(function(x){return (x.category||'-')===(p.category||'-');}).sort(prodCmp);
  var i=grp.findIndex(function(x){return x.code===code;});var j=i+dir;
  if(i<0||j<0||j>=grp.length)return;
  var t=grp[i];grp[i]=grp[j];grp[j]=t;
  for(var k=0;k<grp.length;k++){if((grp[k].sort_order||0)!==k+1){var e=await sb.from('sja_products').update({sort_order:k+1}).eq('code',grp[k].code);if(e.error){toast('⚠ '+friendlyErr(e.error));return;}grp[k].sort_order=k+1;}}
  sjaRefresh(['products'],sjaBody);
}

function dinFillDeliv(){
  var code=document.getElementById('dd-code').value;
  var s=dinStockOf(code),el=document.getElementById('dd-stok');
  if(!code||!el)return;
  if(s){
    var neg=(s.stock_kg||0)<=0;
    el.innerHTML='Stok saat ini: <b style="color:'+(neg?'#DC2626':'#059669')+'">'+fmtN(s.stock_kg)+' kg / '+fmtN(s.stock_bags)+' bags</b>';
  }else el.innerHTML='<span style="color:var(--muted)">Belum ada produksi untuk produk ini</span>';
  // 最近的 lot 建議
  var lots=[];
  DIN.production.forEach(function(r){if(r.product_code===code&&r.lot_no&&lots.indexOf(r.lot_no)<0)lots.push(r.lot_no);});
  if(lots.length)document.getElementById('dd-lot').placeholder=lots.slice(0,2).join(',');
  dinDelivCalc();
}
function dinDelivCalc(){
  var p=dinProd(document.getElementById('dd-code').value);if(!p)return;
  var bags=Number(document.getElementById('dd-bags').value)||0;
  var kgEl=document.getElementById('dd-kg'),ctnEl=document.getElementById('dd-ctn');
  if(bags>0){
    kgEl.value=bags*(p.kg_per_bag||0)||'';
    ctnEl.value=p.pack_ctn?Math.ceil(bags/p.pack_ctn):'';
    kgEl.dataset.auto='1';ctnEl.dataset.auto='1';
  }else{
    // 清掉 bags 時，連同「自動帶出的」kg/ctn 一起清，避免存到殘留值；手動輸入的不動
    if(kgEl.dataset.auto==='1'){kgEl.value='';delete kgEl.dataset.auto;}
    if(ctnEl.dataset.auto==='1'){ctnEl.value='';delete ctnEl.dataset.auto;}
  }
}
async function dinSaveDelivery(){
  var code=document.getElementById('dd-code').value;
  if(!code){toast('⚠ Pilih produk dulu');return;}
  var bags=Number(document.getElementById('dd-bags').value)||0;
  var kg=Number(document.getElementById('dd-kg').value)||0;
  if(bags<=0&&kg<=0){toast('⚠ Isi jumlah kirim');return;}
  // 沒有庫存記錄 = 庫存 0，也要警告；只填 bags 沒 kg 時改比對 bags
  var s=dinStockOf(code);
  var stKg=s?(s.stock_kg||0):0,stBags=s?(s.stock_bags||0):0;
  var over=(kg>0&&kg>stKg)||(kg<=0&&bags>0&&bags>stBags);

// ── SJA 出貨 FIFO（先進先出）──
// 動態算：某產品所有生產批次（依日期排序）依序扣掉已出貨總量，得每批剩餘。
// 不改資料結構，永遠和「生產−出貨」一致；出貨自動從最早批次扣、帶出批號。
var SJA_FIFO={code:null,batches:[]};
function sjaFifoCompute(prods,dels){
  var delivered=(dels||[]).reduce(function(s,d){return s+(Number(d.qty)||0);},0);
  var rem=delivered,out=[];
  (prods||[]).forEach(function(p){
    var q=Number(p.qty)||0;var consumed=Math.min(q,rem);rem-=consumed;
    var remaining=q-consumed;
    if(remaining>0.0001)out.push({lot:p.batch_lot_no||('['+String(p.date||'').slice(5)+']'),date:p.date,remaining:remaining});
  });
  return out; // FIFO 順序，只列還有剩的批次
}
function sjaFifoAllocate(batches,need){
  var alloc=[],rem=need;
  for(var i=0;i<batches.length&&rem>0.0001;i++){
    var take=Math.min(batches[i].remaining,rem);
    alloc.push({lot:batches[i].lot,take:take});rem-=take;
  }
  return {alloc:alloc,short:rem>0.0001?rem:0};
}
async function sjaLoadFifo(code){
  var box=document.getElementById('sd-fifo');
  if(!code){if(box)box.innerHTML='';SJA_FIFO={code:null,batches:[]};return;}
  SJA_FIFO={code:code,batches:[]};
  if(box)box.innerHTML='<span style="color:var(--muted);font-size:.74rem">⏳ Cek batch…</span>';
  try{
    var pr=await sb.from('sja_production').select('date,qty,batch_lot_no,created_at').eq('product_code',code).order('date').order('created_at');
    var dl=await sb.from('sja_delivery').select('qty').eq('product_code',code);
    if(SJA_FIFO.code!==code)return; // 使用者已切別的產品
    SJA_FIFO.batches=sjaFifoCompute(pr.data||[],dl.data||[]);
    renderSjaFifo();
  }catch(e){if(box)box.innerHTML='';}
}
function renderSjaFifo(){
  var box=document.getElementById('sd-fifo');if(!box)return;
  var batches=SJA_FIFO.batches,p=sjaProd(SJA_FIFO.code),u=p?(p.unit||''):'';
  if(!batches||!batches.length){box.innerHTML='';return;}
  var boxes=Number((document.getElementById('sd-boxes')||{}).value)||0;
  var units=Number((document.getElementById('sd-units')||{}).value)||0;
  var need=boxes*((p&&p.pcs_per_ctn)||0)+units;
  var al=sjaFifoAllocate(batches,need);
  var rows=batches.map(function(b){
    var a=need>0?al.alloc.find(function(x){return x.lot===b.lot;}):null;
    return '<div style="display:flex;justify-content:space-between;font-size:.74rem;padding:.1rem 0">'+
      '<span>'+esc(b.lot)+'</span>'+
      '<span style="color:var(--muted)">sisa '+fmtN(b.remaining)+' '+esc(u)+(a?' <b style="color:#DC2626">−'+fmtN(a.take)+'</b>':'')+'</span></div>';
  }).join('');
  box.innerHTML='<div style="background:#F8FAFC;border:1px solid var(--border);border-radius:8px;padding:.4rem .6rem">'+
    '<div style="font-size:.72rem;font-weight:700;color:var(--ink2);margin-bottom:.15rem">📦 Batch FIFO (keluar dari lama dulu)</div>'+rows+
    (need>0&&al.short>0?'<div style="font-size:.72rem;color:#DC2626;margin-top:.15rem">⚠ Kurang '+fmtN(al.short)+' '+esc(u)+' dari batch</div>':'')+'</div>';
}

// 分析頁（Analisa）— 出貨分析圖表，僅 super admin

var ANA={months:6,sja:[],din:[],prodMap:{},loadedFor:0};
var ANA_C_SJA='#4F46E5',ANA_C_DIN='#0D9488'; // 靛藍/青綠，ΔE 76.6 已通過色盲/對比驗證
function anaMonthKeys(n){
  var out=[],d=new Date();
  for(var i=n-1;i>=0;i--){
    var m=new Date(d.getFullYear(),d.getMonth()-i,1);
    out.push(m.getFullYear()+'-'+String(m.getMonth()+1).padStart(2,'0'));
  }
  return out;
}
var ANA_BULAN=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
function anaMonLbl(k){return ANA_BULAN[Number(k.slice(5,7))-1];}
async function anaLoad(cb){
  if(ANA.loadedFor===ANA.months){cb();return;}
  var since=anaMonthKeys(ANA.months)[0]+'-01';
  // 個別抓：其中一間公司的表還沒建好也不擋另一間
  // order('date',{ascending:false})+limit: kalau rentang ini >5000 baris, yang KEPOTONG
  // harus data paling LAMA, bukan paling baru — sebelumnya ascending+limit malah membuang
  // bulan terkini duluan, jadi KPI "bulan ini" bisa tampil kosong/rendah padahal datanya ada.
  var rs=await Promise.all([
    sb.from('sja_delivery').select('date,customer_name,product_code,qty').gte('date',since).order('date',{ascending:false}).limit(5000),
    sb.from('din_delivery').select('date,product_code,kg,ctn,bags').gte('date',since).order('date',{ascending:false}).limit(5000),
    sb.from('sja_products').select('code,product_name,category,unit')
  ]);
  ANA.sja=rs[0].error?[]:(rs[0].data||[]);
  ANA.din=rs[1].error?[]:(rs[1].data||[]);
  ANA.prodMap={};
  (rs[2].error?[]:(rs[2].data||[])).forEach(function(p){ANA.prodMap[p.code]=p;});
  ANA.loadedFor=ANA.months;
  cb();
}

// 橫向長條圖（單一色相＝比大小；長條末端 4px 圓角、直接標值）
function anaHBar(rows,color,unitFn){
  if(!rows.length)return'<div style="text-align:center;color:var(--muted);padding:1rem;font-size:.82rem">'+Z('Belum ada data')+'</div>';
  var max=0;rows.forEach(function(r){if(r.value>max)max=r.value;});

    var w=max>0?Math.max(1.5,r.value/max*100):0;
    return'<div class="ana-hbar-row" title="'+esc(r.label)+': '+fmtN(r.value)+(unitFn?' '+esc(unitFn(r)):'')+'">'+
      '<div class="ana-hbar-lbl">'+esc(r.label)+'</div>'+
      '<div class="ana-hbar-track"><div class="ana-hbar-fill" style="width:'+w+'%;background:'+color+'"></div></div>'+
      '<div class="ana-hbar-val">'+fmtN(r.value)+'</div></div>';
  }).join('');
}
// 直向月份柱狀圖（單一序列；選擇性標值：最大值＋最新月）
function anaCols(keys,map,color){
  var max=0;keys.forEach(function(k){var v=map[k]||0;if(v>max)max=v;});
  if(max<=0)return'<div style="text-align:center;color:var(--muted);padding:1.4rem;font-size:.82rem">'+Z('Belum ada data pada rentang ini')+'</div>';
  var maxKey=null;keys.forEach(function(k){if((map[k]||0)===max&&maxKey===null)maxKey=k;});
  var last=keys[keys.length-1];
  var h='<div class="ana-cols">';
  keys.forEach(function(k){
    var v=map[k]||0,hp=max>0?Math.round(v/max*100):0;
    var showVal=(k===maxKey||k===last)&&v>0;
    h+='<div class="ana-col" title="'+anaMonLbl(k)+' '+k.slice(0,4)+': '+fmtN(v)+'">'+
      (showVal?'<div class="ana-col-val">'+fmtN(v)+'</div>':'')+
      '<div class="ana-col-bar" style="height:'+Math.max(hp,1.5)+'%;background:'+color+'"></div></div>';
  });
  h+='</div><div class="ana-baseline"></div><div style="display:flex;gap:6px">';
  keys.forEach(function(k){h+='<div style="flex:1;text-align:center" class="ana-col-lbl">'+anaMonLbl(k)+'</div>';});
  h+='</div>';
  return h;
}
function anaTop(list,keyFn,valFn,n){
  var agg={};
  list.forEach(function(r){var k=keyFn(r);if(!k)return;agg[k]=(agg[k]||0)+(Number(valFn(r))||0);});
  return Object.keys(agg).map(function(k){return{label:k,value:agg[k]};})
    .sort(function(a,b){return b.value-a.value;}).slice(0,n||8);
}

  });
  var topCust=anaTop(ANA.sja,function(r){return r.customer_name;},function(r){return r.qty;});
  var topProdSja=anaTop(ANA.sja,function(r){var p=ANA.prodMap[r.product_code];return p?p.product_name:r.product_code;},function(r){return r.qty;});

  var topProdDin=anaTop(ANA.din,function(r){return r.product_code;},function(r){return r.kg;});
  var rangeChips=[3,6,12].map(function(n){

  // ── KPI（本月）──
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;padding:.7rem .7rem 0">'+
    '<div class="ana-kpi"><div class="ana-kpi-lbl">'+Z('SJA bulan ini')+'</div><div class="ana-kpi-val">'+fmtN(sjaMonQty)+'</div><div class="ana-kpi-sub">'+sjaCnt+' '+Z('kiriman')+' · '+Object.keys(custSet).length+' '+Z('customer')+'</div></div>'+
    '<div class="ana-kpi"><div class="ana-kpi-lbl">'+Z('DIN bulan ini')+'</div><div class="ana-kpi-val">'+fmtN(dinMonKg)+'<span style="font-size:.85rem;font-weight:600;color:var(--muted)"> kg</span></div><div class="ana-kpi-sub">'+dinCnt+' '+Z('kiriman')+'</div></div></div>';
  // ── 月趨勢（一表一軸，不做雙軸）──
  h+='<div class="card"><div class="card-title">🚚 '+Z('Tren Kirim SJA')+' <span style="font-weight:500;font-size:.75rem;color:var(--muted)">'+Z('total qty / bulan')+'</span></div>'+anaCols(keys,sjaByMon,ANA_C_SJA)+'<div class="ana-note">'+Z('Satuan campuran (KG/Jrg/Btl…) dijumlahkan sebagai total item.')+'</div></div>';
  h+='<div class="card"><div class="card-title">🏭 '+Z('Tren Kirim DIN')+' <span style="font-weight:500;font-size:.75rem;color:var(--muted)">'+Z('total KG / bulan')+'</span></div>'+anaCols(keys,dinByMon,ANA_C_DIN)+'</div>';
  // ── 排行 ──
  h+='<div class="card"><div class="card-title">👥 '+Z('Top Customer — SJA')+'</div>'+anaHBar(topCust,ANA_C_SJA)+'</div>';
  h+='<div class="card"><div class="card-title">📦 '+Z('Top Produk — SJA')+'</div>'+anaHBar(topProdSja,ANA_C_SJA)+'</div>';
  h+='<div class="card"><div class="card-title">🗂 '+Z('Kategori — SJA')+'</div>'+anaHBar(topCat,ANA_C_SJA)+'</div>';
  h+='<div class="card"><div class="card-title">📦 '+Z('Top Produk — DIN')+' <span style="font-weight:500;font-size:.75rem;color:var(--muted)">KG</span></div>'+anaHBar(topProdDin,ANA_C_DIN)+'</div>';
  // ── 數據表（無障礙／PDF 對照用）──
  h+='<div class="card"><div class="card-title">📋 '+Z('Data Bulanan')+'</div><div style="overflow-x:auto"><table class="ana-tbl">'+
    '<tr><th>'+Z('Bulan')+'</th><th>'+Z('SJA qty')+'</th><th>'+Z('DIN kg')+'</th></tr>'+
    keys.map(function(k){return'<tr><td>'+anaMonLbl(k)+' '+k.slice(0,4)+'</td><td>'+fmtN(sjaByMon[k]||0)+'</td><td>'+fmtN(dinByMon[k]||0)+'</td></tr>';}).join('')+
    '</table></div></div>';
  h+='<div style="text-align:center;color:var(--muted);font-size:.7rem;padding:.4rem 0 1rem">Gudang One · '+Z('dibuat')+' '+today()+'</div>';
  el.innerHTML=h;
}
function anaExportPdf(){
  document.body.classList.add('print-ana');
  var done=function(){document.body.classList.remove('print-ana');window.removeEventListener('afterprint',done);};
  window.addEventListener('afterprint',done);
  window.print();
  setTimeout(done,2000); // 行動瀏覽器沒有 afterprint 的保險
}
</script>
</body>
</html>
