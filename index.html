function lpk(k){
  if(k==='⌫')STAFF_PIN_ENT=STAFF_PIN_ENT.slice(0,-1);
  else if(STAFF_PIN_ENT.length<4)STAFF_PIN_ENT+=k;
  document.querySelectorAll('#ls-dots .pin-dot').forEach(function(d,i){d.className='pin-dot'+(i<STAFF_PIN_ENT.length?' f':'');});
  if(STAFF_PIN_ENT.length===4){
    var pid=LOGIN_SEL;
    var isNew=pid==='__new__';
    var correct=isNew?GUEST_PIN:(function(){var p=DATA.people.find(function(p){return p.id==pid;});return p&&p.pin?p.pin:'1234';})();
    if(STAFF_PIN_ENT===correct){
      if(isNew){
        var nm=(document.getElementById('ls-newname').value||'').trim();
        if(!nm){
          var err=document.getElementById('ls-err');if(err)err.textContent='Isi nama dulu';
          STAFF_PIN_ENT='';
          document.querySelectorAll('#ls-dots .pin-dot').forEach(function(d){d.className='pin-dot';});
          return;
        }
        CURRENT_USER={id:null,name:nm,isGuest:true};
      }else{
        CURRENT_USER=DATA.people.find(function(p){return p.id==pid;});
      }
      localStorage.setItem('staff_sess',JSON.stringify({id:CURRENT_USER.id||null,name:CURRENT_USER.name,g:CURRENT_USER.isGuest||false,ts:Date.now()}));

    }else{

var QR_STREAM=null,QR_DETECT_INT=null,QR_CAM_OPEN=false,QR_CAM_MODE='';

function keepQrFocused(){
  if(!QR_CAM_OPEN){
    var a=document.activeElement;
    var t=a?a.tagName.toLowerCase():'';
    if(t!=='input'&&t!=='textarea'&&t!=='select'){
      var qr=document.getElementById('qr-scan-input');if(qr)qr.focus();
    }
  }

}
function openQrCamera(mode){
  QR_CAM_MODE=mode||'ambil';QR_CAM_OPEN=true;
  var body='<div>'+
    '<video id="qr-vid" style="width:100%;border-radius:10px;display:block;max-height:55vh" autoplay playsinline muted></video>'+
    '<canvas id="qr-cvs" style="display:none"></canvas>'+
    '<div style="text-align:center;padding:.6rem;color:#6B7280;font-size:.88rem">📷 '+('Arahkan ke QR code')+'</div>'+
    '<button class="btn btn-s btn-full" onclick="stopQrCamera();closeModal()">'+('Batal')+'</button>'+
  '</div>';
  showModal('📷 '+('Scan QR'),body);
  navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:'environment'}}})
    .catch(function(){return navigator.mediaDevices.getUserMedia({video:true});})
    .then(function(stream){
      QR_STREAM=stream;
      var vid=document.getElementById('qr-vid');
      if(!vid){stopQrCamera();return;}
      vid.srcObject=stream;vid.play();
      startQrDetect();
    }).catch(function(e){toast('⚠ '+('Kamera tidak bisa dibuka')+': '+e.message);stopQrCamera();closeModal();});
}
function startQrDetect(){
  if('BarcodeDetector' in window){
    try{
      var bd=new BarcodeDetector({formats:['qr_code']});
      var vid=document.getElementById('qr-vid');
      QR_DETECT_INT=setInterval(function(){
        if(!vid||!document.getElementById('qr-vid'))return;
        bd.detect(vid).then(function(codes){
          if(codes.length){stopQrCamera();closeModal();onQrScan(codes[0].rawValue);}
        }).catch(function(){});
      },300);
      return;
    }catch(e){}
  }
  loadScript('https://cdn.jsdelivr.net/npm/jsqr@1/dist/jsQR.js',function(){
    var vid=document.getElementById('qr-vid');
    var cvs=document.getElementById('qr-cvs');if(!cvs)return;
    var ctx=cvs.getContext('2d');
    QR_DETECT_INT=setInterval(function(){
      if(!vid||!document.getElementById('qr-vid')||!vid.videoWidth)return;
      cvs.width=vid.videoWidth;cvs.height=vid.videoHeight;
      ctx.drawImage(vid,0,0);
      var img=ctx.getImageData(0,0,cvs.width,cvs.height);
      var code=jsQR&&jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
      if(code&&code.data){stopQrCamera();closeModal();onQrScan(code.data);}
    },300);
  },function(){toast('⚠ '+('Browser tidak support scan'));stopQrCamera();closeModal();});
}
function stopQrCamera(){
  QR_CAM_OPEN=false;
  if(QR_DETECT_INT){clearInterval(QR_DETECT_INT);QR_DETECT_INT=null;}
  if(QR_STREAM){QR_STREAM.getTracks().forEach(function(t){t.stop();});QR_STREAM=null;}
}
function onQrScan(val){
  var qr=document.getElementById('qr-scan-input');
  if(!val||val.length<5){if(qr)qr.value='';return;}
  var m=val.match(/gudang:(\d+):/);
  if(!m){if(qr)qr.value='';return;}
  var id=Number(m[1]);
  var item=DATA.items.find(function(i){return i.id===id;});
  if(!item){toast('⚠ '+('Barang tidak ditemukan'));if(qr)qr.value='';return;}
  var cur=document.querySelector('.sec.active');
  var cur_id=cur?cur.id:'';
  var inStk=!!document.getElementById('stk-'+id);
  if(QR_CAM_MODE==='stk'||inStk){
    onStkQrScan(id);
  }else if(QR_CAM_MODE==='ambil'||cur_id==='ambil'){
    onAmbilQrScan(id);
  }else{
    toast('⚠ '+('Ke halaman ambil atau opname'));
  }
  if(qr)qr.value='';
}

  try{
    var results=await Promise.race([
      Promise.all([
        sb.from('items').select('*').order('name'),
        sb.from('people').select('*').order('name'),
        sb.from('requests').select('*').order('created_at',{ascending:false}),
        sb.from('transactions').select('*').order('created_at',{ascending:false}).limit(100)
      ]),
      tOut
    ]);
    var i=results[0],p=results[1],r=results[2],tx=results[3];
    if(i.error)throw i.error;
    DATA.items=i.data||[];DATA.people=p.data||[];DATA.requests=r.data||[];
    DATA.transactions=tx.data||[];
    try{localStorage.setItem('cached_people',JSON.stringify(DATA.people));}catch(e){}
    setDot('ok');
    renderAll();setTimeout(checkLowStock,600);
    if(afterCb)afterCb();

    setDot('err');
    document.getElementById('mc').innerHTML=
      '<div style="padding:1.5rem;text-align:center">'+
      '<div class="ab ab-d" style="margin-bottom:1rem">⚠ '+e.message+'</div>'+
      '<button class="btn btn-p" onclick="initSupabase(function(){loadAll();},function(e2){toast(\'⚠ \'+e2.message);})">'+('🔄 Coba Lagi')+'</button>'+
      '</div>';
  }
}

function playNotificationSound(){
  try{
    var audioContext=new (window.AudioContext||window.webkitAudioContext)();
    var oscillator=audioContext.createOscillator();
    var gainNode=audioContext.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    oscillator.frequency.value=800;
    oscillator.type='sine';
    gainNode.gain.setValueAtTime(0.3,audioContext.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01,audioContext.currentTime+0.5);
    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime+0.5);
  }catch(e){}
}

function showBrowserNotification(title,message){
  if('Notification' in window&&Notification.permission==='granted'){
    new Notification(title,{body:message,icon:'🛒'});
  }else if('Notification' in window&&Notification.permission!=='denied'){
    Notification.requestPermission().then(function(permission){
      if(permission==='granted'){
        new Notification(title,{body:message,icon:'🛒'});
      }
    });
  }
}

function sendTelegram(msg){

}

async function doAmbilCart(){
  var keys=Object.keys(CART);
  if(!keys.length){toast('Pilih barang dulu');return;}
  var pname=CURRENT_USER.name;
  var pid=CURRENT_USER.id||null;
  var ok=true;
  keys.forEach(function(id){var item=DATA.items.find(function(i){return i.id==id;});if(item&&CART[id]>item.qty){showLow(item,CART[id]);ok=false;}});
  if(!ok)return;
  var btn=document.getElementById('amb-btn');btn.disabled=true;btn.textContent='...';
  try{
    for(var ki=0;ki<keys.length;ki++){
      var id=keys[ki];var item=DATA.items.find(function(i){return i.id==id;});var qty=CART[id];
      var newQty=item.qty-qty;
      await sb.from('items').update({qty:newQty}).eq('id',item.id);
      await sb.from('transactions').insert({type:'ambil',item_id:item.id,item_name:item.name,person_id:pid||null,person_name:pname,qty:qty});
      // Kirim notifikasi Telegram jika stok turun ke bawah minimum
      if(newQty<=item.critical_qty&&item.critical_qty>0&&!TG_NOTIFIED[item.id]){
        TG_NOTIFIED[item.id]=true;
        var emoji=newQty<=0?'❌':'🟠';
        sendTelegram(emoji+' <b>Stok rendah: '+item.name+'</b>\n'+
          '👤 Diambil oleh: <b>'+pname+'</b> ('+qty+' '+item.unit+')\n'+
          '📦 Sisa stok: <b>'+newQty+' '+item.unit+'</b> (min: '+item.critical_qty+')\n'+
          (item.supplier_url?'🔗 '+item.supplier_url+'\n':'')+
          '🕐 '+new Date().toLocaleString('id-ID'));
      }
    }
    showTakeConfirm(keys);
  }catch(e){toast('⚠ '+e.message);}
  btn.disabled=false;btn.textContent=t('doTake');
}

function cAdjM(id,d){
  var nv=Math.max(0,(CART_M[id]||0)+d);
  if(nv===0)delete CART_M[id];else CART_M[id]=nv;
  var el=document.getElementById('mq-'+id);if(el)el.textContent=nv||'';
  var cw=document.getElementById('msk-cart');if(cw)cw.innerHTML=cartRowsMsk();
  var total=Object.keys(CART_M).length;
  var cnt=document.getElementById('msk-cart-cnt');if(cnt)cnt.textContent=total?total+(' barang'):'';
  var btn=document.getElementById('msk-btn');if(btn)btn.textContent=total?t('doRcv')+' ('+total+(' item')+')':t('doRcv');

async function doMasukCart(){
  var sel=document.getElementById('msk-p');
  var pname=(sel.value==='__new__'?(document.getElementById('msk-pn').value||'').trim():sel.selectedOptions[0]?.text||'').trim();
  var keys=Object.keys(CART_M);
  if(!pname||!keys.length){toast(t('selBoth'));return;}
  var person=DATA.people.find(function(p){return p.id==sel.value;});
  var pid=person?person.id:null;
  var btn=document.getElementById('msk-btn');btn.disabled=true;btn.textContent='...';
  try{
    for(var ki=0;ki<keys.length;ki++){
      var id=keys[ki];var item=DATA.items.find(function(i){return i.id==id;});var qty=CART_M[id];
      await sb.from('items').update({qty:item.qty+qty}).eq('id',item.id);
      await sb.from('transactions').insert({type:'masuk',item_id:item.id,item_name:item.name,person_id:pid||null,person_name:pname,qty:qty});
    }
    toast(t('rcvOk'));CART_M={};await loadAll();goTab('home',document.querySelector('.tb'));
  }catch(e){toast('⚠ '+e.message);}
  btn.disabled=false;btn.textContent=t('doRcv');
}

    if(PIN_ENT===ADMIN_PIN){IS_ADMIN=true;renderAdminFull();}

function addCatg(){
  var inp=document.getElementById('ncg');
  if(!inp)return;
  var v=inp.value.trim();
  if(!v){toast('⚠ '+('Isi nama tag'));return;}
  if(getCategories().includes(v)){toast('⚠ '+('Tag sudah ada'));return;}
  var saved=JSON.parse(localStorage.getItem('cats')||'[]');
  saved.push(v);localStorage.setItem('cats',JSON.stringify(saved));
  inp.value='';
  document.getElementById('acg').innerHTML=catgPanelHTML();
  setTimeout(function(){var ni=document.getElementById('ncg');if(ni)ni.focus();},100);
  toast('✓ '+v);
}

  if(!confirm('Hapus tag "'+cat+'"? Barang tetap ada, tag hanya dihapus.'))return;
  try{

async function saveCatgItems(){
  var cat=CATG_MODAL_CAT;if(!cat)return;
  var toAdd=[],toDel=[];
  document.querySelectorAll('#ci-list input[type=checkbox]').forEach(function(cb){
    var id=parseInt(cb.value);
    var item=DATA.items.find(function(i){return i.id===id;});if(!item)return;
    var has=(item.tags||[]).includes(cat);
    if(cb.checked&&!has)toAdd.push(item);
    else if(!cb.checked&&has)toDel.push(item);
  });
  if(!toAdd.length&&!toDel.length){closeModal();return;}
  try{
    for(var i=0;i<toAdd.length;i++){
      var nt=(toAdd[i].tags||[]).concat([cat]);
      var r=await sb.from('items').update({tags:nt}).eq('id',toAdd[i].id);
      if(r.error)throw r.error;toAdd[i].tags=nt;
    }
    for(var j=0;j<toDel.length;j++){
      var nt2=(toDel[j].tags||[]).filter(function(tg){return tg!==cat;});
      var r2=await sb.from('items').update({tags:nt2}).eq('id',toDel[j].id);
      if(r2.error)throw r2.error;toDel[j].tags=nt2;
    }
    toast('✓ '+('Tersimpan'));closeModal();
    document.getElementById('acg').innerHTML=catgPanelHTML();
    document.getElementById('ait-content').innerHTML='<div class="ai-list">'+aiListHTML()+'</div>';
  }catch(e){toast('⚠ '+e.message);}
}

function onStkChange(id,inp){
  var item=DATA.items.find(function(i){return i.id===id;});if(!item)return;
  var nv=parseInt(inp.value);
  if(isNaN(nv)||nv<0){inp.value=item.qty;delete STOCKTAKE[id];}
  else if(nv!==item.qty){STOCKTAKE[id]=nv;document.getElementById('stk-'+id).classList.add('changed');inp.classList.add('changed');}
  else{delete STOCKTAKE[id];document.getElementById('stk-'+id).classList.remove('changed');inp.classList.remove('changed');}
  var n=Object.keys(STOCKTAKE).length;
  var btn=document.getElementById('stk-save-btn');
  if(btn){btn.disabled=n===0;btn.textContent=n?'✓ '+('Simpan ('+n+' perubahan)'):('✓ Simpan (belum ada perubahan)');}
}
async function saveStocktake(){
  var keys=Object.keys(STOCKTAKE);if(!keys.length)return;
  var btn=document.getElementById('stk-save-btn');btn.disabled=true;btn.textContent='Menyimpan...';
  try{
    for(var ki=0;ki<keys.length;ki++){
      var id=Number(keys[ki]);
      var item=DATA.items.find(function(i){return i.id===id;});
      var nv=STOCKTAKE[keys[ki]];var diff=nv-item.qty;
      await sb.from('items').update({qty:nv}).eq('id',id);
      if(diff!==0)await sb.from('transactions').insert({type:diff>0?'masuk':'ambil',item_id:id,item_name:item.name,person_name:(CURRENT_USER?CURRENT_USER.name:'Admin')+('(Opname)'),qty:Math.abs(diff)});
      item.qty=nv;
    }
    var n=keys.length;STOCKTAKE={};
    toast('✓ '+('Selesai, '+n+' item diubah'));
    renderStocktake(STK_CATG);
  }catch(e){toast('⚠ '+e.message);btn.disabled=false;}
}

async function saveTxEdit(id){

    await sb.from('transactions').update({person_name:newPn,item_name:newIn,qty:newQ,type:newT}).eq('id',id);

}

function cQ(m,d){var e=document.getElementById(m+'-q');e.value=Math.max(1,(parseInt(e.value)||1)+d);}
function goTab(id,el){

function swTab(el,id){
  var nav=el.closest('.tab-nav'),par=nav.parentElement;

  el.classList.add('act');
  par.querySelectorAll('.tc').forEach(function(t){t.classList.remove('active')});
  document.getElementById(id).classList.add('active');
}
function swATab(el,id){
  document.getElementById('atnav').querySelectorAll('.tsw').forEach(function(b){b.classList.remove('act')});
  if(el)el.classList.add('act');
  document.querySelectorAll('#admin .tc').forEach(function(t){t.classList.remove('active')});
  var e=document.getElementById(id);if(e)e.classList.add('active');
}
function compressImg(file,cb){
  var rd=new FileReader();
  rd.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var MAX=800,r=Math.min(MAX/img.width,MAX/img.height,1);
      var cv=document.createElement('canvas');
      cv.width=Math.round(img.width*r);cv.height=Math.round(img.height*r);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      cb(cv.toDataURL('image/jpeg',0.72));
    };
    img.src=e.target.result;
  };
  rd.readAsDataURL(file);
}
function showImg(url,name,icon){
  var ov=document.createElement('div');
  ov.className='img-ov';
  ov.onclick=function(){ov.remove();};
  ov.innerHTML='<div style="text-align:center;max-width:100%">'+
    '<img src="'+esc(url)+'" style="max-width:100%;max-height:75vh;border-radius:10px;object-fit:contain;box-shadow:0 8px 30px rgba(0,0,0,.5)">'+
    '<div style="color:#fff;font-weight:600;margin-top:.7rem;font-size:.95rem">'+(icon||'')+' '+esc(name)+'</div>'+
    '<div style="color:#aaa;font-size:.75rem;margin-top:.2rem">'+('Tap untuk tutup')+'</div>'+
  '</div>';
  document.body.appendChild(ov);
}
function fmtDate(s){if(!s)return'';var d=new Date(s);return d.toLocaleDateString('id-ID',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
function fmtC(n){if(!n)return'-';return('Rp ')+Math.round(n).toLocaleString();}
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},2800);}
</script>
