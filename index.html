var sb;
var DATA={items:[],people:[],requests:[],transactions:[],batches:[]};
// Performance indexes: built once per data load to avoid O(n┬▓) lookups during render
var IDX={variantsById:{},batchesByItem:{},sortedByRatio:[]};
function buildIndexes(){
  IDX.variantsById={};
  IDX.batchesByItem={};
  var k,b,arr,id;
  // Index by variant_id (õĖŹńö©item_id’╝īÕøĀńé║ÕÉīitemÕÅ»ĶāĮÕżÜÕĆēÕ║½)
  for(k=0;k<DATA.items.length;k++){IDX.variantsById[DATA.items[k].variant_id]=DATA.items[k];}
  for(k=0;k<DATA.batches.length;k++){
    b=DATA.batches[k];
    b._expT=b.expiry_date?new Date(b.expiry_date).getTime():Infinity;
    b._creT=b.created_at?new Date(b.created_at).getTime():0;
    if(b.qty_remaining>0){
      arr=IDX.batchesByItem[b.item_id]||(IDX.batchesByItem[b.item_id]=[]);
      arr.push(b);
    }
  }
  for(id in IDX.batchesByItem){
    IDX.batchesByItem[id].sort(function(a,b){
      if(a.expiry_date&&b.expiry_date)return a._expT-b._expT;
      if(a.expiry_date)return -1;if(b.expiry_date)return 1;
      return a._creT-b._creT;
    });
  }
  // Õ┐½ÕÅ¢µÄÆÕ║ÅńĄÉµ×£’╝Üµīē qty/critical_qty µ»öõŠŗµÄÆÕ║Å’╝łÕ║ōÕŁśń┤¦Ķ┐½Õ║”’╝ē
  IDX.sortedByRatio=DATA.items.slice().sort(function(a,b){
    var ra=a.critical_qty>0?a.qty/a.critical_qty:99;
    var rb=b.critical_qty>0?b.qty/b.critical_qty:99;
    return ra-rb;
  });
}
function batchesOf(itemId){return IDX.batchesByItem[itemId]||[];}
function itemById(id){
  // µ¢░µ×Čµ¦ŗ: Õ£©ńĢČÕēŹÕĆēÕ║½ńÜä items õĖŁµēŠ item_id Õī╣ķģŹńÜä
  for(var k=0;k<DATA.items.length;k++){
    if(DATA.items[k].id==id)return DATA.items[k];
  }
  return null;
}

function openQrCamera(mode){
  QR_CAM_MODE=mode||'ambil';QR_CAM_OPEN=true;
  var body='<div>'+
    '<video id="qr-vid" style="width:100%;border-radius:10px;display:block;max-height:55vh" autoplay playsinline muted></video>'+
    '<canvas id="qr-cvs" style="display:none"></canvas>'+

    '<button class="btn btn-s btn-full" onclick="stopQrCamera();closeModal()">'+('Batal')+'</button>'+
  '</div>';
  showModal('­¤ōĘ '+('Scan QR'),body);
  navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:'environment'}}})
    .catch(function(){return navigator.mediaDevices.getUserMedia({video:true});})
    .then(function(stream){
      QR_STREAM=stream;
      var vid=document.getElementById('qr-vid');
      if(!vid){stopQrCamera();return;}
      vid.srcObject=stream;vid.play();
      startQrDetect();
    }).catch(function(e){toast('ŌÜĀ '+('Kamera tidak bisa dibuka')+': '+e.message);stopQrCamera();closeModal();});
}
function startQrDetect(){
  if('BarcodeDetector' in window){
    try{
      var bd=new BarcodeDetector({formats:['qr_code']});
      var vid=document.getElementById('qr-vid');
      QR_DETECT_INT=setInterval(function(){
        if(!vid||!document.getElementById('qr-vid'))return;
        bd.detect(vid).then(function(codes){
          if(codes.length){stopQrCamera();closeModal();onQrScan(codes[0].rawValue);}
        }).catch(function(){});
      },300);
      return;
    }catch(e){}
  }
  loadScript('https://cdn.jsdelivr.net/npm/jsqr@1/dist/jsQR.js',function(){
    var vid=document.getElementById('qr-vid');
    var cvs=document.getElementById('qr-cvs');if(!cvs)return;
    var ctx=cvs.getContext('2d');
    QR_DETECT_INT=setInterval(function(){
      if(!vid||!document.getElementById('qr-vid')||!vid.videoWidth)return;
      cvs.width=vid.videoWidth;cvs.height=vid.videoHeight;
      ctx.drawImage(vid,0,0);
      var img=ctx.getImageData(0,0,cvs.width,cvs.height);
      var code=jsQR&&jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
      if(code&&code.data){stopQrCamera();closeModal();onQrScan(code.data);}
    },300);
  },function(){toast('ŌÜĀ '+('Browser tidak support scan'));stopQrCamera();closeModal();});
}
function stopQrCamera(){
  QR_CAM_OPEN=false;
  if(QR_DETECT_INT){clearInterval(QR_DETECT_INT);QR_DETECT_INT=null;}
  if(QR_STREAM){QR_STREAM.getTracks().forEach(function(t){t.stop();});QR_STREAM=null;}
}
function onQrScan(val){
  var qr=document.getElementById('qr-scan-input');
  if(!val||val.length<5){if(qr)qr.value='';return;}
  var m=val.match(/gudang:(\d+):/);
  if(!m){if(qr)qr.value='';return;}
  var id=Number(m[1]);
  // QR encodes item_id; cart & stocktake key by variant_id (current warehouse)
  var item=DATA.items.find(function(i){return i.id==id;});
  if(!item){toast('ŌÜĀ '+('Barang tidak ditemukan'));if(qr)qr.value='';return;}
  var vid=item.variant_id;
  var cur=document.querySelector('.sec.active');
  var cur_id=cur?cur.id:'';
  var inStk=!!document.getElementById('stk-'+vid);
  if(QR_CAM_MODE==='stk'||inStk){
    onStkQrScan(vid);
  }else if(QR_CAM_MODE==='ambil'||cur_id==='ambil'){
    onAmbilQrScan(vid);
  }else{
    toast('ŌÜĀ '+('Ke halaman ambil atau opname'));
  }
  if(qr)qr.value='';
}

var _audioCtx=null;
var _userInteracted=false;
document.addEventListener('click',function(){_userInteracted=true;if(_audioCtx&&_audioCtx.state==='suspended')_audioCtx.resume();},{once:false,passive:true});
function playNotificationSound(){
  if(!_userInteracted)return;
  try{
    if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(_audioCtx.state==='suspended'){_audioCtx.resume();}
    var oscillator=_audioCtx.createOscillator();
    var gainNode=_audioCtx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(_audioCtx.destination);
    oscillator.frequency.value=800;
    oscillator.type='sine';
    gainNode.gain.setValueAtTime(0.3,_audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01,_audioCtx.currentTime+0.5);
    oscillator.start(_audioCtx.currentTime);
    oscillator.stop(_audioCtx.currentTime+0.5);
  }catch(e){}
}

function showBrowserNotification(title,message){
  if(!('Notification' in window))return;
  function tryNotify(){try{new Notification(title,{body:message});}catch(e){}}
  if(Notification.permission==='granted'){
    tryNotify();
  }else if(Notification.permission!=='denied'){
    Notification.requestPermission().then(function(p){if(p==='granted')tryNotify();});
  }
}

// Telegram low-stock throttle: notify each item at most once per 24h.
// Persisted in localStorage so page refresh / warehouse switch won't re-spam.
var TG_DAY=86400000;
function tgGetNotified(){try{return JSON.parse(localStorage.getItem('tg_notified')||'{}');}catch(e){return {};}}
function tgSaveNotified(m){try{localStorage.setItem('tg_notified',JSON.stringify(m));}catch(e){}}
function checkAndNotifyLow(items){
  var map=tgGetNotified();var now=Date.now();var changed=false;
  items.forEach(function(i){
    if(i.remark&&i.remark.includes('#noalert')){if(map[i.id]){delete map[i.id];changed=true;}return;}
    if(i.qty<=i.critical_qty&&i.critical_qty>0){
      var last=map[i.id]||0;
      if(now-last>=TG_DAY){
        map[i.id]=now;changed=true;
        var emoji=i.qty<=0?'ŌØī':'­¤¤Ā';
        var msg=emoji+' Stok rendah: '+i.name+'\n'+
          '­¤ō” Sisa stok: '+i.qty+' '+i.unit+' (min: '+i.critical_qty+')\n'+
          (i.supplier_url?'­¤öŚ '+i.supplier_url+'\n':'')+
          '­¤ĢÉ '+new Date().toLocaleString('id-ID');
        sendTelegram(msg);
      }
    }else if(i.qty>i.critical_qty){
      if(map[i.id]){delete map[i.id];changed=true;}
    }
  });
  if(changed)tgSaveNotified(map);
}

function getAmbilBatches(itemId,qty){
  var result=[];
  // Get batches for current warehouse only
  var abat=DATA.batches.filter(function(b){return b.item_id==itemId&&b.warehouse_id==CURRENT_WAREHOUSE&&b.qty_remaining>0;}).sort(function(a,b){
    if(a.expiry_date&&b.expiry_date)return new Date(a.expiry_date)-new Date(b.expiry_date);
    if(a.expiry_date)return -1;if(b.expiry_date)return 1;
    return new Date(a.created_at)-new Date(b.created_at);
  });
  var remQ=qty;
  for(var bi=0;bi<abat.length&&remQ>0;bi++){
    var bat=abat[bi];
    var ded=Math.min(bat.qty_remaining,remQ);
    result.push({lot_no:bat.lot_no,expiry_date:bat.expiry_date,deduct:ded});
    remQ-=ded;
  }
  return result;
}
async function doAmbilCart(){
  if(!CURRENT_USER){toast('ŌÜĀ Belum login');return;}

  keys.forEach(function(variantId){var item=DATA.items.find(function(i){return i.variant_id==variantId;});if(item&&CART[variantId]>item.qty){showLow(item,CART[variantId]);ok=false;}});
  if(!ok)return;

  // Show FIFO confirmation dialog
  var msg='<div style="margin-bottom:1rem"><strong>­¤ōŗ FIFO Confirmation</strong> ŌĆö Batch yang akan diambil:</div>';
  keys.forEach(function(variantId){
    var item=DATA.items.find(function(i){return i.variant_id==variantId;});
    var toBat=getAmbilBatches(item.id,CART[variantId]);
    msg+='<div style="margin-bottom:.7rem;border-left:4px solid var(--p);padding:.5rem .7rem;background:#F0FDFA">'+
      '<div style="font-weight:700;margin-bottom:.3rem">'+esc(item.name)+' ('+CART[variantId]+' '+esc(item.unit)+')</div>'+
      (toBat.length?toBat.map(function(b,i){return'<div style="font-size:.82rem;color:#0F766E">'+

        (b.expiry_date?' | Exp: '+b.expiry_date:'')+'</div>';}).join(''):
        '<div style="font-size:.82rem;color:#D97706">ŌÜĀ Tanpa batch info</div>')+
    '</div>';
  });
  msg+='<div style="display:flex;gap:.5rem;margin-top:1rem">'+
    '<button class="btn btn-d" style="flex:1" onclick="closeModal()">Batal</button>'+
    '<button class="btn btn-ok" style="flex:1" onclick="executeAmbilCart()">Ō£ō Lanjutkan</button>'+
  '</div>';
  showModal('­¤ōż '+t('take'),msg);
}
async function executeAmbilCart(){
  closeModal();
  var keys=Object.keys(CART);
  var pname=CURRENT_USER.name;
  var pid=CURRENT_USER.id||null;
  var btn=document.getElementById('amb-btn');btn.disabled=true;btn.textContent='...';
  try{
    for(var ki=0;ki<keys.length;ki++){
      var variantId=keys[ki];var item=DATA.items.find(function(i){return i.variant_id==variantId;});var qty=CART[variantId];
      var newQty=item.qty-qty;
      // Update item_variants (per-warehouse) instead of items
      await sb.from('item_variants').update({qty:newQty}).eq('id',variantId);
      await sb.from('transactions').insert({type:'ambil',item_id:item.id,item_name:item.name,person_id:pid||null,person_name:pname,qty:qty,warehouse_id:CURRENT_WAREHOUSE||null});
      // FIFO: deduct from batches in current warehouse (filter by item_id AND warehouse_id)
      var abat=DATA.batches.filter(function(b){return b.item_id==item.id&&b.warehouse_id==CURRENT_WAREHOUSE&&b.qty_remaining>0;}).sort(function(a,b){if(a.expiry_date&&b.expiry_date)return new Date(a.expiry_date)-new Date(b.expiry_date);if(a.expiry_date)return -1;if(b.expiry_date)return 1;return new Date(a.created_at)-new Date(b.created_at);});
      var remQ=qty;
      for(var bi=0;bi<abat.length&&remQ>0;bi++){var bat=abat[bi];var ded=Math.min(bat.qty_remaining,remQ);var nr=bat.qty_remaining-ded;await sb.from('item_batches').update({qty_remaining:nr}).eq('id',bat.id);bat.qty_remaining=nr;remQ-=ded;}
      // Telegram throttle: use variant_id to ensure per-warehouse-item throttling
      if(newQty<=item.critical_qty&&item.critical_qty>0){
        var tgm=tgGetNotified();var lastN=tgm[variantId]||0;
        if(Date.now()-lastN>=TG_DAY){
          tgm[variantId]=Date.now();tgSaveNotified(tgm);
          var emoji=newQty<=0?'ŌØī':'­¤¤Ā';
          sendTelegram(emoji+' Stok rendah: '+item.name+'\n'+
            '­¤æż Diambil oleh: '+pname+' ('+qty+' '+item.unit+')\n'+
            '­¤ō” Sisa stok: '+newQty+' '+item.unit+' (min: '+item.critical_qty+')\n'+
            (item.supplier_url?'­¤öŚ '+item.supplier_url+'\n':'')+
            '­¤ĢÉ '+new Date().toLocaleString('id-ID'));
        }
      }
    }
    showTakeConfirm(keys);
    CART={};
    await loadAll();
    renderAmbil();
  }catch(e){toast('ŌÜĀ '+e.message);}
  btn.disabled=false;btn.textContent=t('doTake');
}

// Kategori bawaan Bahan Baku (BB): selalu tersedia untuk filter & tagging
var DEFAULT_CATS=['Packing','Food Ingredient'];
function getCategories(){
  var seen={};var all=[];
  DEFAULT_CATS.forEach(function(tg){if(tg&&!seen[tg]){seen[tg]=1;all.push(tg);}});
  DATA.items.forEach(function(i){var tags=i.tags||[];for(var k=0;k<tags.length;k++){var tg=tags[k];if(tg&&!seen[tg]){seen[tg]=1;all.push(tg);}}});
  var saved=JSON.parse(localStorage.getItem('cats')||'[]');
  saved.forEach(function(tg){if(tg&&!seen[tg]){seen[tg]=1;all.push(tg);}});
  return all.sort();
}

function addCatg(){
  var inp=document.getElementById('ncg');
  if(!inp)return;
  var v=inp.value.trim();
  if(!v){toast('ŌÜĀ '+('Isi nama tag'));return;}
  if(getCategories().includes(v)){toast('ŌÜĀ '+('Tag sudah ada'));return;}
  var saved=JSON.parse(localStorage.getItem('cats')||'[]');
  saved.push(v);localStorage.setItem('cats',JSON.stringify(saved));
  inp.value='';
  document.getElementById('acg').innerHTML=catgPanelHTML();
  setTimeout(function(){var ni=document.getElementById('ncg');if(ni)ni.focus();},100);
  toast('Ō£ō '+v);
}
async function delCatg(cat){
  if(!confirm('Hapus tag "'+cat+'"? Barang tetap ada, tag hanya dihapus.'))return;
  try{
    var affected=DATA.items.filter(function(i){return (i.tags||[]).includes(cat);});
    for(var ki=0;ki<affected.length;ki++){
      var nt=(affected[ki].tags||[]).filter(function(tg){return tg!==cat;});
      var {error}=await sb.from('items').update({tags:nt}).eq('id',affected[ki].id);
      if(error)throw error;
      affected[ki].tags=nt;
    }
    var saved=JSON.parse(localStorage.getItem('cats')||'[]');
    localStorage.setItem('cats',JSON.stringify(saved.filter(function(c){return c!==cat;})));
    document.getElementById('acg').innerHTML=catgPanelHTML();
    toast(t('delOk'));
  }catch(e){toast('ŌÜĀ '+e.message);}
}
async function renameCatg(cat){
  var newName=prompt('Nama baru untuk "'+cat+'":',cat);
  if(!newName||newName.trim()===cat)return;
  newName=newName.trim();if(!newName)return;
  try{
    var affected=DATA.items.filter(function(i){return (i.tags||[]).includes(cat);});
    for(var ki=0;ki<affected.length;ki++){
      var nt=(affected[ki].tags||[]).map(function(tg){return tg===cat?newName:tg;});
      var {error}=await sb.from('items').update({tags:nt}).eq('id',affected[ki].id);
      if(error)throw error;
      affected[ki].tags=nt;
    }
    var saved=JSON.parse(localStorage.getItem('cats')||'[]');
    var idx=saved.indexOf(cat);if(idx>=0)saved[idx]=newName;
    localStorage.setItem('cats',JSON.stringify(saved));
    document.getElementById('acg').innerHTML=catgPanelHTML();
    toast(t('saveOk'));
  }catch(e){toast('ŌÜĀ '+e.message);}
}

function renderCatgItemList(cat,q){

  if(!items.length)return'<div style="text-align:center;color:#9CA3AF;padding:1.2rem">'+('Tidak ada barang')+'</div>';
  return items.map(function(i){
    var checked=(i.tags||[]).includes(cat);
    return '<label style="display:flex;align-items:center;gap:.6rem;padding:.5rem .8rem;border-bottom:1px solid #F3F4F6;cursor:pointer">'+
      '<input type="checkbox" id="ci-'+i.id+'" value="'+i.id+'"'+(checked?' checked':'')+' style="width:16px;height:16px;flex-shrink:0">'+
      '<span style="flex:1;font-size:.9rem">'+esc(i.name)+'</span>'+
      ((i.tags||[]).length?'<span style="font-size:.73rem;color:#9CA3AF">'+i.tags.map(function(tg){return'­¤ÅĘ’ĖÅ'+tg;}).join(' ')+'</span>':'')+
    '</label>';
  }).join('');

async function saveCatgItems(){
  var cat=CATG_MODAL_CAT;if(!cat)return;
  var toAdd=[],toDel=[];
  document.querySelectorAll('#ci-list input[type=checkbox]').forEach(function(cb){
    var id=parseInt(cb.value);
    var item=DATA.items.find(function(i){return i.id==id;});if(!item)return;
    var has=(item.tags||[]).includes(cat);
    if(cb.checked&&!has)toAdd.push(item);
    else if(!cb.checked&&has)toDel.push(item);
  });
  if(!toAdd.length&&!toDel.length){closeModal();return;}
  try{
    for(var i=0;i<toAdd.length;i++){
      var nt=(toAdd[i].tags||[]).concat([cat]);
      var r=await sb.from('items').update({tags:nt}).eq('id',toAdd[i].id);
      if(r.error)throw r.error;toAdd[i].tags=nt;
    }
    for(var j=0;j<toDel.length;j++){
      var nt2=(toDel[j].tags||[]).filter(function(tg){return tg!==cat;});
      var r2=await sb.from('items').update({tags:nt2}).eq('id',toDel[j].id);
      if(r2.error)throw r2.error;toDel[j].tags=nt2;
    }
    toast('Ō£ō '+('Tersimpan'));closeModal();
    document.getElementById('acg').innerHTML=catgPanelHTML();
    var tc=document.getElementById('ait-content');tc.innerHTML='<div class="ai-list'+(VIEW_AI==='grid'?' grid':'')+'">'+aiListHTML()+'</div>';updateAIViewBtns();
  }catch(e){toast('ŌÜĀ '+e.message);}
}

function onStkChange(variantId,inp){
  var item=DATA.items.find(function(i){return i.variant_id==variantId;});if(!item)return;
  var nv=parseInt(inp.value);
  if(isNaN(nv)||nv<0){inp.value=item.qty;delete STOCKTAKE[variantId];}
  else if(nv!==item.qty){STOCKTAKE[variantId]=nv;document.getElementById('stk-'+variantId).classList.add('changed');inp.classList.add('changed');}
  else{delete STOCKTAKE[variantId];document.getElementById('stk-'+variantId).classList.remove('changed');inp.classList.remove('changed');}
  var n=Object.keys(STOCKTAKE).length;
  var btn=document.getElementById('stk-save-btn');
  if(btn){btn.disabled=n===0;btn.textContent=n?'Ō£ō '+('Simpan ('+n+' perubahan)'):('Ō£ō Simpan (belum ada perubahan)');}
}

// Insert/update tahan kolom hilang: jika PostgREST melaporkan kolom tak ada di
// schema cache, buang kolom itu lalu coba lagi. DB asli kadang beda dgn migrasi.
async function sbInsertSafe(table,row){
  var r=await sb.from(table).insert(row).select(),g=0;
  while(r.error&&g<8){
    var msg=r.error.message||'',m=msg.match(/'([^']+)'(?:\s+column|\s+does not exist)/i);
    if(!m){m=msg.match(/column\s+["`]?([^"`\s]+)["`]?/i);}
    if(!m||!(m[1] in row))break;
    delete row[m[1]];r=await sb.from(table).insert(row).select();g++;
  }
  return r;
}
async function sbUpdateSafe(table,row,idCol,idVal){
  var r=await sb.from(table).update(row).eq(idCol,idVal).select(),g=0;
  while(r.error&&g<8){
    var msg=r.error.message||'',m=msg.match(/'([^']+)'(?:\s+column|\s+does not exist)/i);
    if(!m){m=msg.match(/column\s+["`]?([^"`\s]+)["`]?/i);}
    if(!m||!(m[1] in row))break;
    delete row[m[1]];r=await sb.from(table).update(row).eq(idCol,idVal).select();g++;
  }
  return r;
}

function compressImg(file,cb){
  var rd=new FileReader();
  rd.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var MAX=1200,r=Math.min(MAX/img.width,MAX/img.height,1);
      var cv=document.createElement('canvas');
      cv.width=Math.round(img.width*r);cv.height=Math.round(img.height*r);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      var dataUrl=cv.toDataURL('image/jpeg',0.85);
      var size=dataUrl.length;
      if(size>2000000){dataUrl=cv.toDataURL('image/jpeg',0.75);}
      if(size>3000000){dataUrl=cv.toDataURL('image/jpeg',0.65);}
      cb(dataUrl);
    };
    img.src=e.target.result;
  };
  rd.readAsDataURL(file);
}

async function saveBatch(itemId,batchId){
  var item=DATA.items.find(function(i){return i.id==itemId;});if(!item)return;
  var isEdit=!!batchId;
  var lot=(document.getElementById('b-lot').value||'').trim();
  var cprod=(document.getElementById('b-cprod').value||'').trim();
  var pono=(document.getElementById('b-pono').value||'').trim();
  var dono=(document.getElementById('b-dono').value||'').trim();
  var pd=document.getElementById('b-pd').value||null;
  var ed=document.getElementById('b-ed').value||null;
  var sl=(document.getElementById('b-sl').value||'').trim();
  var qc=(document.getElementById('b-qc').value||'Pending').trim();
  var qcd=document.getElementById('b-qcd').value||null;
  var coa=(document.getElementById('b-coa').value||'').trim();
  try{
    if(isEdit){
      var qr=parseFloat(document.getElementById('b-qtyrem').value)||0;
      var {error}=await sb.from('item_batches').update({lot_no:lot||null,code_produksi:cprod||null,po_no:pono||null,do_no:dono||null,production_date:pd,expiry_date:ed,shelf_life:sl||null,qc_status:qc,qc_date:qcd,coa_url:coa||null,qty_remaining:qr}).eq('id',batchId);
      if(error)throw error;
    }else{
      var qty=parseFloat(document.getElementById('b-qty').value)||0;
      var {error}=await sb.from('item_batches').insert({item_id:itemId,warehouse_id:CURRENT_WAREHOUSE||null,lot_no:lot||null,code_produksi:cprod||null,po_no:pono||null,do_no:dono||null,production_date:pd,expiry_date:ed,shelf_life:sl||null,qc_status:qc,qc_date:qcd,coa_url:coa||null,qty_initial:qty,qty_remaining:qty,received_date:new Date().toISOString().slice(0,10)});
      if(error)throw error;
    }
    toast('Ō£ō Disimpan');closeModal();await loadAll();
    setTimeout(function(){showItemBatches(itemId);},300);
  }catch(e){toast('ŌÜĀ '+e.message);}
}
async function deleteBatch(batchId,itemId){

  }catch(e){toast('ŌÜĀ '+e.message);}

function preloadAllWarehouses(){
  // Background: cache semua gudang supaya switch cepat (silent, no toast)
  if(!IS_SUPER)return;
  WAREHOUSES.forEach(function(w){
    if(w===CURRENT_WAREHOUSE)return; // skip yg sudah loaded
    // Background fetch silently - jangan interrupt user
    (async function(){
      try{
        var [iRes,rRes,bRes]=await Promise.all([
          sb.from('item_variants').select('*, items(*)').eq('warehouse_id',w).order('items(name)'),
          sb.from('requests').select('*').eq('warehouse_id',w).order('created_at',{ascending:false}),
          sb.from('item_batches').select('*').eq('warehouse_id',w).order('expiry_date',{ascending:true})
        ]);
        // Flatten item_variants + items like loadAll does
        var flatItems=(iRes.data||[]).map(function(v){
          var itm=v.items||{};
          return{
            id:v.item_id,
            variant_id:v.id,
            name:itm.name||'?',
            description:itm.description,
            image_url:itm.image_url,
            supplier_name:itm.supplier_name,
            supplier_url:itm.supplier_url,
            unit:itm.unit,
            storage_condition:itm.storage_condition,
            coa_url:itm.coa_url,
            tags:itm.tags,
            qty:v.qty,
            critical_qty:v.critical_qty,
            storage_photo_url:v.storage_photo_url,
            warehouse_id:v.warehouse_id
          };
        });
        // Simpan cache tanpa ubah DATA/UI (silent background load)
        localStorage.setItem('wh_cache_'+w,JSON.stringify({items:flatItems,batches:bRes.data||[],requests:rRes.data||[]}));
      }catch(e){}
    })();
  });
}

function exportToCSV(){

      return[
        item?item.name:'?',b.lot_no||'',b.code_produksi||'',b.po_no||'',b.do_no||'',

function escapeCSV(val){
  if(!val)return'';
  var s=String(val);
  if(s.includes(',')||s.includes('"')||s.includes('\n')){
    return'"'+s.replace(/"/g,'""')+'"';
  }
  return s;
}
function downloadCSV(csv,filename){
  var blob=new Blob(['’╗┐'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function fmtDate(s){if(!s)return'';var d=new Date(s);return d.toLocaleDateString('id-ID',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
function fmtC(n){if(!n)return'-';return('Rp ')+Math.round(n).toLocaleString();}
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},2800);}
// Tappable toast with an action (dipakai pemberitahuan update Service Worker)
function showToast(msg,actionLabel,cb){
  var el=document.createElement('div');el.className='toast';el.style.cursor='pointer';
  el.innerHTML=esc(msg)+(actionLabel?' <span style="text-decoration:underline;font-weight:700;margin-left:.4rem">'+esc(actionLabel)+'</span>':'');
  el.onclick=function(){if(cb)cb();el.remove();};
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.remove();},8000);
}
